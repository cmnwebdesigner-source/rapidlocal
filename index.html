<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoRapid RO</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: { 
                            50: '#FDFCF6', 100: '#F9F6E6', 200: '#F0E5B8', 300: '#E6D28A', 
                            400: '#DCBF5C', 500: '#D4AF37', 600: '#B08E27', 700: '#8A6E1E', 
                            800: '#665118', 900: '#453612', 950: '#261D08' 
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        body { -webkit-tap-highlight-color: transparent; }
        
        /* Ascundere scrollbar pentru caruselul de categorii (Aspect nativ de mobil) */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Scrollbar general minimalist */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E6D28A; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #665118; }
    </style>
</head>
<body class="antialiased selection:bg-gold-500 selection:text-black text-sm bg-gray-50 dark:bg-[#121212]">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SvgIcon = ({ size=20, className="", fill="none", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Home = (p) => <SvgIcon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SvgIcon>;
        const Search = (p) => <SvgIcon {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></SvgIcon>;
        const PlusCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></SvgIcon>;
        const Heart = (p) => <SvgIcon {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></SvgIcon>;
        const User = (p) => <SvgIcon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></SvgIcon>;
        const MapPin = (p) => <SvgIcon {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></SvgIcon>;
        const Phone = (p) => <SvgIcon {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></SvgIcon>;
        const MessageCircle = (p) => <SvgIcon {...p}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></SvgIcon>;
        const Star = (p) => <SvgIcon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></SvgIcon>;
        const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SvgIcon>;
        const Shield = (p) => <SvgIcon {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.82 0 5 1 7 2a1 1 0 0 1 1 1v7z"/></SvgIcon>;
        const Settings = (p) => <SvgIcon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
        const MessageSquare = (p) => <SvgIcon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></SvgIcon>;
        const Bell = (p) => <SvgIcon {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></SvgIcon>;
        const ChevronRight = (p) => <SvgIcon {...p}><path d="m9 18 6-6-6-6"/></SvgIcon>;
        const ChevronLeft = (p) => <SvgIcon {...p}><path d="m15 18-6-6 6-6"/></SvgIcon>;
        const X = (p) => <SvgIcon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></SvgIcon>;
        const AlertTriangle = (p) => <SvgIcon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></SvgIcon>;
        const CheckCircle2 = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></SvgIcon>;
        const LogOut = (p) => <SvgIcon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></SvgIcon>;
        const Globe = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></SvgIcon>;
        const Moon = (p) => <SvgIcon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></SvgIcon>;
        const Sun = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></SvgIcon>;
        const Trash2 = (p) => <SvgIcon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SvgIcon>;
        const Camera = (p) => <SvgIcon {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></SvgIcon>;
        const Edit3 = (p) => <SvgIcon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></SvgIcon>;
        const ImageIcon = (p) => <SvgIcon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></SvgIcon>;

        const CATEGORIES = [
        "Tractări auto", "Vulcanizare", "Service auto", "ITP", "Diagnoză auto", 
        "Schimb ulei", "Piese auto", "Spălătorie auto", "Detailing auto", 
        "Tinichigerie", "Vopsitorie", "Electrician auto", "Închirieri auto", 
        "Dezmembrări auto", "Anvelope", "Asigurări auto", "Platformă auto", 
        "Mecanic"
        ];

        const ROMANIA_LOCATIONS = {
        "București": ["Sector 1", "Sector 2", "Sector 3", "Sector 4", "Sector 5", "Sector 6"],
        "Alba": ["Alba Iulia", "Sebeș", "Aiud"],
        "Arad": ["Arad", "Pecica", "Sântana"],
        "Argeș": ["Pitești", "Mioveni", "Câmpulung"],
        "Bacău": ["Bacău", "Onești", "Moinești"],
        "Bihor": ["Oradea", "Salonta", "Marghita"],
        "Bistrița-Năsăud": ["Bistrița", "Năsăud"],
        "Botoșani": ["Botoșani", "Dorohoi"],
        "Brașov": ["Brașov", "Făgăraș", "Săcele", "Zărnești"],
        "Brăila": ["Brăila", "Ianca"],
        "Buzău": ["Buzău", "Râmnicu Sărat"],
        "Cluj": ["Cluj-Napoca", "Turda", "Dej"],
        "Constanța": ["Constanța", "Medgidia", "Mangalia"],
        "Dolj": ["Craiova", "Băilești"],
        "Galați": ["Galați", "Tecuci"],
        "Iași": ["Iași", "Pașcani"],
        "Ilfov": ["Voluntari", "Pantelimon", "Otopeni"],
        "Prahova": ["Ploiești", "Câmpina", "Sinaia"],
        "Sibiu": ["Sibiu", "Mediaș", "Cisnădie"],
        "Timiș": ["Timișoara", "Lugoj"]
        };

        const DEMO_ADS = [
        { id: '1', title: 'Tractări Auto NON-STOP București', firmName: 'Tractari Rapid', category: 'Tractări auto', county: 'București', city: 'Sector 3', phone: '0700 123 456', whatsapp: '0700 123 456', schedule: 'NON-STOP', price: 'De la 150 RON', description: 'Oferim servicii de tractări auto non-stop pe toată raza municipiului București și Ilfov. Intervenție în maxim 30 de minute.', rating: 4.8, promoted: true, image: 'https://images.unsplash.com/photo-1605810753063-4876b051c5f3?auto=format&fit=crop&q=80&w=400' },
        { id: '2', title: 'Vulcanizare Mobilă 24/7', firmName: 'Vulcanizare Mobilă', category: 'Vulcanizare', county: 'Cluj', city: 'Cluj-Napoca', phone: '0711 222 333', whatsapp: '0711 222 333', schedule: '24/7', price: 'De la 100 RON', description: 'Pană pe drum? Venim noi la tine! Vulcanizare mobilă, schimb anvelope, echilibrare roți la domiciliu.', rating: 4.9, promoted: true, image: 'https://images.unsplash.com/photo-1580274455135-021b181db8f8?auto=format&fit=crop&q=80&w=400' },
        { id: '3', title: 'Service Auto Multi-Marca', firmName: 'Auto Master', category: 'Service auto', county: 'Brașov', city: 'Brașov', phone: '0722 444 555', schedule: '08:00 - 18:00', price: 'Diagnoză 80 RON', description: 'Service auto autorizat RAR. Reparații mecanice, revizii, schimb distribuție.', rating: 4.6, promoted: false, image: 'https://images.unsplash.com/photo-1625047509168-a71c6f937d2f?auto=format&fit=crop&q=80&w=400' },
        { id: '4', title: 'Stație ITP Categoria II', firmName: 'ITP Sibiu', category: 'ITP', county: 'Sibiu', city: 'Sibiu', phone: '0733 666 777', whatsapp: '0733 666 777', schedule: '08:00 - 16:00', price: '120 RON', description: 'Efectuăm Inspecția Tehnică Periodică (ITP) rapid și profesionist pentru autoturisme până în 3.5t.', rating: 4.7, promoted: false, image: 'https://images.unsplash.com/photo-1599839619722-39751411ea63?auto=format&fit=crop&q=80&w=400' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [savedAds, setSavedAds] = useState([]);
            const [selectedAd, setSelectedAd] = useState(null);
            const [currentView, setCurrentView] = useState('main'); 
            
            // Stare globală profil utilizator
            const defaultProfile = {
                photo: '',
                name: 'Utilizator Nou',
                nameEditsLeft: 2,
                about: '',
                country: 'România',
                city: '',
                language: 'Română'
            };
            const [userProfile, setUserProfile] = useState(() => {
                const savedProfile = localStorage.getItem('autorapid_profile');
                return savedProfile ? JSON.parse(savedProfile) : defaultProfile;
            });

            // Bug fix: Stocare anunțuri cu limitare și fallback
            const [allAds, setAllAds] = useState(() => {
                const savedAllAds = localStorage.getItem('autorapid_allAds');
                return savedAllAds ? JSON.parse(savedAllAds) : DEMO_ADS;
            });
            
            useEffect(() => {
                const localSaved = localStorage.getItem('autorapid_saved');
                if (localSaved) setSavedAds(JSON.parse(localSaved));
                
                const localTheme = localStorage.getItem('autorapid_theme');
                if (localTheme === 'dark') {
                    setIsDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            useEffect(() => localStorage.setItem('autorapid_saved', JSON.stringify(savedAds)), [savedAds]);
            useEffect(() => localStorage.setItem('autorapid_profile', JSON.stringify(userProfile)), [userProfile]);
            
            // Măsură de siguranță: Când se salvează imagini base64, memoria poate depăși cota.
            useEffect(() => {
                try {
                    localStorage.setItem('autorapid_allAds', JSON.stringify(allAds));
                } catch (e) {
                    console.warn("Memoria LocalStorage este plină. Anunțurile noi vor funcționa doar temporar în această sesiune.");
                }
            }, [allAds]);

            const toggleSaveAd = (id, e) => {
                if(e) e.stopPropagation();
                if (savedAds.includes(id)) {
                    setSavedAds(savedAds.filter(adId => adId !== id));
                } else {
                    setSavedAds([...savedAds, id]);
                }
            };

            const toggleTheme = () => {
                const newMode = !isDarkMode;
                setIsDarkMode(newMode);
                localStorage.setItem('autorapid_theme', newMode ? 'dark' : 'light');
                if (newMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setCurrentView('main');
                window.scrollTo(0, 0);
            };

            const themeClasses = {
                bgApp: 'bg-gray-50 dark:bg-[#121212]',
                bgCard: 'bg-white dark:bg-[#1e1e1e] border-gray-100 dark:border-gray-800',
                textMain: 'text-gray-900 dark:text-gray-100',
                textMuted: 'text-gray-500 dark:text-gray-400',
                borderMuted: 'border-gray-200 dark:border-gray-800',
                inputBg: 'bg-gray-50 dark:bg-[#2a2a2a] border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white focus:border-gold-500',
                goldAccents: 'text-gold-500',
                goldBg: 'bg-gradient-to-r from-gold-400 to-gold-600 text-black',
                goldBgHover: 'hover:from-gold-300 hover:to-gold-500',
                bottomNav: 'bg-white dark:bg-[#1e1e1e] border-t border-gray-200 dark:border-gray-800'
            };

            return (
                <div className={`min-h-screen pb-16 md:pb-0 ${themeClasses.bgApp} ${themeClasses.textMain} font-sans transition-colors duration-200`}>
                
                <header className={`sticky top-0 z-40 w-full shadow-sm bg-white dark:bg-[#1e1e1e] border-b border-gray-200 dark:border-gray-800 pt-safe transition-colors`}>
                    <div className="max-w-5xl mx-auto px-4 h-12 flex items-center justify-between">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => handleTabChange('home')}>
                        <div className="w-6 h-6 rounded bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center font-bold text-black text-sm shadow-sm">A</div>
                        <span className="font-bold text-lg tracking-tight">AutoRapid</span>
                    </div>

                    <nav className="hidden md:flex items-center gap-5 text-sm font-medium">
                        <button onClick={() => handleTabChange('home')} className={`hover:${themeClasses.goldAccents} transition-colors ${activeTab === 'home' ? themeClasses.goldAccents : ''}`}>Acasă</button>
                        <button onClick={() => handleTabChange('search')} className={`hover:${themeClasses.goldAccents} transition-colors ${activeTab === 'search' ? themeClasses.goldAccents : ''}`}>Caută</button>
                        <button onClick={() => handleTabChange('saved')} className={`hover:${themeClasses.goldAccents} transition-colors ${activeTab === 'saved' ? themeClasses.goldAccents : ''}`}>Salvate {savedAds.length > 0 && <span className="ml-1 text-[10px] bg-gold-500 text-black px-1.5 py-0.5 rounded-full">{savedAds.length}</span>}</button>
                        <button onClick={() => handleTabChange('profile')} className={`hover:${themeClasses.goldAccents} transition-colors flex items-center gap-1 ${activeTab === 'profile' ? themeClasses.goldAccents : ''}`}><User size={16} /> Cont</button>
                        <button onClick={() => handleTabChange('publish')} className={`${themeClasses.goldBg} px-3 py-1.5 rounded-lg font-bold shadow-md shadow-gold-500/20 transition-all flex items-center gap-1.5 text-xs`}>
                        <PlusCircle size={14} /> Publică
                        </button>
                    </nav>

                    <div className="md:hidden flex items-center gap-3">
                        <button onClick={() => { setActiveTab('profile'); setCurrentView('inbox'); }} className="relative p-1.5 hover:text-gold-500 transition-colors">
                            <Bell size={20} />
                            <span className="absolute top-1 right-1 w-2 h-2 bg-gold-500 rounded-full border border-white dark:border-gray-900"></span>
                        </button>
                    </div>
                    </div>
                </header>

                <main className="max-w-5xl mx-auto w-full pt-3 px-3 sm:px-4">
                    {(activeTab === 'home' || activeTab === 'search') && currentView === 'main' && (
                        <HomeView allAds={allAds} themeClasses={themeClasses} toggleSaveAd={toggleSaveAd} savedAds={savedAds} openAdDetails={setSelectedAd} />
                    )}
                    {activeTab === 'publish' && currentView === 'main' && (
                        <PublishView themeClasses={themeClasses} onPublish={(newAd) => { setAllAds([newAd, ...allAds]); handleTabChange('home'); }} />
                    )}
                    {activeTab === 'saved' && currentView === 'main' && (
                        <SavedView allAds={allAds} savedAds={savedAds} themeClasses={themeClasses} toggleSaveAd={toggleSaveAd} openAdDetails={setSelectedAd} />
                    )}
                    {activeTab === 'profile' && currentView === 'main' && (
                        <ProfileMenu themeClasses={themeClasses} profile={userProfile} setCurrentView={setCurrentView} toggleTheme={toggleTheme} isDarkMode={isDarkMode} />
                    )}
                    {activeTab === 'profile' && currentView === 'editProfile' && (
                        <EditProfileView themeClasses={themeClasses} profile={userProfile} setProfile={setUserProfile} onBack={() => setCurrentView('main')} />
                    )}
                    {activeTab === 'profile' && currentView === 'feedback' && <FeedbackView themeClasses={themeClasses} onBack={() => setCurrentView('main')} />}
                    {activeTab === 'profile' && currentView === 'inbox' && <InboxView themeClasses={themeClasses} onBack={() => setCurrentView('main')} />}
                </main>

                <nav className={`md:hidden fixed bottom-0 left-0 right-0 z-40 ${themeClasses.bottomNav} pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)]`}>
                    <div className="flex justify-around items-center h-14 px-1">
                    <NavItem icon={<Home size={20} />} label="Acasă" isActive={activeTab === 'home'} onClick={() => handleTabChange('home')} themeClasses={themeClasses} />
                    <NavItem icon={<Search size={20} />} label="Caută" isActive={activeTab === 'search'} onClick={() => handleTabChange('search')} themeClasses={themeClasses} />
                    <div className="relative -top-4">
                        <button onClick={() => handleTabChange('publish')} className={`w-12 h-12 rounded-full ${themeClasses.goldBg} shadow-lg shadow-gold-500/30 flex items-center justify-center transform transition-transform active:scale-95`}>
                        <PlusCircle size={24} className="text-black" />
                        </button>
                    </div>
                    <NavItem icon={<Heart size={20} />} label="Salvate" isActive={activeTab === 'saved'} onClick={() => handleTabChange('saved')} themeClasses={themeClasses} badge={savedAds.length} />
                    <NavItem icon={<User size={20} />} label="Profil" isActive={activeTab === 'profile'} onClick={() => handleTabChange('profile')} themeClasses={themeClasses} />
                    </div>
                </nav>

                {selectedAd && (
                    <AdDetailsModal ad={selectedAd} onClose={() => setSelectedAd(null)} themeClasses={themeClasses} toggleSaveAd={toggleSaveAd} isSaved={savedAds.includes(selectedAd.id)} />
                )}
                </div>
            );
        }

        const NavItem = ({ icon, label, isActive, onClick, themeClasses, badge }) => (
            <button onClick={onClick} className={`flex flex-col items-center justify-center w-14 h-full gap-0.5 transition-colors relative ${isActive ? themeClasses.goldAccents : themeClasses.textMuted}`}>
                {icon}
                <span className="text-[9px] font-medium">{label}</span>
                {badge > 0 && (
                <span className="absolute top-1 right-2 w-3.5 h-3.5 bg-red-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center shadow-sm">
                    {badge}
                </span>
                )}
            </button>
        );

        const HomeView = ({ allAds, themeClasses, toggleSaveAd, savedAds, openAdDetails }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCounty, setSelectedCounty] = useState('');
            const [selectedCity, setSelectedCity] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('');

            const filteredAds = allAds.filter(ad => {
                const matchSearch = ad.title.toLowerCase().includes(searchTerm.toLowerCase()) || (ad.firmName && ad.firmName.toLowerCase().includes(searchTerm.toLowerCase()));
                const matchCounty = selectedCounty ? ad.county === selectedCounty : true;
                const matchCity = selectedCity ? ad.city === selectedCity : true;

            const [formData, setFormData] = useState({ ...profile });
            const [error, setError] = useState('');

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData({ ...formData, photo: reader.result });

            };

            const handleSave = () => {
                let updatedProfile = { ...formData };
                
                // Logică pentru limitarea editării numelui (Maxim de 2 ori)
                if (formData.name !== profile.name) {
                    if (profile.nameEditsLeft <= 0) {
                        setError('Ai atins limita maximă de modificări ale numelui.');

                    updatedProfile.nameEditsLeft = profile.nameEditsLeft - 1;

                </div>
                <div className="flex items-center gap-2">
                {badge && <span className="bg-gold-500 text-black text-[10px] font-bold px-1.5 py-0.5 rounded-full">{badge}</span>}
                {!hideArrow && <ChevronRight size={16} className={themeClasses.textMuted} />}
                </div>
            </button>
        );

        const FeedbackView = ({ themeClasses, onBack }) => (
            <div className="max-w-md mx-auto animate-fadeIn">
                <button onClick={onBack} className="flex items-center gap-1 mb-4 hover:text-gold-500 transition-colors font-medium text-sm"><ChevronLeft size={18} /> Înapoi</button>
                <div className={`p-4 rounded-xl ${themeClasses.bgCard} border shadow-sm`}>
                    <h1 className="text-xl font-bold mb-3">Feedback</h1>
                    <textarea rows="4" placeholder="Ce putem îmbunătăți?" className={`w-full px-3 py-2 rounded-lg border text-sm outline-none focus:ring-1 focus:ring-gold-500 ${themeClasses.inputBg} mb-3 resize-none`}></textarea>
                    <button onClick={onBack} className={`w-full py-2.5 rounded-lg text-sm font-bold shadow-md ${themeClasses.goldBg}`}>Trimite</button>
                </div>
            </div>
        );

        const InboxView = ({ themeClasses, onBack }) => (
            <div className="max-w-md mx-auto animate-fadeIn">
                <button onClick={onBack} className="flex items-center gap-1 mb-4 hover:text-gold-500 transition-colors font-medium text-sm"><ChevronLeft size={18} /> Înapoi</button>
                <h1 className="text-xl font-bold mb-4">Mesaje</h1>
                <div className={`p-3 rounded-xl ${themeClasses.bgCard} border shadow-sm flex gap-3 items-start`}>
                    <div className="w-10 h-10 bg-gold-50 text-gold-600 dark:bg-gold-900/20 dark:text-gold-400 rounded-full flex items-center justify-center shrink-0"><Globe size={20} /></div>
                    <div><h3 className="text-sm font-bold">Bun venit!</h3><p className={`text-xs ${themeClasses.textMuted}`}>Suntem bucuroși să te avem alături.</p></div>
                </div>
            </div>
        );

        const AdCard = ({ ad, themeClasses, isSaved, onSave, onClick }) => (
            <div onClick={onClick} className={`${themeClasses.bgCard} rounded-xl overflow-hidden border shadow-sm hover:shadow-md transition-shadow cursor-pointer group flex flex-col h-full relative`}>
                {ad.promoted && <div className="absolute top-2 left-2 bg-gradient-to-r from-gold-400 to-gold-600 text-black text-[9px] font-bold px-1.5 py-0.5 rounded shadow z-10 flex items-center gap-0.5"><Star size={8} className="fill-black" /> PROMOVAT</div>}
                
                <button onClick={onSave} className="absolute top-2 right-2 w-7 h-7 bg-black/30 backdrop-blur-sm rounded-full flex items-center justify-center z-10">
                <Heart size={14} className={isSaved ? "fill-gold-500 text-gold-500" : "text-white"} />
                </button>
                
                <div className="h-32 sm:h-36 overflow-hidden bg-gray-200 dark:bg-gray-800">
                    <img src={ad.image} alt={ad.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                </div>
                
                <div className="p-3 flex flex-col flex-grow">
                    <div className="flex justify-between items-start mb-1">
                        <div className="text-[10px] font-bold text-gold-600 dark:text-gold-500 uppercase truncate">{ad.category}</div>
                        {ad.rating > 0 && <div className="flex items-center gap-0.5 text-[10px] font-medium"><Star size={10} className="fill-gold-500 text-gold-500" /> {ad.rating}</div>}
                    </div>
                    
                    <h3 className="font-bold text-sm mb-1 leading-tight line-clamp-2">{ad.title}</h3>
                    <div className={`text-[11px] ${themeClasses.textMuted} mb-2 flex items-center gap-1 truncate`}><MapPin size={12} className="shrink-0"/> {ad.city}, {ad.county}</div>
                    
                    <div className="mt-auto pt-2 border-t border-gray-100 dark:border-gray-800">
                        <div className="font-bold text-base mb-2 text-gray-900 dark:text-white">{ad.price}</div>
                        <div className="flex gap-1.5">
                            <button className="flex-1 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 py-1.5 rounded-md text-xs font-bold flex items-center justify-center gap-1 transition-colors" onClick={(e)=>{e.stopPropagation(); window.location.href=`tel:${ad.phone}`}}>
                                <Phone size={12} /> Sună
                            </button>
                            {ad.whatsapp && (
                            <button className="flex-1 bg-green-50 text-green-700 dark:bg-green-900/20 dark:text-green-500 py-1.5 rounded-md text-xs font-bold flex items-center justify-center gap-1 transition-colors" onClick={(e)=>{e.stopPropagation(); window.open(`https://wa.me/${ad.whatsapp?.replace(/\s/g, '')}`, '_blank')}}>
                                <MessageCircle size={12} /> WhatsApp
                            </button>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );

        const AdDetailsModal = ({ ad, onClose, themeClasses, toggleSaveAd, isSaved }) => (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/60 backdrop-blur-sm animate-fadeIn">
            <div className={`${themeClasses.bgCard} w-full h-[90vh] sm:h-auto sm:max-h-[90vh] sm:max-w-lg rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-y-auto flex flex-col relative`}>
                
                <button onClick={onClose} className="absolute top-3 right-3 z-20 w-8 h-8 bg-black/50 text-white rounded-full flex items-center justify-center backdrop-blur-md"><X size={18} /></button>
                
                <div className="h-56 w-full relative shrink-0">
                    {ad.promoted && <div className="absolute top-3 left-3 bg-gradient-to-r from-gold-400 to-gold-600 text-black text-[10px] font-bold px-2 py-1 rounded z-10 flex items-center gap-1"><Star size={12} className="fill-black" /> PROMOVAT</div>}
                    <img src={ad.image} alt={ad.title} className="w-full h-full object-cover" />
                </div>
                
                <div className="p-4 md:p-5 flex-grow">
                    <div className="flex justify-between items-start mb-1">
                        <div className="text-xs font-bold text-gold-600 dark:text-gold-500 uppercase">{ad.category}</div>
                        {ad.rating > 0 && <div className="flex items-center gap-1 bg-gray-50 dark:bg-gray-800 px-1.5 py-0.5 rounded text-xs font-medium"><Star size={12} className="fill-gold-500 text-gold-500" /> {ad.rating}</div>}
                    </div>
                    <h1 className="text-xl font-bold mb-2 leading-tight">{ad.title}</h1>
                    <p className={`text-lg font-bold mb-4 ${themeClasses.textMain}`}>{ad.price}</p>
                    
                    <div className="grid grid-cols-2 gap-y-3 gap-x-2 mb-4 bg-gray-50 dark:bg-gray-800/50 p-3 rounded-xl text-xs">
                        <div className="flex items-start gap-2"><Shield className={themeClasses.goldAccents} size={16} /><div><p className={`text-[10px] ${themeClasses.textMuted}`}>Firmă</p><p className="font-medium truncate max-w-[100px]">{ad.firmName || "Persoană fizică"}</p></div></div>
                        <div className="flex items-start gap-2"><MapPin className={themeClasses.goldAccents} size={16} /><div><p className={`text-[10px] ${themeClasses.textMuted}`}>Locație</p><p className="font-medium truncate max-w-[100px]">{ad.city}, {ad.county}</p></div></div>
                        <div className="flex items-start gap-2 col-span-2"><Clock className={themeClasses.goldAccents} size={16} /><div><p className={`text-[10px] ${themeClasses.textMuted}`}>Program</p><p className="font-medium">{ad.schedule}</p></div></div>
                    </div>
                    
                    <div className={`pt-3 border-t ${themeClasses.borderMuted} mb-4`}>
                        <h3 className="font-bold text-sm mb-2">Descriere</h3>
                        <p className="text-sm whitespace-pre-line leading-relaxed text-gray-700 dark:text-gray-300">{ad.description}</p>
                    </div>
                </div>
                
                <div className={`p-3 border-t ${themeClasses.borderMuted} ${themeClasses.bgCard} sticky bottom-0 z-10 flex gap-2 pb-safe`}>
                    <button className={`flex-1 ${themeClasses.goldBg} py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-1.5`} onClick={()=>window.location.href=`tel:${ad.phone}`}>
                        <Phone size={16} /> Sună
                    </button>
                    {ad.whatsapp && (
                    <button className="flex-1 bg-[#25D366] text-white py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-1.5" onClick={()=>window.open(`https://wa.me/${ad.whatsapp?.replace(/\s/g, '')}`, '_blank')}>
                        <MessageCircle size={16} /> WhatsApp
                    </button>
                    )}
                    <button onClick={(e) => toggleSaveAd(ad.id, e)} className={`w-12 border rounded-xl flex items-center justify-center ${isSaved ? 'border-gold-500 bg-gold-50 dark:bg-gold-900/20' : themeClasses.borderMuted}`}>
                        <Heart size={20} className={isSaved ? "fill-gold-500 text-gold-500" : themeClasses.textMuted} />
                    </button>
                </div>
            </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
