function t(key){ const lang = settings?.language || localStorage.getItem('autorapid_lang') || 'ro'; return I18N[lang]?.[key] || I18N.ro[key] || key; }
function esc(v){ return String(v ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function byId(id){ return document.getElementById(id); }
function formatDate(v){ if(!v) return ''; const d = new Date(v); return d.toLocaleDateString('ro-RO',{day:'2-digit',month:'short'}); }
function nowIsoPlusDays(days){ const d = new Date(); d.setDate(d.getDate()+days); return d.toISOString(); }
function toast(msg,type='ok'){ toastBox.textContent = msg; toastBox.className = 'toast show ' + type; setTimeout(()=>toastBox.className='toast',3200); }
function safeImg(url){ return url || ''; }

function initSupabase(){
  if(window.supabase){
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } });
  }
}

async function start(){
  initSupabase();
  window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); deferredPrompt = e; render(); });
  if(!sb){ showAuth(); hideLoading(); return; }
  const {data} = await sb.auth.getSession();
  currentUser = data?.session?.user || null;
  sb.auth.onAuthStateChange(async (_event, session)=>{ currentUser = session?.user || null; await loadAll(); render(); });
  await loadAll();
  hideLoading();
  render();
}
function hideLoading(){ setTimeout(()=>loading.classList.add('hidden'),350); }

async function loadAll(){
  if(!currentUser){ profile=null; settings=null; listings=[]; favorites=new Set(); conversations=[]; messages=[]; notifications=[]; clearSubscriptions(); return; }
  await Promise.all([ensureProfile(), loadSettings()]);
  await Promise.all([loadListings(), loadFavorites(), loadConversations(), loadNotifications()]);
  setupRealtime();
}
async function ensureProfile(){
  const {data, error} = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
  if(error){ console.warn(error); }
  if(data){ profile = data; return; }
  const initial = {id:currentUser.id, full_name:(currentUser.email||'').split('@')[0], email_display:currentUser.email, role:'client'};
  const res = await sb.from('profiles').upsert(initial).select('*').single();
  profile = res.data || initial;
}
async function loadSettings(){
  const {data} = await sb.from('user_settings').select('*').eq('user_id', currentUser.id).maybeSingle();
  if(data){ settings = data; } else {
    const initial = {user_id:currentUser.id, language:'ro', theme:'light', notifications_enabled:true, show_phone:true, show_city:true, allow_messages:true};
    const res = await sb.from('user_settings').upsert(initial).select('*').single(); settings = res.data || initial;
  }
  localStorage.setItem('autorapid_lang', settings.language || 'ro');
  document.documentElement.dataset.theme = settings.theme === 'dark' ? 'dark' : 'light';
}
async function loadListings(){
  const {data, error} = await sb.from('listings').select('*').eq('status','active').order('created_at',{ascending:false});
  if(error){ console.warn(error); listings=[]; } else listings = data || [];
  if(listings.length){
    const ids = listings.map(x=>x.id);
    const {data:imgs} = await sb.from('listing_images').select('*').in('listing_id',ids).order('position');
    listingImages = imgs || [];
  } else listingImages = [];
}
async function loadFavorites(){
  const {data} = await sb.from('favorites').select('listing_id').eq('user_id', currentUser.id);
  favorites = new Set((data||[]).map(x=>x.listing_id));
}
async function loadConversations(){
  const {data,error} = await sb.from('conversations').select('*').or(`client_id.eq.${currentUser.id},provider_id.eq.${currentUser.id}`).order('updated_at',{ascending:false});
  if(error){ console.warn(error); conversations=[]; } else conversations = data || [];
}
async function loadNotifications(){
  const {data} = await sb.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at',{ascending:false}).limit(50);
  notifications = data || [];
}
async function loadMessages(convId){
  if(!convId) return;
  const {data,error} = await sb.from('messages').select('*').eq('conversation_id',convId).order('created_at',{ascending:true}).limit(200);
  if(error){ console.warn(error); messages=[]; } else messages = data || [];
  await sb.from('messages').update({is_read:true}).eq('conversation_id',convId).eq('receiver_id',currentUser.id);
}
function clearSubscriptions(){ subscriptions.forEach(ch=>{ try{ sb.removeChannel(ch); }catch(e){} }); subscriptions=[]; }
function setupRealtime(){
  if(!sb || !currentUser || subscriptions.length) return;
  const msgCh = sb.channel('autorapid_messages_'+currentUser.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`receiver_id=eq.${currentUser.id}`}, async payload=>{
      await loadConversations();
      if(payload.new.conversation_id === selectedConversationId){ messages.push(payload.new); setTimeout(scrollChat,50); }
      await loadNotifications();
      notifyBrowser('AutoRapid RO', 'Ai primit un mesaj nou.');
      render();
    }).subscribe();
  const notifCh = sb.channel('autorapid_notifications_'+currentUser.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${currentUser.id}`}, payload=>{ notifications.unshift(payload.new); render(); })
    .subscribe();
  subscriptions.push(msgCh, notifCh);
}

function render(){
  if(!currentUser){ showAuth(); return; }
  const unread = notifications.filter(n=>!n.is_read).length;
  app.innerHTML = `
    <header class="topbar">
      <div class="top-inner">
        <button class="logo-row" onclick="go('home')">${logoMarkup}</button>
        <nav class="nav-desktop">${navButtons()}</nav>
        <div class="top-actions">
          ${deferredPrompt ? `<button class="btn btn-small btn-soft" onclick="installApp()">Add Home</button>` : ''}
          <button class="icon-btn" onclick="go('notifications')" aria-label="${t('notifications')}">${icon('bell')}${unread?`<span class="badge">${unread}</span>`:''}</button>
          <button class="icon-btn" onclick="go('profile')" aria-label="${t('profile')}"><img class="avatar-mini" src="${esc(profileImage())}" alt=""></button>
        </div>
      </div>
    </header>
    <main class="main">${renderView()}</main>
    <nav class="bottom-nav"><div class="nav-inner">${navButtons()}</div></nav>`;
  attachViewEvents();
}
function navButtons(){
  return [['home','home'],['search','search'],['publish','plus'],['saved','heart'],['profile','user']].map(([v,i])=>`<button class="nav-btn ${view===v?'active':''}" onclick="go('${v}')">${icon(i)}<span>${t(v)}</span></button>`).join('');
}
function showAuth(){
  app.innerHTML = `<section class="auth-wrap"><div class="auth-card"><div class="auth-logo">${logoMarkup}</div><h1 class="auth-title">AutoRapid RO</h1><p class="auth-sub">Marketplace auto simplu pentru România.</p><div class="auth-tabs"><button class="auth-tab ${authMode==='login'?'active':''}" onclick="authMode='login';showAuth()">${t('login')}</button><button class="auth-tab ${authMode==='register'?'active':''}" onclick="authMode='register';showAuth()">${t('register')}</button></div><form id="authForm"><div class="field"><label>${t('email')}</label><input class="input" name="email" type="email" autocomplete="email" required></div><div class="field"><label>${t('password')}</label><input class="input" name="password" type="password" autocomplete="current-password" minlength="6" required></div><button class="btn btn-primary btn-full" type="submit">${authMode==='login'?t('login'):t('register')}</button></form><p class="small-note" style="text-align:center">Email + parolă. Fără cod pe email.</p></div></section>`;
  byId('authForm').addEventListener('submit', handleAuth);
}
async function handleAuth(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const email = fd.get('email').trim(); const password = fd.get('password');
  try{
    const res = authMode==='login' ? await sb.auth.signInWithPassword({email,password}) : await sb.auth.signUp({email,password, options:{data:{full_name:email.split('@')[0]}}});
    if(res.error) throw res.error;
    toast(authMode==='login'?'Ai intrat în cont.':'Cont creat.');
  }catch(err){ toast(err.message || 'Autentificarea nu a mers.','error'); }
}
function go(v){ view=v; selectedListing=null; selectedConversationId=null; messages=[]; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function profileImage(){ return profile?.avatar_url || profile?.logo_url || defaultAvatar(displayName()); }
function displayName(p=profile){ return p?.company_name || p?.full_name || p?.email_display || 'Utilizator'; }
function locationName(p=profile){ return [p?.city,p?.county].filter(Boolean).join(', ') || 'Locație necompletată'; }
function firstListingImage(listing){ return listingImages.find(x=>x.listing_id===listing.id)?.image_url || null; }
function ownerProfile(ownerId){ return window.__profiles?.find(p=>p.id===ownerId) || null; }
async function loadOwnerProfiles(){
  const ids = [...new Set(listings.map(l=>l.owner_id).filter(Boolean))];
  if(!ids.length){ window.__profiles=[]; return; }
  const {data} = await sb.from('profiles').select('*').in('id',ids);
  window.__profiles = data || [];
}
function filteredListings(){
  const q = searchText.trim().toLowerCase();
  return listings.filter(l=>{
    const p = ownerProfile(l.owner_id) || {};
    const hay = [l.title,l.category,l.description,l.city,l.county,p.company_name,p.full_name].join(' ').toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(filters.county && l.county !== filters.county) return false;
    if(filters.city && l.city !== filters.city) return false;
    if(filters.category && l.category !== filters.category) return false;
    return true;
  });
}
function renderView(){
  if(!profile?.role) return renderRoleSelect();
  const map = {home:renderHome, search:renderHome, saved:renderSaved, publish:renderPublish, profile:renderProfile, editProfile:renderEditProfile, settings:renderSettings, feedback:renderFeedback, inbox:renderInbox, myListings:renderMyListings, notifications:renderNotifications};
  return (map[view]||renderHome)();
}
function renderRoleSelect(){
  return `<div class="page-head"><div><h1 class="page-title">${t('roleTitle')}</h1><p class="page-sub">Poți schimba rolul mai târziu din profil.</p></div></div><div class="role-grid"><button class="role-card" onclick="setRole('client')">${icon('user')}<h3>${t('client')}</h3><p>${t('clientSub')}</p></button><button class="role-card" onclick="setRole('provider')">${icon('car')}<h3>${t('provider')}</h3><p>${t('providerSub')}</p></button></div>`;
}
async function setRole(role){
  const {data,error}=await sb.from('profiles').upsert({id:currentUser.id, role, email_display:currentUser.email},{onConflict:'id'}).select('*').single();
  if(error){toast(error.message,'error');return;} profile=data; toast('Rol salvat.'); view= role==='provider'?'editProfile':'home'; render();
}
function renderHome(){
  const cities = filters.county ? LOCATIONS[filters.county] || [] : [];
  const items = filteredListings();
  return `<section class="search-zone"><div class="search-row"><input id="searchBox" class="search-input" placeholder="${t('whatSearch')}" value="${esc(searchText)}"><button class="btn btn-gold" id="searchBtn">${t('search')}</button></div><div class="filters"><select id="countyFilter" class="filter"><option value="">${t('county')}: ${t('all')}</option>${COUNTY_LIST.map(c=>`<option ${filters.county===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select id="cityFilter" class="filter"><option value="">${t('city')}: ${t('all')}</option>${cities.map(c=>`<option ${filters.city===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select id="catFilter" class="filter"><option value="">${t('category')}: ${t('all')}</option>${CATEGORIES.map(c=>`<option ${filters.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div></section>${items.length?`<div class="list">${items.map(renderListingCard).join('')}</div>`:`<div class="empty"><h3>${t('emptyTitle')}</h3><p>${t('emptyText')}</p></div>`}`;
}
function renderListingCard(l){
  const p = ownerProfile(l.owner_id) || {};
  const title = l.title || p.company_name || p.full_name || l.category;
  const img = firstListingImage(l) || p.logo_url || p.avatar_url || defaultAvatar(title);
  const isSaved = favorites.has(l.id);
  return `<article class="listing-card" onclick="openListing('${l.id}')"><img class="thumb" src="${esc(img)}" alt=""><button class="heart ${isSaved?'saved':''}" onclick="event.stopPropagation();toggleFavorite('${l.id}')" aria-label="${t('save')}">${icon('heart')}</button><div class="card-info"><h3 class="card-title">${esc(title)}</h3><div class="meta"><span>${esc(l.category)}</span><span class="dot"></span><span>${esc([l.city,l.county].filter(Boolean).join(', '))}</span></div><p class="desc">${esc(l.description)}</p><div class="meta"><span>${esc(l.schedule||'Program necompletat')}</span><span class="dot"></span><span>${esc(l.price_hint||'Preț la cerere')}</span>${l.is_paid_listing?'<span class="tag gold">10 zile</span>':''}</div><div class="card-actions" onclick="event.stopPropagation()"><button class="btn btn-small btn-soft" onclick="callListing('${l.id}')">${t('call')}</button><button class="btn btn-small btn-soft" onclick="whatsappListing('${l.id}')">${t('whatsapp')}</button><button class="btn btn-small btn-primary" onclick="openConversationForListing('${l.id}')">${t('sendMessage')}</button></div></div></article>`;
}
function attachViewEvents(){
  const s=byId('searchBox'); if(s){ s.addEventListener('input',e=>{ searchText=e.target.value; render(); }); }
  const sbt=byId('searchBtn'); if(sbt){ sbt.addEventListener('click',()=>{ searchText=byId('searchBox').value; render(); }); }
  const cf=byId('countyFilter'); if(cf){ cf.addEventListener('change',e=>{ filters.county=e.target.value; filters.city=''; render(); }); }
  const city=byId('cityFilter'); if(city){ city.addEventListener('change',e=>{ filters.city=e.target.value; render(); }); }
  const cat=byId('catFilter'); if(cat){ cat.addEventListener('change',e=>{ filters.category=e.target.value; render(); }); }
  const pub=byId('publishForm'); if(pub){ pub.addEventListener('submit',submitListing); }
  const edit=byId('editProfileForm'); if(edit){ edit.addEventListener('submit',saveProfile); }
  const set=byId('settingsForm'); if(set){ set.addEventListener('submit',saveSettings); }
  const feed=byId('feedbackForm'); if(feed){ feed.addEventListener('submit',submitFeedback); }
  const msg=byId('messageForm'); if(msg){ msg.addEventListener('submit',sendMessage); }
  const files=byId('listingFiles'); if(files){ files.addEventListener('change',handleListingFiles); }
  const av=byId('avatarFile'); if(av){ av.addEventListener('change',handleAvatarFile); }
}

async function submitListing(e){
  e.preventDefault(); const fd=new FormData(e.target); const mine=listings.filter(l=>l.owner_id===currentUser.id && l.status==='active'); const paidNeeded=mine.length>=1;
  const listing = {owner_id:currentUser.id, title:fd.get('title')||`${fd.get('category')} ${profile.city||''}`, category:fd.get('category'), description:fd.get('description'), county:profile.county, city:profile.city, address:profile.address, phone:profile.phone, whatsapp:profile.whatsapp||profile.phone, schedule:profile.schedule, price_hint:profile.price_hint, promotion_type:'free', status:'active'};
  if(paidNeeded){ listing.is_paid_listing=true; listing.plan_type='paid_10_days'; listing.payment_status='demo_paid'; listing.amount_ron=5; listing.expires_at=nowIsoPlusDays(10); }
  let res = await sb.from('listings').insert(listing).select('*').single();
  if(res.error && String(res.error.message).includes('column')){ delete listing.is_paid_listing; delete listing.plan_type; delete listing.payment_status; delete listing.amount_ron; delete listing.expires_at; res = await sb.from('listings').insert(listing).select('*').single(); }
  if(res.error){ toast(res.error.message,'error'); return; }
  const created = res.data;
  for(let i=0;i<publishFiles.length;i++){ await uploadListingImage(created.id, publishFiles[i], i+1); }

async function uploadListingImage(listingId,file,pos){
  try{
    const path = `listings/${currentUser.id}/${listingId}-${pos}-${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi,'_')}`;
    const up = await sb.storage.from(BUCKET).upload(path,file,{upsert:true});
    if(up.error) throw up.error;
    const pub = sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
    await sb.from('listing_images').insert({listing_id:listingId,user_id:currentUser.id,image_url:pub,storage_path:path,position:pos});
  }catch(err){ console.warn('image upload failed',err); }
}

async function notifyBrowser(title,body){ if(!settings?.notifications_enabled) return; if(!('Notification' in window)) return; if(Notification.permission==='default') await Notification.requestPermission(); if(Notification.permission==='granted') new Notification(title,{body}); }
async function reportListing(id){ const reason=prompt('Motiv raportare:'); if(!reason) return; const {error}=await sb.from('reports').insert({listing_id:id,user_id:currentUser.id,reason,message:reason}); if(error){toast(error.message,'error');return;} toast('Raport trimis.'); }
async function openPublicProfile(ownerId){ const {data:p}=await sb.from('profiles').select('*').eq('id',ownerId).maybeSingle(); const items=listings.filter(l=>l.owner_id===ownerId); modal.className='modal open'; modal.innerHTML=`<div class="modal-card"><div class="modal-top"><div><h2 class="page-title">${esc(displayName(p))}</h2><p class="page-sub">${esc(locationName(p))}</p></div><button class="close" onclick="closeModal()">${icon('x')}</button></div><div class="profile-top"><img class="avatar" src="${esc(p?.logo_url||p?.avatar_url||defaultAvatar(displayName(p)))}"><div><h3 class="profile-name">${esc(displayName(p))}</h3><p class="page-sub">${esc(p?.company_description||'Profil public prestator')}</p></div></div><div class="card-actions"><a class="btn btn-soft" href="tel:${esc((p?.phone||'').replace(/\s/g,''))}">${t('call')}</a><a class="btn btn-soft" target="_blank" href="https://wa.me/${esc((p?.whatsapp||p?.phone||'').replace(/\D/g,''))}">${t('whatsapp')}</a></div><div class="divider"></div><h3 class="page-title" style="font-size:16px">Anunțuri publicate</h3><div class="list" style="display:flex;margin-top:10px">${items.length?items.map(renderListingCard).join(''):'<div class="empty"><p>Nu are anunțuri active.</p></div>'}</div></div>`; }
async function installApp(){ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; render(); }
async function logout(){ await sb.auth.signOut(); currentUser=null; profile=null; settings=null; render(); }

(async()=>{ await start(); await loadOwnerProfiles(); render(); })();
</script>
</body>
