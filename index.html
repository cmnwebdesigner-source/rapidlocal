const state = {
  session:null,user:null,profile:null,settings:null,roleChosen:false,
  view:'home',prevView:'home',authMode:'login',loading:true,
  query:'',filterCounty:'',filterCity:'',filterCategory:'',
  listings:[],profilesById:{},imagesByListing:{},favorites:[],notifications:[],conversations:[],messagesByConversation:{},

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function esc(v){return String(v ?? '').replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));}
function t(k){const lang = state.settings?.language || 'ro'; return I18N[lang]?.[k] || I18N.ro[k] || k;}
function toast(msg,type=''){const el=$('#toast');el.textContent=msg;el.className='toast show '+type;clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='toast',2600);}
function setLoading(on){state.loading=on; const splash=$('#splash'); if(!splash)return; splash.classList.toggle('out',!on);}
function countyOptions(selected=''){return `<option value="">${t('all')}</option>`+Object.keys(COUNTIES).map(c=>`<option value="${esc(c)}" ${c===selected?'selected':''}>${esc(c)}</option>`).join('');}
function cityOptions(county, selected=''){const arr = county ? (COUNTIES[county]||[]) : Object.values(COUNTIES).flat().slice(0,140);return `<option value="">${t('all')}</option>`+arr.map(c=>`<option value="${esc(c)}" ${c===selected?'selected':''}>${esc(c)}</option>`).join('');}
function categoryOptions(selected=''){return `<option value="">${t('all')}</option>`+CATEGORIES.map(c=>`<option value="${esc(c)}" ${c===selected?'selected':''}>${esc(c)}</option>`).join('');}
function firstImage(listing){return state.imagesByListing[listing.id]?.[0]?.image_url || state.profilesById[listing.owner_id]?.logo_url || state.profilesById[listing.owner_id]?.avatar_url || PLACEHOLDER;}
function profileName(p){return p?.company_name || p?.full_name || 'AutoRapid user';}
function profileAvatar(p){return p?.logo_url || p?.avatar_url || PLACEHOLDER;}
function isProvider(){return state.profile?.role === 'provider';}
function isSaved(id){return state.favorites.some(f=>f.listing_id===id);}
function formatDate(v){try{return new Intl.DateTimeFormat('ro-RO',{dateStyle:'short',timeStyle:'short'}).format(new Date(v));}catch{return '';}}

function setupManifest(){
  const manifest = {name:'AutoRapid RO',short_name:'AutoRapid',start_url:'/',display:'standalone',background_color:'#ffffff',theme_color:'#ffffff',icons:[{src:PLACEHOLDER,sizes:'192x192',type:'image/svg+xml'},{src:PLACEHOLDER,sizes:'512x512',type:'image/svg+xml'}]};
  const link = document.createElement('link');
  link.rel='manifest';
  link.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(link);
}

async function init(){
  setupManifest();
  window.addEventListener('beforeinstallprompt', e=>{e.preventDefault();state.deferredInstall=e;showInstallBanner();});
  $('#installBtn').addEventListener('click', async()=>{if(state.deferredInstall){state.deferredInstall.prompt();await state.deferredInstall.userChoice;state.deferredInstall=null;hideInstallBanner();}else{toast('Folosește meniul browserului: Add to Home Screen.');}});
  $('#installClose').addEventListener('click', hideInstallBanner);
  if(!sb){setLoading(false);renderAuth('Configurarea Supabase lipsește.');return;}
  const {data} = await sb.auth.getSession();
  state.session=data.session; state.user=data.session?.user || null;
  sb.auth.onAuthStateChange(async (_event, session)=>{state.session=session; state.user=session?.user || null; if(state.user){await bootstrapUser();}else{cleanupSubs();state.profile=null;state.settings=null;state.view='home';renderAuth();}});
  if(state.user){await bootstrapUser();}else{setLoading(false);renderAuth();}
}

async function bootstrapUser(){
  setLoading(true);
  await ensureProfile();
  await loadAll();
  setupRealtime();
  state.roleChosen = localStorage.getItem('autorapid_role_chosen_'+state.user.id) === '1';
  setLoading(false);
  if(!state.roleChosen){state.view='role';}else if(!state.view || state.view==='role'){state.view='home';}
  applyTheme();
  render();
}

async function ensureProfile(){
  const uid=state.user.id;
  let {data:profile,error:pErr}=await sb.from('profiles').select('*').eq('id',uid).maybeSingle();
  if(pErr && pErr.code !== 'PGRST116') console.warn(pErr);
  if(!profile){
    const email=state.user.email || '';
    const {data:newProfile,error}=await sb.from('profiles').insert({id:uid,full_name:email.split('@')[0],email_display:email,role:'client'}).select().single();
    if(error) console.warn(error); profile=newProfile || {id:uid,full_name:email.split('@')[0],email_display:email,role:'client'};
  }
  state.profile=profile;
  let {data:settings,error:sErr}=await sb.from('user_settings').select('*').eq('user_id',uid).maybeSingle();
  if(sErr && sErr.code !== 'PGRST116') console.warn(sErr);
  if(!settings){
    const {data:newSettings,error}=await sb.from('user_settings').insert({user_id:uid,language:'ro',theme:'light',notifications_enabled:true}).select().single();
    if(error) console.warn(error); settings=newSettings || {user_id:uid,language:'ro',theme:'light',notifications_enabled:true};
  }
  state.settings=settings;
}

async function loadAll(){
  await Promise.all([loadListings(),loadFavorites(),loadNotifications(),loadConversations()]);
}

async function loadListings(){
  const {data,error}=await sb.from('listings').select('*').neq('status','deleted').order('created_at',{ascending:false});
  if(error){toast('Nu am putut încărca anunțurile.','error');console.warn(error);return;}
  state.listings=data||[];
  const ownerIds=[...new Set(state.listings.map(l=>l.owner_id).filter(Boolean))];
  state.profilesById={};
  if(ownerIds.length){
    const {data:profiles}=await sb.from('profiles').select('*').in('id',ownerIds);
    (profiles||[]).forEach(p=>state.profilesById[p.id]=p);
  }
  const ids=state.listings.map(l=>l.id);
  state.imagesByListing={};
  if(ids.length){
    const {data:imgs}=await sb.from('listing_images').select('*').in('listing_id',ids).order('position',{ascending:true});
    (imgs||[]).forEach(img=>{if(!state.imagesByListing[img.listing_id])state.imagesByListing[img.listing_id]=[];state.imagesByListing[img.listing_id].push(img);});
  }
}

async function loadFavorites(){
  if(!state.user)return; const {data,error}=await sb.from('favorites').select('*').eq('user_id',state.user.id);
  if(!error) state.favorites=data||[];
}
async function loadNotifications(){
  if(!state.user)return; const {data,error}=await sb.from('notifications').select('*').eq('user_id',state.user.id).order('created_at',{ascending:false}).limit(50);
  if(!error) state.notifications=data||[];
}
async function loadConversations(){
  if(!state.user)return; const uid=state.user.id;
  const {data,error}=await sb.from('conversations').select('*').or(`client_id.eq.${uid},provider_id.eq.${uid}`).order('updated_at',{ascending:false});
  if(!error) state.conversations=data||[];
}

function setupRealtime(){
  cleanupSubs();
  if(!state.user)return;
  const uid=state.user.id;
  const notifCh=sb.channel('notifications_'+uid).on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${uid}`},payload=>{state.notifications=[payload.new,...state.notifications];renderHeader(); if(state.view==='notifications')render(); toast(payload.new.title || 'Notificare nouă','success');}).subscribe();
  const msgCh=sb.channel('messages_'+uid).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`receiver_id=eq.${uid}`},payload=>{const m=payload.new;if(!state.messagesByConversation[m.conversation_id])state.messagesByConversation[m.conversation_id]=[];state.messagesByConversation[m.conversation_id].push(m);loadConversations(); if(state.view==='chat' && state.activeConversation?.id===m.conversation_id)render(); else toast('Ai primit un mesaj nou.','success');}).subscribe();
  state.subscriptions=[notifCh,msgCh];
}
function cleanupSubs(){state.subscriptions.forEach(ch=>sb.removeChannel(ch));state.subscriptions=[];}

function applyTheme(){
  const theme=state.settings?.theme || 'light';
  const dark = theme==='dark' || (theme==='system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.body.classList.toggle('dark',dark);
}

  setLoading(false);
  document.body.classList.remove('dark');
  app.innerHTML = `<div class="auth-wrap"><div class="auth-card">
    <div class="auth-logo"><div class="logo-mark">${icons.car}</div><div><h1>AutoRapid RO</h1><p>Marketplace pentru servicii auto</p></div></div>

    <div class="seg"><button class="${state.authMode==='login'?'active':''}" data-action="auth-mode" data-mode="login">${t('login')}</button><button class="${state.authMode==='register'?'active':''}" data-action="auth-mode" data-mode="register">${t('register')}</button></div>
    <form id="authForm">
      <div class="field"><label class="label">${t('email')}</label><input class="input" name="email" type="email" autocomplete="email" required placeholder="nume@email.com"></div>
      <div class="field"><label class="label">${t('password')}</label><input class="input" name="password" type="password" autocomplete="current-password" minlength="6" required placeholder="Minim 6 caractere"></div>
      <button class="btn gold full" type="submit">${state.authMode==='login'?t('login'):t('register')}</button>

  </div></div>`;
}

function render(){
  if(!state.user){renderAuth();return;}
  applyTheme();
  app.innerHTML = `${renderHeader()}<main class="shell">${renderPage()}</main>${renderBottomNav()}`;
  bindPageAfterRender();
}
function renderHeader(){
  const unread=state.notifications.filter(n=>!n.is_read).length;
  const p=state.profile||{};
  const header=`<header class="topbar"><div class="topbar-inner">
    <button class="brand-row" data-view="home" aria-label="AutoRapid RO"><span class="brand-mini">${icons.car}</span><span class="brand-title">AutoRapid RO</span></button>
    <div class="top-actions">
      <button class="icon-btn" data-view="notifications" aria-label="${t('notifications')}">${icons.bell}${unread?`<span class="notif-dot">${unread>9?'9+':unread}</span>`:''}</button>
      <button class="icon-btn" data-view="profile" aria-label="${t('profile')}"><img class="avatar-sm" src="${esc(profileAvatar(p))}" alt=""></button>
    </div></div></header>`;
  const old=$('.topbar'); if(old) old.outerHTML=header;
  return header;
}
function renderBottomNav(){
  const items=[['home',icons.home,t('home')],['search',icons.search,t('search')],['publish',icons.plus,t('publish')],['saved',icons.heart,t('saved')],['profile',icons.user,t('profile')]];
  return `<nav class="bottom-nav"><div class="bottom-nav-inner">${items.map(([view,icon,label])=>`<button class="nav-item ${state.view===view?'active':''}" data-view="${view}">${icon}<span>${label}</span></button>`).join('')}</div></nav>`;
}
function renderPage(){
  if(state.view==='role')return renderRoleChoice();
  if(state.view==='home' || state.view==='search')return renderHome();
  if(state.view==='publish')return renderPublish();
  if(state.view==='saved')return renderSaved();
  if(state.view==='profile')return renderProfile();
  if(state.view==='editProfile')return renderEditProfile();
  if(state.view==='settings')return renderSettings();
  if(state.view==='feedback')return renderFeedback();
  if(state.view==='inbox')return renderInbox();
  if(state.view==='chat')return renderChat();
  if(state.view==='myListings')return renderMyListings();
  if(state.view==='publicProfile')return renderPublicProfile();
  if(state.view==='notifications')return renderNotifications();
  if(state.view==='terms')return renderTerms();
  return renderHome();

function filteredListings(){
  const q=state.query.trim().toLowerCase();
  return state.listings.filter(l=>{
    if(l.status!=='active')return false;
    if(state.filterCounty && l.county!==state.filterCounty)return false;
    if(state.filterCity && l.city!==state.filterCity)return false;
    if(state.filterCategory && l.category!==state.filterCategory)return false;
    const p=state.profilesById[l.owner_id]||{};
    const hay=[l.title,l.category,l.description,l.city,l.county,l.address,p.company_name,p.full_name,p.company_description].join(' ').toLowerCase();
    return !q || hay.includes(q);
  });
}

app.addEventListener('click', async e=>{
  const btn=e.target.closest('button,[data-view],[data-action]'); if(!btn)return;
  const view=btn.dataset.view; const action=btn.dataset.action;
  if(view){state.prevView=state.view;state.view=view;render();return;}
  if(action==='back'){state.view=state.prevView && state.prevView!==state.view ? state.prevView : 'home';render();return;}
  if(action==='auth-mode'){state.authMode=btn.dataset.mode;renderAuth();return;}
  if(action==='choose-role')return chooseRole(btn.dataset.role);
  if(action==='do-search'){state.query=$('#searchInput')?.value||'';render();return;}
  if(action==='quick-category'){state.filterCategory=state.filterCategory===btn.dataset.category?'':btn.dataset.category;render();return;}
  if(action==='toggle-favorite')return toggleFavorite(btn.dataset.id);
  if(action==='listing-details')return openListingDetails(btn.dataset.id);
  if(action==='call')return callListing(btn.dataset.id);
  if(action==='wa')return whatsappListing(btn.dataset.id);
  if(action==='select-profile-photo'){$('#profilePhoto')?.click();return;}
  if(action==='select-listing-photos'){$('#listingPhotos')?.click();return;}
  if(action==='toggle-setting')return toggleSetting(btn.dataset.name,btn);
  if(action==='logout')return logout();
  if(action==='open-chat')return openChat(btn.dataset.id);
  if(action==='delete-listing')return deleteListing(btn.dataset.id);
  if(action==='edit-listing')return editListing(btn.dataset.id);
  if(action==='mark-notification')return markNotification(btn.dataset.id);
  if(action==='call-profile')return callProfile(btn.dataset.id);
  if(action==='wa-profile')return waProfile(btn.dataset.id);
});

  if(e.target.id==='profilePhoto') handleProfileFile(e.target.files[0]);
  if(e.target.id==='listingPhotos') handleListingFiles(e.target.files);
});

app.addEventListener('submit', async e=>{
  e.preventDefault();
  if(e.target.id==='authForm') return submitAuth(e.target);
  if(e.target.id==='profileForm') return saveProfile(e.target);
  if(e.target.id==='settingsForm') return saveSettings(e.target);
  if(e.target.id==='feedbackForm') return saveFeedback(e.target);
  if(e.target.id==='publishForm') return publishListing(e.target);
  if(e.target.id==='chatForm') return sendMessage(e.target);
});

async function submitAuth(form){
  const fd=new FormData(form); const email=fd.get('email'); const password=fd.get('password');
  form.querySelector('button[type="submit"]').disabled=true;
  let res;
  if(state.authMode==='register') res=await sb.auth.signUp({email,password,options:{data:{full_name:email.split('@')[0]}}});
  else res=await sb.auth.signInWithPassword({email,password});
  form.querySelector('button[type="submit"]').disabled=false;
  if(res.error){toast(res.error.message,'error');return;}
  if(state.authMode==='register' && !res.data.session){await sb.auth.signInWithPassword({email,password});}
  toast(state.authMode==='register'?'Cont creat.':'Bine ai revenit.','success');
}
async function chooseRole(role){
  const {data,error}=await sb.from('profiles').update({role}).eq('id',state.user.id).select().single();
  if(error){toast('Nu am putut salva rolul.','error');return;}
  state.profile=data; localStorage.setItem('autorapid_role_chosen_'+state.user.id,'1'); state.roleChosen=true; state.view='home'; render();
}
async function logout(){await sb.auth.signOut();localStorage.removeItem('autorapid_role_chosen_'+state.user?.id);}

async function uploadFile(file,path){
  const {error}=await sb.storage.from(STORAGE_BUCKET).upload(path,file,{cacheControl:'3600',upsert:true});
  if(error) throw error;
  const {data}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return data.publicUrl;
}
function handleProfileFile(file){if(!file)return; state.profileFile=file; const url=URL.createObjectURL(file); $('#profilePreview').src=url;}
function handleListingFiles(files){state.publishFiles=Array.from(files||[]).slice(0,3); const wrap=$('#photosPreview'); if(!wrap)return; wrap.innerHTML=[0,1,2].map(i=>state.publishFiles[i]?`<button type="button" class="photo-slot" data-action="select-listing-photos"><img src="${esc(URL.createObjectURL(state.publishFiles[i]))}" alt=""></button>`:`<button type="button" class="photo-slot" data-action="select-listing-photos"><small>Poza ${i+1}</small></button>`).join('');}

async function saveProfile(form){
  const fd=new FormData(form); const payload={
    role:fd.get('role'), full_name:fd.get('full_name')||null, company_name:fd.get('company_name')||null, company_description:fd.get('company_description')||null,
    phone:fd.get('phone')||null, whatsapp:fd.get('whatsapp')||null, email_display:fd.get('email_display')||null, schedule:fd.get('schedule')||null,
    county:fd.get('county')||null, city:fd.get('city')||null, address:fd.get('address')||null, price_hint:fd.get('price_hint')||null
  };
  try{
    if(state.profileFile){const ext=(state.profileFile.name.split('.').pop()||'jpg').toLowerCase(); const url=await uploadFile(state.profileFile,`${state.user.id}/profile/avatar.${ext}`); payload.avatar_url=url; payload.logo_url=url;}
    const {data,error}=await sb.from('profiles').update(payload).eq('id',state.user.id).select().single();
    if(error)throw error; state.profile=data; state.profileFile=null; localStorage.setItem('autorapid_role_chosen_'+state.user.id,'1'); await loadListings(); toast('Profil salvat.','success'); state.view='profile'; render();
  }catch(err){console.warn(err);toast('Nu am putut salva profilul.','error');}
}
async function saveSettings(form){
  const fd=new FormData(form); const settings={language:fd.get('language'),theme:fd.get('theme'),notifications_enabled:fd.get('notifications_enabled')==='1',sound_enabled:fd.get('sound_enabled')==='1',vibration_enabled:fd.get('vibration_enabled')==='1',show_phone:fd.get('show_phone')==='1',show_city:fd.get('show_city')==='1',allow_messages:fd.get('allow_messages')==='1'};
  const profile={profile_visibility:fd.get('profile_visibility'),is_24_7:fd.get('is_24_7')==='1',works_at_client_location:fd.get('works_at_client_location')==='1'};
  const [sRes,pRes]=await Promise.all([sb.from('user_settings').update(settings).eq('user_id',state.user.id).select().single(),sb.from('profiles').update(profile).eq('id',state.user.id).select().single()]);
  if(sRes.error||pRes.error){toast('Nu am putut salva setările.','error');return;}
  state.settings=sRes.data; state.profile=pRes.data; toast('Setări salvate.','success'); render();
}
function toggleSetting(name,btn){const input=document.querySelector(`input[name="${CSS.escape(name)}"]`); const on=input.value!=='1'; input.value=on?'1':'0'; btn.classList.toggle('on',on);}
async function saveFeedback(form){const fd=new FormData(form); const {error}=await sb.from('feedback').insert({user_id:state.user.id,category:fd.get('category'),message:fd.get('message')}); if(error){toast('Nu am putut trimite feedback.','error');return;} form.reset(); toast('Feedback trimis.','success'); state.view='profile'; render();}

async function publishListing(form){
  if(!providerProfileComplete()){toast(t('completeProfile'),'error');return;}
  const fd=new FormData(form); const p=state.profile;
  const payload={owner_id:state.user.id,title:`${fd.get('category')} - ${profileName(p)}`,category:fd.get('category'),description:fd.get('description'),county:p.county,city:p.city,address:p.address,phone:p.phone,whatsapp:p.whatsapp||p.phone,schedule:p.schedule,price_hint:p.price_hint,promotion_type:fd.get('promotion_type'),status:'active'};
  try{
    const {data,error}=await sb.from('listings').insert(payload).select().single(); if(error)throw error;
    for(let i=0;i<state.publishFiles.length;i++){const file=state.publishFiles[i]; const ext=(file.name.split('.').pop()||'jpg').toLowerCase(); const path=`${state.user.id}/listings/${data.id}-${i+1}.${ext}`; const url=await uploadFile(file,path); await sb.from('listing_images').insert({listing_id:data.id,user_id:state.user.id,image_url:url,storage_path:path,position:i+1});}
    state.publishFiles=[]; await loadListings(); toast('Anunț publicat.','success'); state.view='myListings'; render();
  }catch(err){console.warn(err);toast(err.message || 'Nu am putut publica anunțul.','error');}
}
async function deleteListing(id){if(!confirm('Ștergi anunțul?'))return; const {error}=await sb.from('listings').update({status:'deleted'}).eq('id',id).eq('owner_id',state.user.id); if(error){toast('Nu am putut șterge.','error');return;} await loadListings(); toast('Anunț șters.','success'); render();}
function editListing(id){const l=state.listings.find(x=>x.id===id); if(!l)return; showEditListing(l);}

async function toggleFavorite(id){
  if(isSaved(id)){const {error}=await sb.from('favorites').delete().eq('user_id',state.user.id).eq('listing_id',id); if(error){toast('Eroare la salvare.','error');return;}}
  else{const {error}=await sb.from('favorites').insert({user_id:state.user.id,listing_id:id}); if(error){toast('Eroare la salvare.','error');return;}}
  await loadFavorites(); render();
}
function callListing(id){const l=state.listings.find(x=>x.id===id); if(l?.phone){sb.from('listings').update({phone_clicks_count:(l.phone_clicks_count||0)+1}).eq('id',id).then(()=>{}); location.href=`tel:${l.phone.replace(/\s/g,'')}`;}else toast('Telefon indisponibil.');}
function whatsappListing(id){const l=state.listings.find(x=>x.id===id); const nr=(l?.whatsapp||l?.phone||'').replace(/\D/g,''); if(nr){sb.from('listings').update({whatsapp_clicks_count:(l.whatsapp_clicks_count||0)+1}).eq('id',id).then(()=>{}); window.open(`https://wa.me/${nr.startsWith('40')?nr:'40'+nr}?text=${encodeURIComponent('Salut! Am găsit anunțul tău pe AutoRapid RO.')}`,'_blank');}else toast('WhatsApp indisponibil.');}
function callProfile(id){const p=state.profilesById[id]||state.profile;if(p?.phone)location.href=`tel:${p.phone.replace(/\s/g,'')}`;}
function waProfile(id){const p=state.profilesById[id]||state.profile;const nr=(p?.whatsapp||p?.phone||'').replace(/\D/g,'');if(nr)window.open(`https://wa.me/${nr.startsWith('40')?nr:'40'+nr}`,'_blank');}

function openListingDetails(id){const l=state.listings.find(x=>x.id===id); if(!l)return; state.selectedListing=l; const p=state.profilesById[l.owner_id]||{}; sb.from('listings').update({views_count:(l.views_count||0)+1}).eq('id',id).then(()=>{});
  modal.innerHTML=`<div class="sheet"><div class="sheet-head"><h3 class="sheet-title">${esc(l.category)}</h3><button class="close" data-modal-close>${icons.close}</button></div><img class="details-img" src="${esc(firstImage(l))}" alt=""><h2 class="profile-name">${esc(profileName(p))}</h2><p class="info-line">${esc(l.description)}</p><div class="details-row"><div class="info-line"><b>Locație</b><br>${esc([l.city,l.county].filter(Boolean).join(', ')||'-')}</div><div class="info-line"><b>Program</b><br>${esc(l.schedule||'-')}</div><div class="info-line"><b>Preț</b><br>${esc(l.price_hint||'-')}</div><div class="info-line"><b>Adresă</b><br>${esc(l.address||'-')}</div></div><div class="details-row"><button class="btn soft" data-action="modal-call" data-id="${esc(l.id)}">${t('call')}</button><button class="btn gold" data-action="modal-wa" data-id="${esc(l.id)}">${t('whatsapp')}</button><button class="btn soft" data-action="modal-message" data-id="${esc(l.id)}">${t('message')}</button><button class="btn soft" data-action="modal-profile" data-id="${esc(l.owner_id)}">${t('viewProfile')}</button></div><button class="btn ghost full" data-action="modal-report" data-id="${esc(l.id)}">${t('report')}</button></div>`;
  modal.classList.add('show');
}
modal.addEventListener('click', async e=>{
  if(e.target===modal || e.target.closest('[data-modal-close]')){modal.classList.remove('show');return;}
  const btn=e.target.closest('button[data-action]'); if(!btn)return;
  const id=btn.dataset.id; const action=btn.dataset.action;
  if(action==='modal-call')callListing(id);
  if(action==='modal-wa')whatsappListing(id);
  if(action==='modal-profile'){modal.classList.remove('show');state.selectedProfileId=id;state.prevView=state.view;state.view='publicProfile';render();}
  if(action==='modal-message'){modal.classList.remove('show');await startConversation(id);}
  if(action==='modal-report')showReport(id);
});
function showReport(id){modal.innerHTML=`<div class="sheet"><div class="sheet-head"><h3 class="sheet-title">Raportează anunț</h3><button class="close" data-modal-close>${icons.close}</button></div><form id="reportForm"><input type="hidden" name="listing_id" value="${esc(id)}"><div class="field"><label class="label">Motiv</label><select name="reason" class="select"><option>Informații false</option><option>Spam</option><option>Conținut nepotrivit</option><option>Altceva</option></select></div><div class="field"><label class="label">Detalii</label><textarea class="textarea" name="message"></textarea></div><button class="btn gold full" type="submit">Trimite raport</button></form></div>`;}
modal.addEventListener('submit', async e=>{if(e.target.id==='reportForm'){e.preventDefault();const fd=new FormData(e.target);const {error}=await sb.from('reports').insert({listing_id:fd.get('listing_id'),user_id:state.user.id,reason:fd.get('reason'),message:fd.get('message')});if(error){toast('Nu am putut trimite raportul.','error');return;}modal.classList.remove('show');toast('Raport trimis.','success');}});
function showEditListing(l){modal.innerHTML=`<div class="sheet"><div class="sheet-head"><h3 class="sheet-title">Editează anunț</h3><button class="close" data-modal-close>${icons.close}</button></div><form id="editListingForm"><input type="hidden" name="id" value="${esc(l.id)}"><div class="field"><label class="label">Categorie</label><select name="category" class="select">${categoryOptions(l.category)}</select></div><div class="field"><label class="label">Descriere</label><textarea name="description" class="textarea" required>${esc(l.description)}</textarea></div><div class="field"><label class="label">Status</label><select name="status" class="select"><option value="active" ${l.status==='active'?'selected':''}>Activ</option><option value="inactive" ${l.status==='inactive'?'selected':''}>Inactiv</option></select></div><button class="btn gold full" type="submit">Salvează modificările</button></form></div>`;modal.classList.add('show');}
modal.addEventListener('submit',async e=>{if(e.target.id==='editListingForm'){e.preventDefault();const fd=new FormData(e.target);const {error}=await sb.from('listings').update({category:fd.get('category'),description:fd.get('description'),status:fd.get('status')}).eq('id',fd.get('id')).eq('owner_id',state.user.id);if(error){toast('Nu am putut salva anunțul.','error');return;}modal.classList.remove('show');await loadListings();toast('Anunț actualizat.','success');render();}});

async function startConversation(listingId){
  const l=state.listings.find(x=>x.id===listingId); if(!l)return; if(l.owner_id===state.user.id){toast('Acesta este anunțul tău.');return;}
  const client_id=state.user.id, provider_id=l.owner_id;
  let {data,error}=await sb.from('conversations').select('*').eq('listing_id',listingId).eq('client_id',client_id).eq('provider_id',provider_id).maybeSingle();
  if(error && error.code!=='PGRST116'){toast('Nu am putut deschide conversația.','error');return;}
  if(!data){const res=await sb.from('conversations').insert({listing_id:listingId,client_id,provider_id,last_message:'',last_message_at:new Date().toISOString()}).select().single(); if(res.error){toast('Nu am putut crea conversația.','error');return;} data=res.data;}
  state.activeConversation=data; await loadConversations(); await loadMessages(data.id); state.prevView=state.view; state.view='chat'; render();
}
async function openChat(id){const c=state.conversations.find(x=>x.id===id); if(!c)return; state.activeConversation=c; await loadMessages(id); state.prevView=state.view; state.view='chat'; render();}
async function loadMessages(conversationId){const {data,error}=await sb.from('messages').select('*').eq('conversation_id',conversationId).order('created_at',{ascending:true}); if(!error)state.messagesByConversation[conversationId]=data||[]; await sb.from('messages').update({is_read:true}).eq('conversation_id',conversationId).eq('receiver_id',state.user.id);}
async function sendMessage(form){const msg=new FormData(form).get('message').trim(); if(!msg||!state.activeConversation)return; const c=state.activeConversation; const receiver=c.client_id===state.user.id?c.provider_id:c.client_id; const payload={conversation_id:c.id,sender_id:state.user.id,receiver_id:receiver,message:msg}; const {data,error}=await sb.from('messages').insert(payload).select().single(); if(error){toast('Mesajul nu a fost trimis.','error');return;} if(!state.messagesByConversation[c.id])state.messagesByConversation[c.id]=[]; state.messagesByConversation[c.id].push(data); await sb.from('conversations').update({last_message:msg,last_message_at:new Date().toISOString()}).eq('id',c.id); await sb.from('notifications').insert({user_id:receiver,type:'message',title:'Mesaj nou',message:msg,related_conversation_id:c.id,related_listing_id:c.listing_id}); form.reset(); await loadConversations(); render();}
async function markNotification(id){await sb.from('notifications').update({is_read:true}).eq('id',id).eq('user_id',state.user.id); await loadNotifications(); render();}

function showInstallBanner(){const b=$('#installBanner'); if(b)b.classList.add('show');}
function hideInstallBanner(){const b=$('#installBanner'); if(b)b.classList.remove('show');}

init().catch(err=>{console.error(err);setLoading(false);toast('Aplicația nu a pornit corect.','error');});
</script>
</body>
</html>
