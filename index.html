    function compressImage(file, maxSize = 300, quality = 0.7) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type.startsWith("image/")) {
          reject(new Error("Fișierul nu este o imagine."));
          return;
        }

        const reader = new FileReader();

        reader.onload = (event) => {
          const img = new Image();

          img.onload = () => {
            const canvas = document.createElement("canvas");
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxSize) {
                height = Math.round((height * maxSize) / width);
                width = maxSize;
              }
            } else {
              if (height > maxSize) {
                width = Math.round((width * maxSize) / height);
                height = maxSize;
              }
            }

            canvas.width = Math.max(1, width);
            canvas.height = Math.max(1, height);

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const compressedDataUrl = canvas.toDataURL("image/jpeg", quality);
            resolve(compressedDataUrl);
          };

          img.onerror = () => reject(new Error("Imaginea nu poate fi procesată."));
          img.src = event.target.result;
        };

        reader.onerror = () => reject(new Error("Nu am putut citi imaginea."));
        reader.readAsDataURL(file);
      });
    }

            item.category.toLowerCase().includes(text) ||

      }

      function getPhoneLink(phone) {
        const cleanPhone = phone?.replace(/\s/g, "") || "";
        return cleanPhone ? `tel:${cleanPhone}` : "#";
      }

      async function handleProfilePhoto(file) {
        if (!file) return;

        setIsProcessingImage(true);

        try {
          const compressed = await compressImage(file, 300, 0.7);
          setDraftProfile((current) => ({ ...current, photo: compressed }));
          setNotice("Poza a fost comprimată automat.");
        } catch {
          setNotice("Nu am putut procesa poza.");
        } finally {
          setIsProcessingImage(false);
        }
      }

      async function handleListingPhoto(file) {
        if (!file) return;

        setIsProcessingImage(true);

        try {
          const compressed = await compressImage(file, 300, 0.7);
          setForm((current) => ({ ...current, image: compressed }));
          setNotice("Imaginea anunțului a fost comprimată automat.");
        } catch {
          setNotice("Nu am putut procesa imaginea.");
        } finally {
          setIsProcessingImage(false);
        }
      }

      function handlePublish(event) {
        event.preventDefault();

        if (!form.title.trim() || !form.phone.trim() || !form.description.trim()) {
          setNotice("Completează titlul, telefonul și descrierea.");
          return;
        }

        const newListing = {
          id: `user-${Date.now()}`,
          title: form.title.trim(),
          category: form.category,
          county: form.county,
          city: form.city,
          location: `${form.city}, ${form.county}`,
          price: form.price.trim() || "Preț la cerere",
          rating: 5,
          phone: form.phone.trim(),
          whatsapp: form.whatsapp.trim(),
          promoted: false,
          image: form.image || makePlaceholder(form.title.trim(), form.category),
          description: form.description.trim()
        };

        const nextListings = [newListing, ...userListings];

        if (saveUserListings(nextListings)) {
          setForm({
            title: "",
            category: "Tractări",
            county: "București",
            city: "Sector 1",
            phone: "",
            whatsapp: "",
            price: "",
            description: "",
            image: ""
          });
          setPage("home");
          setNotice("Anunț publicat cu succes.");
        }
      }

      function handleProfileSave(event) {
        event.preventDefault();

        const currentEditsLeft = Number(profile.nameEditsLeft ?? 2);
        const nameChanged = draftProfile.name.trim() !== profile.name.trim();

        if (nameChanged && currentEditsLeft <= 0) {
          setNotice("Nu mai poți modifica numele.");
          return;
        }

        const nextProfile = {
          ...defaultProfile,
          ...draftProfile,
          name: draftProfile.name.trim() || defaultProfile.name,
          about: draftProfile.about.slice(0, 100),
          nameEditsLeft: Math.max(0, currentEditsLeft - (nameChanged ? 1 : 0))
        };

        saveProfile(nextProfile);
      }

      function resetFilters() {
        setQuery("");
        setActiveCategory("Toate");
        setFilterCounty("");
        setFilterCity("");
      }

      const savedListings = listings.filter((item) => favorites.includes(item.id));

      const themeClass = isDark ? "bg-[#090909] text-white" : "soft-gradient text-ink";

      return (
        <div className={`native-screen ${themeClass}`}>
          <DesktopNav
            page={page}
            setPage={setPage}
            isDark={isDark}
            setIsDark={setIsDark}
          />

          <main className="mx-auto w-full max-w-3xl px-3 pt-3 safe-bottom md:pb-10 md:pt-6">
            {page === "home" && (
              <HomeScreen
                query={query}
                setQuery={setQuery}
                activeCategory={activeCategory}
                setActiveCategory={setActiveCategory}
                filterCounty={filterCounty}
                setFilterCounty={setFilterCounty}
                filterCity={filterCity}
                setFilterCity={setFilterCity}
                availableCities={availableCities}
                listings={filteredListings}
                favorites={favorites}
                toggleFavorite={toggleFavorite}
                setSelectedListing={setSelectedListing}
                resetFilters={resetFilters}
                isDark={isDark}
              />
            )}

            {page === "search" && (
              <SearchScreen
                query={query}
                setQuery={setQuery}
                activeCategory={activeCategory}
                setActiveCategory={setActiveCategory}
                filterCounty={filterCounty}
                setFilterCounty={setFilterCounty}
                filterCity={filterCity}
                setFilterCity={setFilterCity}
                availableCities={availableCities}
                listings={filteredListings}
                favorites={favorites}
                toggleFavorite={toggleFavorite}
                setSelectedListing={setSelectedListing}
                resetFilters={resetFilters}
                isDark={isDark}
              />
            )}

            {page === "publish" && (
              <PublishScreen
                form={form}
                setForm={setForm}
                formCities={formCities}
                handlePublish={handlePublish}
                handleListingPhoto={handleListingPhoto}
                isProcessingImage={isProcessingImage}
                isDark={isDark}
              />
            )}

            {page === "saved" && (
              <SavedScreen
                savedListings={savedListings}
                favorites={favorites}
                toggleFavorite={toggleFavorite}
                setSelectedListing={setSelectedListing}
                setPage={setPage}
                isDark={isDark}
              />
            )}

            {page === "profile" && (
              <ProfileScreen
                profile={profile}
                setDraftProfile={setDraftProfile}
                setPage={setPage}
                userListings={userListings}
                savedCount={savedListings.length}
                isDark={isDark}
                setIsDark={setIsDark}
              />
            )}

            {page === "editProfile" && (
              <EditProfileScreen
                profile={profile}
                draftProfile={draftProfile}
                setDraftProfile={setDraftProfile}
                handleProfileSave={handleProfileSave}
                handleProfilePhoto={handleProfilePhoto}
                isProcessingImage={isProcessingImage}
                setPage={setPage}
                isDark={isDark}
              />
            )}
          </main>

          <BottomNav page={page} setPage={setPage} />

          {selectedListing && (
            <ListingDetails
              listing={selectedListing}
              onClose={() => setSelectedListing(null)}
              isFavorite={favorites.includes(selectedListing.id)}
              toggleFavorite={toggleFavorite}
              getWhatsappLink={getWhatsappLink}
              getPhoneLink={getPhoneLink}
              isDark={isDark}
            />
          )}

          {notice && (
            <div className="fixed left-1/2 top-4 z-[80] w-[calc(100%-24px)] max-w-sm -translate-x-1/2 rounded-2xl border border-gold-300/50 bg-ink px-4 py-3 text-center text-xs font-semibold text-white shadow-gold">
              {notice}
            </div>
          )}
        </div>
      );
    }

              </div>
              <h2 className="mt-4 text-sm font-black">Nu ai anunțuri salvate.</h2>
              <p className="mt-1 text-xs text-black/55 dark:text-white/55">
                Salvează anunțurile importante și le găsești rapid aici.
              </p>
              <button
                onClick={() => setPage("home")}
                className="mt-4 h-10 rounded-2xl bg-gold-500 px-5 text-xs font-black text-black shadow-gold"
              >
                Vezi anunțuri
              </button>
            </div>
          )}
        </div>
      );
    }

    function ProfileScreen({
      profile,
      setDraftProfile,
      setPage,
      userListings,
      savedCount,
      isDark,
      setIsDark
    }) {
      return (
        <div className="space-y-3">
          <section className={`rounded-[28px] p-4 shadow-soft ${
            isDark ? "bg-white/10" : "bg-white/95"
          }`}>
            <div className="flex items-center gap-3">
              <div className="h-16 w-16 overflow-hidden rounded-3xl bg-gold-500 text-black">
                {profile.photo ? (
                  <img src={profile.photo} alt="Profil" className="h-full w-full object-cover" />
                ) : (
                  <div className="flex h-full w-full items-center justify-center text-lg font-black">
                    {profile.name.slice(0, 2).toUpperCase()}
                  </div>
                )}
              </div>

              <div className="min-w-0 flex-1">
                <h1 className="truncate text-lg font-black">{profile.name}</h1>
                <p className="text-xs text-black/55 dark:text-white/55">
                  {profile.city}, {profile.country}
                </p>
                <p className="mt-1 text-[11px] font-bold text-gold-700 dark:text-gold-300">
                  Modificări nume rămase: {profile.nameEditsLeft}
                </p>
              </div>
            </div>

            {profile.about && (
              <p className="mt-4 rounded-2xl bg-black/[.035] p-3 text-xs leading-relaxed text-black/65 dark:bg-white/10 dark:text-white/70">
                {profile.about}
              </p>
            )}

            <button
              onClick={() => {
                setDraftProfile(profile);
                setPage("editProfile");
              }}
              className="mt-4 h-11 w-full rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold"
            >
              Editează Profil
            </button>
          </section>

          <div className="grid grid-cols-2 gap-3">
            <StatCard label="Anunțurile mele" value={userListings.length} isDark={isDark} />
            <StatCard label="Salvate" value={savedCount} isDark={isDark} />
          </div>

          <section className={`rounded-[26px] p-3 shadow-soft ${
            isDark ? "bg-white/10" : "bg-white/95"
          }`}>
            <ProfileButton
              icon={<MessageIcon className="h-5 w-5" />}
              title="Inbox"
              subtitle="Mesaje și notificări demo"
            />
            <ProfileButton
              icon={<SettingsIcon className="h-5 w-5" />}
              title="Setări aplicație"
              subtitle="Temă, limbă și preferințe"
              right={
                <button
                  onClick={() => setIsDark((current) => !current)}
                  className="rounded-full bg-black px-3 py-1.5 text-[11px] font-black text-gold-300 dark:bg-white dark:text-black"
                >
                  {isDark ? "Light" : "Dark"}
                </button>
              }
            />
            <ProfileButton
              icon={<HeartIcon className="h-5 w-5" />}
              title="Spune-ne părerea ta"
              subtitle="Feedback: design, anunțuri, profil, mesaje"
            />
          </section>
        </div>
      );
    }

    function StatCard({ label, value, isDark }) {
      return (
        <div className={`rounded-[24px] p-4 shadow-soft ${
          isDark ? "bg-white/10" : "bg-white/95"
        }`}>
          <p className="text-2xl font-black text-gold-600 dark:text-gold-300">{value}</p>
          <p className="text-xs font-bold text-black/55 dark:text-white/55">{label}</p>
        </div>
      );
    }

    function ProfileButton({ icon, title, subtitle, right }) {
      return (
        <div className="flex items-center gap-3 rounded-2xl px-2 py-3">
          <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl bg-gold-500/15 text-gold-700 dark:text-gold-300">
            {icon}
          </div>
          <div className="min-w-0 flex-1">
            <p className="text-sm font-black">{title}</p>
            <p className="text-xs text-black/50 dark:text-white/50">{subtitle}</p>
          </div>
          {right}
        </div>
      );
    }

    function EditProfileScreen({
      profile,
      draftProfile,
      setDraftProfile,
      handleProfileSave,
      handleProfilePhoto,
      isProcessingImage,
      setPage,
      isDark
    }) {
      const nameLocked = Number(profile.nameEditsLeft ?? 0) <= 0;

      function updateProfileField(field, value) {
        setDraftProfile((current) => ({ ...current, [field]: value }));
      }

      return (
        <div className="space-y-3">
          <div className={`rounded-[26px] p-4 shadow-soft ${
            isDark ? "bg-white/10" : "bg-white/95"
          }`}>
            <button
              onClick={() => setPage("profile")}
              className="mb-3 flex items-center gap-1 text-xs font-black text-gold-700 dark:text-gold-300"
            >
              <BackIcon className="h-4 w-4" />
              Înapoi
            </button>

            <h1 className="text-lg font-black">Editează Profil</h1>
            <p className="mt-1 text-xs text-black/55 dark:text-white/55">
              Datele se salvează local în browser. Pozele sunt comprimate automat.
            </p>
          </div>

          <form onSubmit={handleProfileSave} className={`rounded-[26px] p-4 shadow-soft ${
            isDark ? "bg-white/10" : "bg-white/95"
          }`}>
            <div className="space-y-3">
              <div className="flex items-center gap-3">
                <div className="h-20 w-20 overflow-hidden rounded-3xl bg-gold-500 text-black">
                  {draftProfile.photo ? (
                    <img src={draftProfile.photo} alt="Profil" className="h-full w-full object-cover" />
                  ) : (
                    <div className="flex h-full w-full items-center justify-center text-xl font-black">
                      {draftProfile.name.slice(0, 2).toUpperCase()}
                    </div>
                  )}
                </div>

                <label className="flex flex-1 cursor-pointer items-center justify-center gap-2 rounded-2xl border border-dashed border-gold-400 px-3 py-3 text-xs font-black text-gold-700 dark:text-gold-300">
                  <CameraIcon className="h-4 w-4" />
                  Fotografia ta
                  <input
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={(event) => handleProfilePhoto(event.target.files?.[0])}
                  />
                </label>
              </div>

              <label className="block">
                <span className="mb-1 block text-xs font-black">
                  Nume {nameLocked ? "(blocat)" : `(mai poți edita de ${profile.nameEditsLeft} ori)`}
                </span>
                <input
                  value={draftProfile.name}
                  disabled={nameLocked}
                  onChange={(event) => updateProfileField("name", event.target.value)}
                  className="h-10 w-full rounded-2xl border border-black/5 bg-black/[.035] px-3 text-sm font-semibold outline-none disabled:opacity-50 focus:border-gold-400 dark:border-white/10 dark:bg-white/10"
                />
              </label>

              <label className="block">
                <span className="mb-1 flex items-center justify-between text-xs font-black">
                  <span>Despre tine</span>
                  <span className="text-[11px] text-black/45 dark:text-white/45">
                    {draftProfile.about.length}/100
                  </span>
                </span>
                <textarea
                  value={draftProfile.about}
                  maxLength="100"
                  onChange={(event) => updateProfileField("about", event.target.value.slice(0, 100))}
                  rows="3"
                  placeholder="Scrie scurt despre tine..."
                  className="w-full resize-none rounded-2xl border border-black/5 bg-black/[.035] px-3 py-3 text-sm font-semibold outline-none focus:border-gold-400 dark:border-white/10 dark:bg-white/10"
                />
              </label>

              <div className="grid grid-cols-2 gap-2">
                <label className="block">
                  <span className="mb-1 block text-xs font-black">Țară</span>
                  <select
                    value={draftProfile.country}
                    onChange={(event) => updateProfileField("country", event.target.value)}
                    className="h-10 w-full rounded-2xl border border-black/5 bg-black/[.035] px-3 text-xs font-bold outline-none focus:border-gold-400 dark:border-white/10 dark:bg-white/10"
                  >
                    <option>România</option>
                    <option>Italia</option>
                    <option>Germania</option>
                    <option>Spania</option>
                  </select>
                </label>

                <label className="block">
                  <span className="mb-1 block text-xs font-black">Limbă</span>
                  <select
                    value={draftProfile.language}
                    onChange={(event) => updateProfileField("language", event.target.value)}
                    className="h-10 w-full rounded-2xl border border-black/5 bg-black/[.035] px-3 text-xs font-bold outline-none focus:border-gold-400 dark:border-white/10 dark:bg-white/10"
                  >
                    <option>Română</option>
                    <option>Engleză</option>
                    <option>Italiană</option>
                  </select>
                </label>
              </div>

              <label className="block">
                <span className="mb-1 block text-xs font-black">Localitate / oraș</span>
                <input
                  value={draftProfile.city}
                  onChange={(event) => updateProfileField("city", event.target.value)}
                  placeholder="Ex: București"
                  className="h-10 w-full rounded-2xl border border-black/5 bg-black/[.035] px-3 text-sm font-semibold outline-none focus:border-gold-400 dark:border-white/10 dark:bg-white/10"
                />
              </label>

              <button
                type="submit"
                disabled={isProcessingImage}
                className="h-12 w-full rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold disabled:opacity-60"
              >
                {isProcessingImage ? "Procesez poza..." : "Salvează Profil"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function ListingDetails({
      listing,
      onClose,
      isFavorite,
      toggleFavorite,
      getWhatsappLink,
      getPhoneLink,
      isDark
    }) {
      return (
        <div className="fixed inset-0 z-[70] bg-black/55 p-3 backdrop-blur-md">
          <div className={`modal-enter mx-auto flex h-full max-w-2xl flex-col overflow-hidden rounded-[30px] shadow-2xl ${
            isDark ? "bg-[#111] text-white" : "bg-soft text-ink"
          }`}>
            <div className="relative h-64 shrink-0 bg-black">
              <img src={listing.image} alt={listing.title} className="h-full w-full object-cover opacity-95" />
              <button
                onClick={onClose}
                className="absolute left-3 top-3 flex h-10 w-10 items-center justify-center rounded-full bg-black/65 text-white backdrop-blur"
              >
                <BackIcon className="h-5 w-5" />
              </button>
              <button
                onClick={() => toggleFavorite(listing.id)}
                className={`absolute right-3 top-3 flex h-10 w-10 items-center justify-center rounded-full backdrop-blur ${
                  isFavorite ? "bg-gold-500 text-black" : "bg-black/65 text-white"
                }`}
              >
                <HeartIcon className="h-5 w-5" filled={isFavorite} />
              </button>
            </div>

            <div className="no-scrollbar flex-1 overflow-y-auto p-4">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <p className="text-xs font-black text-gold-700 dark:text-gold-300">{listing.category}</p>
                  <h2 className="mt-1 text-xl font-black leading-tight">{listing.title}</h2>
                </div>
                <span className="flex shrink-0 items-center gap-1 rounded-full bg-gold-500/15 px-3 py-1 text-xs font-black text-gold-700 dark:text-gold-300">
                  <StarIcon className="h-3.5 w-3.5" />
                  {listing.rating}
                </span>
              </div>

              <div className="mt-3 flex items-center gap-2 text-xs text-black/55 dark:text-white/55">
                <PinIcon className="h-4 w-4" />
                <span>{listing.location}</span>
              </div>

              <div className="mt-4 rounded-3xl bg-white/80 p-4 shadow-soft dark:bg-white/10">
                <p className="text-xs font-black text-black/45 dark:text-white/45">Preț orientativ</p>
                <p className="mt-1 text-lg font-black text-gold-700 dark:text-gold-300">{listing.price}</p>
              </div>

              <div className="mt-4">
                <h3 className="text-sm font-black">Descriere</h3>
                <p className="mt-2 text-sm leading-relaxed text-black/65 dark:text-white/68">
                  {listing.description}
                </p>
              </div>

              <div className="mt-4 rounded-3xl bg-white/80 p-4 text-xs leading-relaxed text-black/55 shadow-soft dark:bg-white/10 dark:text-white/60">
                <p className="font-black text-black dark:text-white">Siguranță</p>
                <p className="mt-1">
                  Verifică întotdeauna datele firmei înainte de colaborare. AutoRapid RO este demo local, fără plăți reale.
                </p>
              </div>
            </div>

            <div className="grid shrink-0 grid-cols-2 gap-2 border-t border-black/5 bg-white/90 p-3 dark:border-white/10 dark:bg-black/80">
              <a
                href={getPhoneLink(listing.phone)}
                className="flex h-12 items-center justify-center gap-2 rounded-2xl bg-ink text-sm font-black text-white dark:bg-white dark:text-black"
              >
                <PhoneIcon className="h-4 w-4" />
                Sună
              </a>
              <a
                href={getWhatsappLink(listing)}
                target="_blank"
                rel="noreferrer"
                className="flex h-12 items-center justify-center gap-2 rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold"
              >
                <WhatsAppIcon className="h-4 w-4" />
                WhatsApp
              </a>
            </div>
          </div>
        </div>
      );
    }

    function BottomNav({ page, setPage }) {
      const navItems = [
        { id: "home", label: "Acasă", icon: <HomeIcon className="h-5 w-5" /> },
        { id: "search", label: "Caută", icon: <SearchIcon className="h-5 w-5" /> },
        { id: "publish", label: "Publică", icon: <PlusIcon className="h-6 w-6" />, main: true },
        { id: "saved", label: "Salvate", icon: <HeartIcon className="h-5 w-5" /> },
        { id: "profile", label: "Profil", icon: <UserIcon className="h-5 w-5" /> }
      ];

      return (
        <nav className="fixed bottom-0 left-0 right-0 z-50 border-t border-black/5 bg-white/92 px-2 pb-[calc(8px+env(safe-area-inset-bottom))] pt-2 shadow-[0_-18px_40px_rgba(17,17,17,.08)] backdrop-blur-xl md:hidden">
          <div className="mx-auto grid max-w-md grid-cols-5 items-end gap-1">
            {navItems.map((item) => (
              <button
                key={item.id}
                onClick={() => setPage(item.id)}
                className={`flex flex-col items-center justify-center gap-1 rounded-2xl text-[10px] font-black transition ${
                  item.main
                    ? "-mt-7 h-16 bg-gold-500 text-black shadow-gold"
                    : page === item.id
                      ? "h-14 text-gold-700"
                      : "h-14 text-black/45"
                }`}
              >
                <span className={item.main ? "flex h-9 w-9 items-center justify-center rounded-full bg-black text-gold-400" : ""}>
                  {item.icon}
                </span>
                <span>{item.label}</span>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
