        // --- COMPONENTA PRINCIPALĂ ---
        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [savedAds, setSavedAds] = useState([]);
            const [selectedAd, setSelectedAd] = useState(null);
            const [currentView, setCurrentView] = useState('main'); 
            
            // Bug Fix: Persistăm toate anunțurile (allAds) pentru ca noile publicații să nu dispară la refresh
            const [allAds, setAllAds] = useState(() => {
                const savedAllAds = localStorage.getItem('autorapid_allAds');
                return savedAllAds ? JSON.parse(savedAllAds) : DEMO_ADS;
            });
            
            // Inițializare LocalStorage & Dark Mode
            useEffect(() => {
                const localSaved = localStorage.getItem('autorapid_saved');
                if (localSaved) setSavedAds(JSON.parse(localSaved));
                
                const localTheme = localStorage.getItem('autorapid_theme');
                if (localTheme === 'dark') {
                    setIsDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('autorapid_saved', JSON.stringify(savedAds));
            }, [savedAds]);

            useEffect(() => {
                localStorage.setItem('autorapid_allAds', JSON.stringify(allAds));
            }, [allAds]);

            const toggleSaveAd = (id, e) => {
                if(e) e.stopPropagation();
                if (savedAds.includes(id)) {
                    setSavedAds(savedAds.filter(adId => adId !== id));
                } else {
                    setSavedAds([...savedAds, id]);
                }
            };

            const toggleTheme = () => {
                const newMode = !isDarkMode;
                setIsDarkMode(newMode);
                localStorage.setItem('autorapid_theme', newMode ? 'dark' : 'light');
                if (newMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setCurrentView('main');
                window.scrollTo(0, 0);
            };

            // Am actualizat paleta către auriu autentic (Gold Premium)

                bgApp: 'bg-gray-50 dark:bg-gray-950',
                bgCard: 'bg-white dark:bg-gray-900 border-gray-100 dark:border-gray-800',
                textMain: 'text-gray-900 dark:text-white',
                textMuted: 'text-gray-500 dark:text-gray-400',
                borderMuted: 'border-gray-200 dark:border-gray-800',
                inputBg: 'bg-white dark:bg-gray-800 border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white focus:border-gold-500',
                goldAccents: 'text-gold-500',
                goldBg: 'bg-gradient-to-r from-gold-400 to-gold-600 text-black',
                goldBgHover: 'hover:from-gold-300 hover:to-gold-500',
                bottomNav: 'bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800'
            };

                <div className={`min-h-screen pb-20 md:pb-0 ${themeClasses.bgApp} ${themeClasses.textMain} font-sans transition-colors duration-200`}>

                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => handleTabChange('home')}>
                        <div className="w-8 h-8 rounded bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center font-bold text-black text-xl shadow-sm">A</div>
                        <span className="font-bold text-xl tracking-tight">AutoRapid <span className="text-gold-500">RO</span></span>
                    </div>

                    <nav className="hidden md:flex items-center gap-6 font-medium">
                        <button onClick={() => handleTabChange('home')} className={`hover:${themeClasses.goldAccents} transition-colors ${activeTab === 'home' ? themeClasses.goldAccents : ''}`}>Acasă</button>
                        <button onClick={() => handleTabChange('search')} className={`hover:${themeClasses.goldAccents} transition-colors ${activeTab === 'search' ? themeClasses.goldAccents : ''}`}>Caută</button>
                        <button onClick={() => handleTabChange('saved')} className={`hover:${themeClasses.goldAccents} transition-colors ${activeTab === 'saved' ? themeClasses.goldAccents : ''}`}>Salvate {savedAds.length > 0 && <span className="ml-1 text-xs bg-gold-500 text-black px-1.5 py-0.5 rounded-full">{savedAds.length}</span>}</button>

                        </button>
                    </div>
                    </div>
                </header>

                        <HomeView allAds={allAds} themeClasses={themeClasses} toggleSaveAd={toggleSaveAd} savedAds={savedAds} openAdDetails={setSelectedAd} />
                    )}
                    {activeTab === 'publish' && currentView === 'main' && (
                        <PublishView themeClasses={themeClasses} onPublish={(newAd) => { setAllAds([newAd, ...allAds]); handleTabChange('home'); }} />
                    )}
                    {activeTab === 'saved' && currentView === 'main' && (
                        <SavedView allAds={allAds} savedAds={savedAds} themeClasses={themeClasses} toggleSaveAd={toggleSaveAd} openAdDetails={setSelectedAd} />
                    )}
                    {activeTab === 'profile' && currentView === 'main' && (
                        <ProfileMenu themeClasses={themeClasses} setCurrentView={setCurrentView} toggleTheme={toggleTheme} isDarkMode={isDarkMode} />

                    <div className="flex justify-between items-center mb-3">
                    <span className="font-bold text-lg">{ad.price}</span>
                    {ad.rating > 0 && <div className="flex items-center gap-1 text-sm font-medium"><Star size={14} className="fill-gold-500 text-gold-500" /> {ad.rating}</div>}
                    </div>
                    <div className="flex gap-2">
                    <button className="flex-1 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition-colors" onClick={(e)=>{e.stopPropagation(); window.location.href=`tel:${ad.phone}`}}><Phone size={14} /> Sună</button>
                    {/* Bug Fix: Optional Chaining adăugat la WhatsApp */}
                    {ad.whatsapp && <button className="flex-1 bg-green-50 text-green-700 hover:bg-green-100 dark:bg-green-900/20 dark:text-green-500 dark:hover:bg-green-900/40 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1 transition-colors" onClick={(e)=>{e.stopPropagation(); window.open(`https://wa.me/${ad.whatsapp?.replace(/\s/g, '')}`, '_blank')}}><MessageCircle size={14} /> WhatsApp</button>}
                    </div>
                </div>
                </div>
            </div>
        );

        const AdDetailsModal = ({ ad, onClose, themeClasses, toggleSaveAd, isSaved }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-0 md:p-4 bg-black/70 backdrop-blur-sm animate-fadeIn">
            <div className={`${themeClasses.bgCard} w-full h-full md:h-auto md:max-h-[90vh] md:max-w-3xl md:rounded-2xl shadow-2xl overflow-y-auto flex flex-col relative`}>
                <button onClick={onClose} className="absolute top-4 right-4 z-20 w-10 h-10 bg-black/50 text-white rounded-full flex items-center justify-center hover:bg-black/80 backdrop-blur-md transition-colors"><X size={24} /></button>
                <div className="h-64 md:h-80 w-full relative shrink-0">
                {ad.promoted && <div className="absolute top-4 left-4 bg-gradient-to-r from-gold-400 to-gold-600 text-black text-xs font-bold px-3 py-1.5 rounded-lg z-10 shadow-lg flex items-center gap-1"><Star size={14} className="fill-black" /> PROMOVAT</div>}
                {/* Bug Fix: Atribut alt */}
                <img src={ad.image} alt={ad.title} className="w-full h-full object-cover" />
                </div>
                <div className="p-6 md:p-8 flex-grow">
                <div className="flex justify-between items-start mb-2">
                    <div className="text-sm font-bold text-gold-600 dark:text-gold-500 uppercase">{ad.category}</div>
                    {ad.rating > 0 && <div className="flex items-center gap-1 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-md text-sm font-medium"><Star size={16} className="fill-gold-500 text-gold-500" /> {ad.rating}</div>}
                </div>
                <h1 className="text-2xl md:text-3xl font-bold mb-4">{ad.title}</h1>
                <p className={`text-xl font-bold mb-6 ${themeClasses.textMain}`}>{ad.price}</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <div className="flex items-start gap-3"><Shield className={themeClasses.goldAccents} size={20} /><div><p className={`text-sm ${themeClasses.textMuted}`}>Firmă</p><p className="font-medium">{ad.firmName || "Persoană fizică"}</p></div></div>
                    <div className="flex items-start gap-3"><MapPin className={themeClasses.goldAccents} size={20} /><div><p className={`text-sm ${themeClasses.textMuted}`}>Locație</p><p className="font-medium">{ad.city}, {ad.county}</p></div></div>
                    <div className="flex items-start gap-3"><Clock className={themeClasses.goldAccents} size={20} /><div><p className={`text-sm ${themeClasses.textMuted}`}>Program</p><p className="font-medium">{ad.schedule}</p></div></div>
                </div>
                <div className={`pt-6 border-t ${themeClasses.borderMuted} mb-8`}>
                    <h3 className="font-bold text-lg mb-3">Descriere</h3>
                    <p className="whitespace-pre-line leading-relaxed">{ad.description}</p>
                </div>
                </div>
                <div className={`p-4 md:p-6 border-t ${themeClasses.borderMuted} ${themeClasses.bgCard} sticky bottom-0 z-10 flex flex-wrap gap-3 pb-safe`}>
                <button className={`flex-1 min-w-[140px] ${themeClasses.goldBg} ${themeClasses.goldBgHover} shadow-lg py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all`} onClick={()=>window.location.href=`tel:${ad.phone}`}><Phone size={18} /> Sună acum</button>
                {/* Bug Fix: Optional Chaining adăugat la WhatsApp */}
                {ad.whatsapp && <button className="flex-1 min-w-[140px] bg-[#25D366] hover:bg-[#20B958] shadow-lg text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors" onClick={()=>window.open(`https://wa.me/${ad.whatsapp?.replace(/\s/g, '')}`, '_blank')}><MessageCircle size={18} /> WhatsApp</button>}
                <button onClick={(e) => toggleSaveAd(ad.id, e)} className={`w-14 h-[52px] border-2 rounded-xl flex items-center justify-center transition-colors ${isSaved ? 'border-gold-500 bg-gold-50 dark:bg-gold-900/20' : `${themeClasses.borderMuted} hover:border-gold-500/50`}`}><Heart size={24} className={isSaved ? "fill-gold-500 text-gold-500" : themeClasses.textMuted} /></button>
                </div>
            </div>
            </div>
        );

        // --- INIȚIALIZARE APLICAȚIE ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
