<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>AutoRapid RO</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#faf9f5;
      --panel:#ffffff;
      --panel2:#fffdf7;
      --text:#171717;
      --muted:#6f6f6f;
      --soft:#f3f1ea;
      --line:#e9e4d6;
      --gold:#FFD700;
      --gold2:#f4c400;
      --gold3:#fff5bf;
      --black:#111111;
      --success:#138a5b;
      --danger:#c64343;
      --shadow:0 18px 45px rgba(20,20,20,.08);
      --radius:22px;
      --radius2:16px;
      --safeBottom:env(safe-area-inset-bottom, 0px);
    }
    [data-theme="dark"]{
      --bg:#11100d;
      --panel:#191815;
      --panel2:#1f1d18;
      --text:#fbfaf7;
      --muted:#b7b0a1;
      --soft:#24221d;
      --line:#343025;
      --gold:#FFD700;
      --gold2:#e8bc00;
      --gold3:#443a12;
      --black:#ffffff;
      --shadow:0 18px 45px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    html{width:100%;overflow-x:hidden;scroll-behavior:smooth}
    body{margin:0;width:100%;min-height:100vh;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    button,input,select,textarea{font:inherit;color:inherit}
    button{cursor:pointer;border:0;background:none}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .hidden{display:none!important}
    .muted{color:var(--muted)}
    .nowrap{white-space:nowrap}
    .page{min-height:100vh}

    #loadingScreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#fff 0%,#fffdf1 48%,#fff7c7 100%);display:grid;place-items:center;transition:opacity .25s ease,visibility .25s ease}
    [data-theme="dark"] #loadingScreen{background:linear-gradient(135deg,#11100d 0%,#19160b 55%,#2e2709 100%)}
    #loadingScreen.hide{opacity:0;visibility:hidden}
    .loaderBox{text-align:center;display:grid;justify-items:center;gap:14px;color:var(--text)}
    .loaderMark{width:72px;height:72px;border-radius:24px;display:grid;place-items:center;background:linear-gradient(135deg,#111,#343434);box-shadow:0 20px 50px rgba(0,0,0,.18);position:relative;overflow:hidden}
    .loaderMark:after{content:"";position:absolute;inset:-45%;background:linear-gradient(90deg,transparent,rgba(255,215,0,.35),transparent);animation:shine 1.25s linear infinite;transform:rotate(25deg)}
    .loaderMark svg{width:42px;height:42px;position:relative;z-index:1}
    .loaderText{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#7a6b1d;font-weight:700}
    @keyframes shine{to{transform:translateX(120%) rotate(25deg)}}

    #authView{min-height:100vh;padding:28px 18px;display:grid;place-items:center;background:
      radial-gradient(circle at 18% 16%, rgba(255,215,0,.24), transparent 34%),
      radial-gradient(circle at 86% 18%, rgba(255,245,180,.45), transparent 30%),
      var(--bg)}
    .authCard{width:min(430px,100%);background:rgba(255,255,255,.78);border:1px solid rgba(230,210,120,.55);box-shadow:var(--shadow);border-radius:30px;padding:22px;backdrop-filter:blur(18px)}
    [data-theme="dark"] .authCard{background:rgba(25,24,21,.86);border-color:#3e3512}
    .brandHero{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .brandIcon{width:44px;height:44px;border-radius:16px;background:#111;display:grid;place-items:center;flex:0 0 auto;box-shadow:0 14px 28px rgba(0,0,0,.16)}
    .brandIcon svg{width:28px;height:28px}
    .brandName{font-size:19px;font-weight:760;letter-spacing:-.02em}
    .brandSub{font-size:13px;color:var(--muted);margin-top:1px}
    .authTitle{font-size:28px;line-height:1.05;margin:10px 0 8px;font-weight:760;letter-spacing:-.04em}
    .authLead{margin:0 0 20px;color:var(--muted);font-size:14px}
    .form{display:grid;gap:12px}
    .field{display:grid;gap:7px}
    .field label{font-size:12px;color:var(--muted);font-weight:650}
    .input,.select,.textarea{width:100%;border:1px solid var(--line);background:var(--panel);border-radius:16px;min-height:48px;padding:0 14px;outline:none;transition:border .15s, box-shadow .15s, background .15s}
    .textarea{min-height:118px;padding:12px 14px;resize:vertical}
    .input:focus,.select:focus,.textarea:focus{border-color:var(--gold2);box-shadow:0 0 0 4px rgba(255,215,0,.16)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;min-height:46px;padding:0 16px;font-weight:680;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;color:var(--text);white-space:nowrap}
    .btn:active{transform:scale(.98)}
    .btnPrimary{background:linear-gradient(135deg,#111,#2a2a2a);color:#fff;box-shadow:0 16px 28px rgba(0,0,0,.16)}
    .btnGold{background:linear-gradient(135deg,var(--gold),#ffef79);color:#111;box-shadow:0 14px 26px rgba(255,215,0,.24)}
    .btnSoft{background:var(--soft);border:1px solid var(--line)}
    .btnLine{border:1px solid var(--line);background:var(--panel)}
    .btnDanger{background:#fff1f1;color:var(--danger);border:1px solid #ffd5d5}
    .authSwitch{margin-top:14px;text-align:center;color:var(--muted);font-size:14px}
    .linkBtn{color:#111;font-weight:750;border-bottom:1px solid var(--gold2)}
    [data-theme="dark"] .linkBtn{color:#fff}

    #appView{min-height:100vh;display:none}
    #appView.active{display:block}
    .topBar{position:sticky;top:0;z-index:50;background:rgba(250,249,245,.78);backdrop-filter:blur(18px);border-bottom:1px solid rgba(230,226,214,.72)}
    [data-theme="dark"] .topBar{background:rgba(17,16,13,.82);border-bottom-color:#2d2a22}
    .topInner{max-width:1120px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px}
    .logoBtn{display:flex;align-items:center;gap:10px;min-width:0}
    .logoSmall{width:38px;height:38px;border-radius:14px;background:#111;display:grid;place-items:center;flex:0 0 auto}
    .logoSmall svg{width:25px;height:25px}
    .logoTxt{font-size:17px;font-weight:760;letter-spacing:-.02em}
    .desktopNav{margin-left:auto;display:flex;align-items:center;gap:6px}
    .navPill{border-radius:999px;padding:10px 13px;color:var(--muted);font-size:14px;font-weight:640}
    .navPill.active{color:#111;background:linear-gradient(135deg,var(--gold),#fff1a2)}
    [data-theme="dark"] .navPill.active{color:#111}
    .topActions{display:flex;align-items:center;gap:8px;margin-left:8px}
    .avatarMini{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#fff3a8);display:grid;place-items:center;color:#111;font-weight:760;overflow:hidden;border:1px solid rgba(0,0,0,.05)}
    .avatarMini img,.avatarLarge img,.avatarPublic img,.cardLogo img{width:100%;height:100%;object-fit:cover}

    .container{max-width:1120px;margin:0 auto;padding:24px 18px 94px}
    .heroClean{position:relative;overflow:hidden;border-radius:32px;padding:24px;background:
      radial-gradient(circle at 18% 18%, rgba(255,215,0,.38), transparent 32%),
      linear-gradient(135deg,#fff,#fffaf0 60%,#fff2a8);border:1px solid rgba(230,210,110,.55);box-shadow:var(--shadow)}
    [data-theme="dark"] .heroClean{background:radial-gradient(circle at 18% 18%, rgba(255,215,0,.25), transparent 32%),linear-gradient(135deg,#1d1b16,#17150f 70%,#2b2509);border-color:#43380c}
    .heroGrid{display:grid;grid-template-columns:1fr;gap:18px;position:relative;z-index:1}
    .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:#6c5a00;background:rgba(255,255,255,.58);border:1px solid rgba(255,215,0,.45);padding:7px 10px;border-radius:999px;width:max-content;font-weight:700}
    [data-theme="dark"] .eyebrow{color:#ffe77a;background:rgba(255,215,0,.08)}
    .heroTitle{font-size:clamp(28px,5vw,48px);line-height:1.03;margin:12px 0 8px;font-weight:780;letter-spacing:-.055em;max-width:680px}
    .heroText{margin:0;color:var(--muted);max-width:620px;font-size:15px}
    .searchPanel{display:grid;gap:10px;background:rgba(255,255,255,.72);border:1px solid rgba(229,218,176,.72);border-radius:24px;padding:12px;backdrop-filter:blur(14px)}
    [data-theme="dark"] .searchPanel{background:rgba(25,24,21,.78);border-color:#403718}
    .searchLine{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .searchInputWrap{position:relative}
    .searchIcon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
    .searchInput{padding-left:42px;border-radius:999px}
    .filters{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .sectionHead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:26px 0 12px}
    .sectionTitle{margin:0;font-size:22px;line-height:1.1;font-weight:760;letter-spacing:-.035em}
    .sectionHint{margin:3px 0 0;color:var(--muted);font-size:13px}
    .countBadge{font-size:13px;color:var(--muted);background:var(--soft);border:1px solid var(--line);padding:8px 10px;border-radius:999px}

    .listingGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .listingCard{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:14px;display:grid;grid-template-columns:auto 1fr;gap:12px;box-shadow:0 8px 22px rgba(20,20,20,.045);transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;min-width:0}
    .listingCard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(255,215,0,.62)}
    .cardLogo{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,#fff4ad,var(--gold));font-weight:780;color:#111;flex:0 0 auto}
    .cardMain{min-width:0}
    .cardTop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;min-width:0}
    .cardName{font-size:16px;font-weight:760;letter-spacing:-.02em;line-height:1.15;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cardCategory{margin:3px 0 0;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .heart{width:38px;height:38px;border-radius:50%;background:var(--soft);border:1px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
    .heart svg{width:19px;height:19px;stroke:currentColor;fill:none}
    .heart.saved{color:#111;background:linear-gradient(135deg,var(--gold),#fff1a2);border-color:rgba(255,215,0,.65)}
    .heart.saved svg{fill:currentColor}
    .metaRow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;min-width:0}
    .chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);background:var(--soft);border:1px solid var(--line);padding:6px 8px;border-radius:999px;max-width:100%}
    .chipGold{color:#5f4b00;background:#fff8cc;border-color:#ffef89}
    [data-theme="dark"] .chipGold{color:#ffe477;background:#342d0d;border-color:#5f4b00}
    .cardDesc{margin:10px 0 0;color:var(--muted);font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .cardActions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .miniBtn{height:37px;padding:0 12px;border-radius:999px;font-size:13px;font-weight:680;background:var(--soft);border:1px solid var(--line);display:inline-flex;align-items:center;gap:6px}
    .miniBtn.primary{background:#111;color:#fff;border-color:#111}
    .miniBtn.gold{background:linear-gradient(135deg,var(--gold),#fff1a2);color:#111;border-color:#ffe36b}

    .emptyState{border:1px dashed var(--line);background:var(--panel);border-radius:26px;padding:28px;text-align:center;display:grid;place-items:center;gap:10px;color:var(--muted)}
    .emptyIcon{width:54px;height:54px;border-radius:20px;background:linear-gradient(135deg,#fff5b2,var(--gold));display:grid;place-items:center;color:#111;margin-bottom:2px}
    .emptyState strong{color:var(--text);font-size:17px}

    .mobileNav{position:fixed;left:12px;right:12px;bottom:calc(12px + var(--safeBottom));z-index:70;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:26px;box-shadow:0 22px 50px rgba(0,0,0,.14);display:none;grid-template-columns:repeat(5,1fr);padding:7px}
    [data-theme="dark"] .mobileNav{background:rgba(25,24,21,.92)}
    .mNavBtn{display:grid;place-items:center;gap:3px;border-radius:18px;min-height:54px;color:var(--muted);font-size:11px;font-weight:660}
    .mNavBtn svg{width:20px;height:20px}
    .mNavBtn.active{background:linear-gradient(135deg,var(--gold),#fff1a2);color:#111}

    .simplePage{display:grid;gap:14px}
    .backRow{display:flex;align-items:center;gap:10px;margin-bottom:2px}
    .backBtn{width:40px;height:40px;border-radius:50%;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:18px;box-shadow:0 8px 22px rgba(20,20,20,.04);min-width:0}
    .profileHero{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
    .avatarLarge,.avatarPublic{width:74px;height:74px;border-radius:25px;display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,var(--gold),#fff2a2);color:#111;font-size:24px;font-weight:780;border:1px solid rgba(0,0,0,.05)}
    .profileName{margin:0;font-size:21px;font-weight:760;letter-spacing:-.035em;line-height:1.12}
    .profileMeta{margin:4px 0 0;color:var(--muted);font-size:13px}
    .profileStats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .stat{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}
    .stat strong{display:block;font-size:18px;color:var(--text)}
    .stat span{font-size:12px;color:var(--muted)}
    .menuList{display:grid;gap:10px}
    .menuItem{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:14px;text-align:left;box-shadow:0 6px 16px rgba(20,20,20,.035)}
    .menuLeft{display:flex;align-items:center;gap:12px;min-width:0}
    .menuIcon{width:40px;height:40px;border-radius:15px;background:var(--soft);display:grid;place-items:center;flex:0 0 auto}
    .menuText strong{display:block;font-size:15px;font-weight:720}
    .menuText span{display:block;font-size:12px;color:var(--muted);margin-top:1px}
    .formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .full{grid-column:1/-1}
    .uploadRow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .uploadPreview{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#fff1a2);overflow:hidden;color:#111;font-weight:800}
    .uploadPreview img{width:100%;height:100%;object-fit:cover}
    input[type=file]{position:absolute!important;width:1px!important;height:1px!important;overflow:hidden!important;clip:rect(1px,1px,1px,1px)!important;white-space:nowrap!important}
    .charRow{display:flex;justify-content:flex-end;color:var(--muted);font-size:12px;margin-top:-4px}

    .modalLayer{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.36);display:none;align-items:flex-end;justify-content:center;padding:16px}
    .modalLayer.open{display:flex}
    .modalCard{width:min(620px,100%);max-height:min(86vh,760px);overflow:auto;background:var(--panel);border-radius:30px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(0,0,0,.25);padding:18px}
    .modalHead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .closeBtn{width:40px;height:40px;border-radius:50%;background:var(--soft);display:grid;place-items:center;border:1px solid var(--line);flex:0 0 auto}
    .detailTop{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
    .toast{position:fixed;left:50%;bottom:calc(94px + var(--safeBottom));transform:translateX(-50%) translateY(20px);background:#111;color:#fff;border-radius:999px;padding:12px 16px;font-size:13px;z-index:200;box-shadow:0 18px 38px rgba(0,0,0,.24);opacity:0;pointer-events:none;transition:.2s ease;max-width:calc(100% - 32px);text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media (max-width:840px){
      .desktopNav,.topActions .installTop{display:none}
      .topInner{padding:11px 14px}
      .container{padding:16px 14px 104px}
      .heroClean{padding:18px;border-radius:26px}
      .filters{grid-template-columns:1fr}
      .listingGrid{grid-template-columns:1fr;gap:11px}
      .mobileNav{display:grid}
      .formGrid{grid-template-columns:1fr}
      .sectionHead{align-items:flex-start;flex-direction:column;gap:8px;margin-top:20px}
      .searchLine{grid-template-columns:1fr}
      .btn{width:100%}
      .listingCard{border-radius:22px;padding:13px}
      .cardActions .miniBtn{flex:1;justify-content:center;min-width:0}
      .profileStats{grid-template-columns:1fr 1fr 1fr}
      .modalLayer{padding:0;align-items:flex-end}
      .modalCard{border-radius:26px 26px 0 0;max-height:88vh}
    }
    @media (max-width:420px){
      body{font-size:14px}
      .heroTitle{font-size:27px}
      .cardLogo{width:48px;height:48px;border-radius:16px}
      .cardName{font-size:15px}
      .profileStats{gap:7px}.stat{padding:10px 6px}
      .brandName{font-size:17px}.authTitle{font-size:25px}
    }
  </style>
</head>
<body data-theme="light">
  <div id="loadingScreen">
    <div class="loaderBox">
      <div class="loaderMark" data-logo aria-hidden="true"></div>
      <div class="loaderText">AutoRapid RO</div>
    </div>
  </div>

  <main id="authView" class="page hidden">
    <section class="authCard">
      <div class="brandHero">
        <div class="brandIcon" data-logo></div>
        <div>
          <div class="brandName">AutoRapid RO</div>
          <div class="brandSub" data-i18n="authSub">Servicii auto, rapid și curat.</div>
        </div>
      </div>
      <h1 class="authTitle" id="authTitle">Intră în cont</h1>
      <p class="authLead" id="authLead">Folosește emailul și parola pentru a publica sau salva servicii.</p>
      <form id="authForm" class="form">
        <div class="field">
          <label for="authEmail">Email</label>
          <input class="input" id="authEmail" type="email" autocomplete="email" placeholder="nume@email.com" required />
        </div>
        <div class="field">
          <label for="authPassword">Parolă</label>
          <input class="input" id="authPassword" type="password" autocomplete="current-password" placeholder="Minim 6 caractere" minlength="6" required />
        </div>
        <button class="btn btnPrimary" id="authSubmit" type="submit">Intră</button>
      </form>
      <div class="authSwitch">
        <span id="authSwitchText">Nu ai cont?</span>
        <button class="linkBtn" id="authSwitchBtn" type="button">Creează cont</button>
      </div>
    </section>
  </main>

  <div id="appView">
    <header class="topBar">
      <div class="topInner">
        <button class="logoBtn" data-route="home" type="button" aria-label="AutoRapid RO">
          <span class="logoSmall" data-logo></span>
          <span class="logoTxt">AutoRapid RO</span>
        </button>
        <nav class="desktopNav" aria-label="Navigație desktop">
          <button class="navPill" data-route="home" type="button" data-i18n="navHome">Acasă</button>
          <button class="navPill" data-route="search" type="button" data-i18n="navSearch">Caută</button>
          <button class="navPill" data-route="publish" type="button" data-i18n="navPublish">Publică</button>
          <button class="navPill" data-route="saved" type="button" data-i18n="navSaved">Salvate</button>
          <button class="navPill" data-route="profile" type="button" data-i18n="navProfile">Profil</button>
        </nav>
        <div class="topActions">
          <button class="btn btnLine installTop" id="installTopBtn" type="button" data-i18n="installApp">Adaugă pe ecran</button>
          <button class="avatarMini" data-route="profile" id="topAvatar" type="button" aria-label="Profil"></button>
        </div>
      </div>
    </header>

    <div class="container">
      <div id="mainContent"></div>
    </div>

    <nav class="mobileNav" aria-label="Navigație mobil">
      <button class="mNavBtn" data-route="home" type="button"><span data-ico="home"></span><span data-i18n="navHome">Acasă</span></button>
      <button class="mNavBtn" data-route="search" type="button"><span data-ico="search"></span><span data-i18n="navSearch">Caută</span></button>
      <button class="mNavBtn" data-route="publish" type="button"><span data-ico="plus"></span><span data-i18n="navPublish">Publică</span></button>
      <button class="mNavBtn" data-route="saved" type="button"><span data-ico="heart"></span><span data-i18n="navSaved">Salvate</span></button>
      <button class="mNavBtn" data-route="profile" type="button"><span data-ico="user"></span><span data-i18n="navProfile">Profil</span></button>
    </nav>
  </div>

  <div class="modalLayer" id="modalLayer" role="dialog" aria-modal="true"><div class="modalCard" id="modalCard"></div></div>
  <div class="toast" id="toast"></div>

<script>

  function applyLang(){document.documentElement.lang=state.lang; $$('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(k)el.textContent=t(k)}); $('#authTitle').textContent=state.authMode==='login'?t('loginTitle'):t('signupTitle'); $('#authLead').textContent=state.authMode==='login'?t('loginLead'):t('signupLead'); $('#authSubmit').textContent=state.authMode==='login'?t('loginBtn'):t('signupBtn'); $('#authSwitchText').textContent=state.authMode==='login'?t('noAccount'):t('hasAccount'); $('#authSwitchBtn').textContent=state.authMode==='login'?t('signupBtn'):t('loginBtn'); const ph=$('#searchQuery'); if(ph) ph.placeholder=t('searchPlaceholder');}

  function bindStatic(){

  async function handleAuth(e){
    e.preventDefault();
    const email=$('#authEmail').value.trim(); const password=$('#authPassword').value;
    if(!email||password.length<6) return toast('Completează emailul și parola.');

    try{
      if(!state.sb) throw new Error('Supabase nu este încărcat.');
      let res;
      if(state.authMode==='signup'){
        res=await state.sb.auth.signUp({email,password});
        if(res.error) throw res.error;
        if(!res.data.session){res=await state.sb.auth.signInWithPassword({email,password}); if(res.error) throw res.error;}
      }else{
        res=await state.sb.auth.signInWithPassword({email,password}); if(res.error) throw res.error;
      }
      state.user=res.data.user || (res.data.session&&res.data.session.user); await enterApp();
    }catch(err){toast(err.message||'Autentificarea nu a mers.');}
    finally{$('#authSubmit').disabled=false;}
  }

  function showAuth(){
    $('#authView').classList.remove('hidden'); $('#appView').classList.remove('active'); applyLang();
  }
  async function enterApp(){
    $('#authView').classList.add('hidden'); $('#appView').classList.add('active');
    await ensureProfile(); await loadAll(); render();

  async function ensureProfile(){
    let p=null;
    try{const {data,error}=await state.sb.from('profiles').select('*').eq('id',state.user.id).maybeSingle(); if(!error)p=data;}catch(e){console.warn(e)}
    if(!p){p={id:state.user.id,email:state.user.email,full_name:(state.user.email||'').split('@')[0]||'AutoRapid',phone:'',county:'',city:'',address:'',schedule:'',price:'',language:'ro',notifications:true,privacy:true,avatar_data:''}; try{await state.sb.from('profiles').insert(p)}catch(e){console.warn(e)}}
    state.profile=p;
    state.lang = normalizeLang(p.language || localStorage.getItem('ar_lang') || 'ro'); localStorage.setItem('ar_lang',state.lang); applyLang();
  }
  function normalizeLang(v){v=String(v||'ro').toLowerCase(); if(v.includes('eng')||v==='en')return'en'; if(v.includes('ita')||v==='it')return'it'; return'ro'}
  async function loadAll(){await Promise.all([loadListings(),loadFavorites(),loadInbox()]);}
  async function loadListings(){try{const {data,error}=await state.sb.from('listings').select('*').order('created_at',{ascending:false}).limit(500); if(error)throw error; state.listings=(data||[]).filter(x=>x&&x.id)}catch(e){console.warn(e); state.listings=[]}}
  async function loadFavorites(){state.favorites=new Set(JSON.parse(localStorage.getItem('ar_favorites')||'[]').map(String)); try{const {data,error}=await state.sb.from('favorites').select('listing_id').eq('user_id',state.user.id); if(!error)(data||[]).forEach(x=>state.favorites.add(String(x.listing_id)))}catch(e){console.warn(e)}}
  async function loadInbox(){try{const {data,error}=await state.sb.from('inbox_messages').select('*').or(`user_id.is.null,user_id.eq.${state.user.id}`).order('created_at',{ascending:false}).limit(60); if(error)throw error; state.inbox=data||[]}catch(e){state.inbox=[]}}

  function go(route){state.route=route; window.scrollTo({top:0,behavior:'smooth'}); render();}

  function renderListings(rows){if(!rows.length)return `<div class="emptyState"><div class="emptyIcon">${logo()}</div><strong>${t('noneTitle')}</strong><span>${t('noneText')}</span></div>`; return `<div class="listingGrid">${rows.map(card).join('')}</div>`}
  function card(l){const id=String(l.id); const saved=state.favorites.has(id); const business=l.business_name||'AutoRapid'; return `<article class="listingCard"><button class="cardLogo" data-public-profile="${esc(l.user_id||'')}">${l.image_url?`<img src="${esc(l.image_url)}" alt="">`:esc(initials(business))}</button><div class="cardMain"><div class="cardTop"><div class="min0"><button class="cardName" data-public-profile="${esc(l.user_id||'')}">${esc(business)}</button><div class="cardCategory">${esc(l.category||'Serviciu auto')}</div></div><button class="heart ${saved?'saved':''}" data-fav="${esc(id)}" aria-label="Salvează">${icon('heart')}</button></div><div class="metaRow"><span class="chip">${esc([l.city,l.county].filter(Boolean).join(', ')||'România')}</span><span class="chip chipGold">★ ${esc(l.rating||'4.8')}</span>${l.price?`<span class="chip">${esc(l.price)}</span>`:''}</div><p class="cardDesc">${esc(l.description||'Serviciu auto publicat în AutoRapid RO.')}</p><div class="cardActions"><a class="miniBtn primary" href="tel:${phoneLink(l.phone)}">${t('call')}</a><a class="miniBtn gold" href="https://wa.me/${phoneLink(l.whatsapp||l.phone).replace('+','')}" target="_blank" rel="noopener">${t('whatsapp')}</a><button class="miniBtn" data-details="${esc(id)}">${t('details')}</button></div></div></article>`}

  function renderPublish(){const ok=profileReady(); return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="home">${icon('back')}</button><div><h1 class="sectionTitle">${t('publishTitle')}</h1><p class="sectionHint">${t('publishHint')}</p></div></div>${!ok?`<div class="emptyState"><strong>${t('profileNeeded')}</strong><span>Ai nevoie de nume/firmă, telefon, județ și oraș.</span><button class="btn btnGold" data-route="editProfile">${t('editProfile')}</button></div>`:''}<form id="publishForm" class="panel form"><div class="field"><label>${t('category')}</label><select id="pubCategory" class="select" required><option value="">${t('category')}</option>${CATEGORIES.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div><div class="field"><label>${t('description')}</label><textarea id="pubDesc" class="textarea" maxlength="650" required placeholder="Descrie serviciul, zona acoperită, programul sau avantajele."></textarea></div><div class="field"><label>${t('promo')}</label><select id="pubPromo" class="select"><option>Gratuit</option><option>Promovat 7 zile</option><option>Promovat 30 zile</option><option>Premium</option></select></div><button class="btn btnPrimary" type="submit" ${!ok?'disabled':''}>${t('publishBtn')}</button></form></section>`}
  function profileReady(){const p=state.profile||{}; return !!(p.full_name&&p.phone&&p.county&&p.city)}
  async function submitListing(e){e.preventDefault(); if(!profileReady()) return toast(t('profileNeeded')); const p=state.profile; const promo=$('#pubPromo').value; const row={user_id:state.user.id,business_name:p.full_name,category:$('#pubCategory').value,county:p.county,city:p.city,address:p.address,phone:p.phone,whatsapp:p.phone,schedule:p.schedule,price:p.price,description:$('#pubDesc').value.trim(),image_url:p.avatar_data,promo_type:promo,promoted:promo!=='Gratuit',rating:4.8}; try{const {data,error}=await state.sb.from('listings').insert(row).select('*').single(); if(error)throw error; state.listings.unshift(data); toast('Anunț publicat.'); go('home')}catch(err){toast(err.message||'Nu s-a publicat.')}}

  function renderSaved(){const rows=state.listings.filter(l=>state.favorites.has(String(l.id))); return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="home">${icon('back')}</button><div><h1 class="sectionTitle">${t('savedTitle')}</h1><p class="sectionHint">${rows.length} servicii salvate.</p></div></div>${rows.length?renderListings(rows):`<div class="emptyState"><div class="emptyIcon">${icon('heart')}</div><strong>${t('emptySaved')}</strong><button class="btn btnGold" data-route="home">${t('navSearch')}</button></div>`}</section>`}
  function renderProfile(){const p=state.profile||{}; const mine=state.listings.filter(l=>l.user_id===state.user.id).length; return `<section class="simplePage"><div class="panel"><div class="profileHero"><div class="avatarLarge">${p.avatar_data?`<img src="${p.avatar_data}" alt="">`:esc(initials(p.full_name||state.user.email))}</div><div><h1 class="profileName">${esc(p.full_name||'Profil AutoRapid')}</h1><p class="profileMeta">${esc(state.user.email||'')} · ${esc([p.city,p.county].filter(Boolean).join(', ')||'Completează profilul')}</p></div></div><div class="profileStats"><div class="stat"><strong>${mine}</strong><span>${t('myListings')}</span></div><div class="stat"><strong>${state.favorites.size}</strong><span>${t('navSaved')}</span></div><div class="stat"><strong>${state.inbox.length}</strong><span>${t('inbox')}</span></div></div></div><div class="menuList">${menuItem('editProfile',t('editProfile'),'Nume, telefon, oraș și poză','user')}${menuItem('myListings',t('myListings'),'Vezi ce ai publicat','plus')}${menuItem('saved',t('navSaved'),'Servicii păstrate','heart')}${menuItem('inbox',t('inbox'),'Mesaje și notificări','home')}${menuItem('feedback',t('feedback'),'Trimite o sugestie','search')}${menuItem('settings',t('settings'),'Limbă, temă, notificări','user')}<button class="menuItem" id="installMenuBtn"><span class="menuLeft"><span class="menuIcon">${logo()}</span><span class="menuText"><strong>${t('installApp')}</strong><span>Deschide aplicația mai rapid.</span></span></span>${icon('chev')}</button><button class="menuItem" id="logoutBtn"><span class="menuLeft"><span class="menuIcon">${icon('x')}</span><span class="menuText"><strong>${t('logout')}</strong><span>Ieși din cont.</span></span></span>${icon('chev')}</button></div></section>`}
  function menuItem(route,title,sub,ico){return `<button class="menuItem" data-route="${route}"><span class="menuLeft"><span class="menuIcon">${icon(ico)}</span><span class="menuText"><strong>${esc(title)}</strong><span>${esc(sub)}</span></span></span>${icon('chev')}</button>`}
  function renderEditProfile(){const p=state.profile||{}; return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="profile">${icon('back')}</button><div><h1 class="sectionTitle">${t('editProfile')}</h1><p class="sectionHint">Datele acestea apar pe anunțurile tale.</p></div></div><form id="profileForm" class="panel form"><div class="uploadRow full"><div class="uploadPreview" id="avatarPreview">${p.avatar_data?`<img src="${p.avatar_data}" alt="">`:esc(initials(p.full_name||state.user.email))}</div><label class="btn btnLine" for="avatarInput">${t('changePhoto')}</label><input id="avatarInput" type="file" accept="image/*"></div><div class="formGrid"><div class="field"><label>${t('name')}</label><input class="input" id="profName" value="${esc(p.full_name||'')}"></div><div class="field"><label>${t('phone')}</label><input class="input" id="profPhone" value="${esc(p.phone||'')}"></div><div class="field"><label>${t('county')}</label><select class="select" id="profCounty"><option value="">${t('county')}</option>${Object.keys(LOCATIONS).map(c=>`<option ${p.county===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div><div class="field"><label>${t('city')}</label><select class="select" id="profCity"><option value="">${t('city')}</option>${cityOptions(p.county,p.city)}</select></div><div class="field full"><label>${t('address')}</label><input class="input" id="profAddress" value="${esc(p.address||'')}"></div><div class="field"><label>${t('schedule')}</label><input class="input" id="profSchedule" value="${esc(p.schedule||'')}"></div><div class="field"><label>${t('price')}</label><input class="input" id="profPrice" value="${esc(p.price||'')}"></div></div><button class="btn btnPrimary" type="submit">${t('save')}</button></form></section>`}
  async function saveProfile(e){e.preventDefault(); const p={...state.profile,id:state.user.id,email:state.user.email,full_name:$('#profName').value.trim(),phone:$('#profPhone').value.trim(),county:$('#profCounty').value,city:$('#profCity').value,address:$('#profAddress').value.trim(),schedule:$('#profSchedule').value.trim(),price:$('#profPrice').value.trim(),avatar_data:state.profile.avatar_data||'',updated_at:new Date().toISOString()}; try{const {error}=await state.sb.from('profiles').upsert(p,{onConflict:'id'}); if(error)throw error; state.profile=p; toast('Profil salvat.'); render()}catch(err){toast(err.message||'Profilul nu s-a salvat.')}}
  function renderSettings(){const p=state.profile||{}; return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="profile">${icon('back')}</button><div><h1 class="sectionTitle">${t('settings')}</h1><p class="sectionHint">Setări simple, fără profil amestecat.</p></div></div><form id="settingsForm" class="panel form"><div class="field"><label>${t('language')}</label><select class="select" id="setLang"><option value="ro" ${state.lang==='ro'?'selected':''}>Română</option><option value="en" ${state.lang==='en'?'selected':''}>English</option><option value="it" ${state.lang==='it'?'selected':''}>Italiano</option></select></div><div class="field"><label>${t('theme')}</label><select class="select" id="setTheme"><option value="light" ${state.theme==='light'?'selected':''}>Light</option><option value="dark" ${state.theme==='dark'?'selected':''}>Dark</option></select></div><label class="menuItem"><span class="menuLeft"><span class="menuIcon">${icon('home')}</span><span class="menuText"><strong>${t('notifications')}</strong><span>Primești actualizări importante.</span></span></span><input id="setNotifications" type="checkbox" ${p.notifications!==false?'checked':''}></label><label class="menuItem"><span class="menuLeft"><span class="menuIcon">${icon('user')}</span><span class="menuText"><strong>${t('privacy')}</strong><span>Profil public pentru firme și anunțuri.</span></span></span><input id="setPrivacy" type="checkbox" ${p.privacy!==false?'checked':''}></label><button class="btn btnPrimary" type="submit">${t('save')}</button></form></section>`}
  async function saveSettings(e){e.preventDefault(); state.lang=$('#setLang').value; state.theme=$('#setTheme').value; localStorage.setItem('ar_lang',state.lang); applyTheme(); const p={...state.profile,language:state.lang,notifications:$('#setNotifications').checked,privacy:$('#setPrivacy').checked,updated_at:new Date().toISOString()}; try{await state.sb.from('profiles').upsert(p,{onConflict:'id'}); state.profile=p; toast('Setări salvate.'); render()}catch(err){toast('Setările nu s-au salvat.')}}
  function renderFeedback(){return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="profile">${icon('back')}</button><div><h1 class="sectionTitle">${t('feedback')}</h1><p class="sectionHint">Spune-ne ce putem îmbunătăți.</p></div></div><form id="feedbackForm" class="panel form"><div class="field"><label>${t('feedbackCategory')}</label><select id="fbCategory" class="select"><option>Problemă tehnică</option><option>Design aplicație</option><option>Anunțuri</option><option>Profil</option><option>Mesaje</option><option>Sugestie nouă</option><option>Altceva</option></select></div><div class="field"><label>${t('feedbackMessage')}</label><textarea id="fbText" class="textarea" maxlength="500"></textarea></div><div class="charRow"><span id="fbCount">0/500</span></div><button class="btn btnPrimary" type="submit">${t('sendFeedback')}</button></form></section>`}
  async function submitFeedback(e){e.preventDefault(); const description=$('#fbText').value.trim(); if(!description)return toast('Scrie feedback-ul.'); try{const {error}=await state.sb.from('feedback').insert({user_id:state.user.id,category:$('#fbCategory').value,description}); if(error)throw error; toast('Feedback trimis.'); $('#fbText').value=''; $('#fbCount').textContent='0/500'}catch(err){toast('Nu s-a trimis feedback-ul.')}}
  function renderInbox(){return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="profile">${icon('back')}</button><div><h1 class="sectionTitle">${t('inbox')}</h1><p class="sectionHint">Mesaje administrative și actualizări.</p></div></div>${state.inbox.length?`<div class="menuList">${state.inbox.map(m=>`<div class="panel"><div class="chip chipGold">${esc(m.type||'Mesaj')}</div><h3 class="cardName" style="margin-top:10px">${esc(m.title||'Actualizare')}</h3><p class="cardDesc" style="display:block">${esc(m.message||'')}</p></div>`).join('')}</div>`:`<div class="emptyState"><strong>Inbox gol</strong><span>Mesajele vor apărea aici.</span></div>`}</section>`}
  function renderMyListings(){const rows=state.listings.filter(l=>l.user_id===state.user.id); return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="profile">${icon('back')}</button><div><h1 class="sectionTitle">${t('myListings')}</h1><p class="sectionHint">${rows.length} anunțuri publicate.</p></div></div>${rows.length?renderListings(rows):`<div class="emptyState"><strong>Nu ai publicat încă.</strong><button class="btn btnGold" data-route="publish">${t('navPublish')}</button></div>`}</section>`}
  function renderPublicProfile(){const rows=state.listings.filter(l=>l.user_id===state.publicUserId); const first=rows[0]||{}; return `<section class="simplePage"><div class="backRow"><button class="backBtn" data-route="home">${icon('back')}</button><div><h1 class="sectionTitle">${t('publicProfile')}</h1><p class="sectionHint">Profilul firmei și toate anunțurile active.</p></div></div>${rows.length?`<div class="panel"><div class="profileHero"><div class="avatarPublic">${first.image_url?`<img src="${first.image_url}" alt="">`:esc(initials(first.business_name))}</div><div><h2 class="profileName">${esc(first.business_name||'Firmă AutoRapid')}</h2><p class="profileMeta">${esc([first.city,first.county].filter(Boolean).join(', '))}</p><div class="cardActions"><a class="miniBtn primary" href="tel:${phoneLink(first.phone)}">${t('call')}</a><a class="miniBtn gold" href="https://wa.me/${phoneLink(first.whatsapp||first.phone).replace('+','')}" target="_blank" rel="noopener">${t('whatsapp')}</a></div></div></div></div>${renderListings(rows)}`:`<div class="emptyState"><strong>Profil indisponibil</strong><span>Nu există anunțuri pentru acest profil.</span></div>`}</section>`}

  function bindDynamic(){
    const sf=$('#searchForm'); if(sf){sf.addEventListener('submit',e=>{e.preventDefault(); readFilters(); go('search')}); const qel=$('#searchQuery'); if(qel)qel.addEventListener('input',()=>{state.filters.q=qel.value}); const county=$('#filterCounty'); if(county)county.addEventListener('change',()=>{state.filters.county=county.value; state.filters.city=''; render()}); const city=$('#filterCity'); if(city)city.addEventListener('change',()=>{state.filters.city=city.value; render()}); const cat=$('#filterCategory'); if(cat)cat.addEventListener('change',()=>{state.filters.category=cat.value; render()});}
    const pub=$('#publishForm'); if(pub)pub.addEventListener('submit',submitListing);
    const prof=$('#profileForm'); if(prof)prof.addEventListener('submit',saveProfile);
    const pc=$('#profCounty'); if(pc)pc.addEventListener('change',()=>{const city=$('#profCity'); city.innerHTML=`<option value="">${t('city')}</option>`+cityOptions(pc.value,'')});
    const av=$('#avatarInput'); if(av)av.addEventListener('change',handleAvatar);
    const set=$('#settingsForm'); if(set)set.addEventListener('submit',saveSettings);
    const fb=$('#feedbackForm'); if(fb)fb.addEventListener('submit',submitFeedback);
    const ft=$('#fbText'); if(ft)ft.addEventListener('input',()=>$('#fbCount').textContent=`${ft.value.length}/500`);
    const lo=$('#logoutBtn'); if(lo)lo.addEventListener('click',logout);
    const im=$('#installMenuBtn'); if(im)im.addEventListener('click',installApp); const it=$('#installTopBtn'); if(it)it.addEventListener('click',installApp);
  }
  function readFilters(){state.filters.q=$('#searchQuery')?.value||''; state.filters.county=$('#filterCounty')?.value||''; state.filters.city=$('#filterCity')?.value||''; state.filters.category=$('#filterCategory')?.value||'';}
  async function handleAvatar(e){const file=e.target.files&&e.target.files[0]; if(!file)return; const data=await resizeImage(file,520); state.profile.avatar_data=data; const pr=$('#avatarPreview'); if(pr)pr.innerHTML=`<img src="${data}" alt="">`; updateChrome();}
  function resizeImage(file,max=520){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=()=>{const img=new Image(); img.onload=()=>{const scale=Math.min(1,max/Math.max(img.width,img.height)); const c=document.createElement('canvas'); c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale); c.getContext('2d').drawImage(img,0,0,c.width,c.height); resolve(c.toDataURL('image/jpeg',.78));}; img.onerror=reject; img.src=r.result;}; r.onerror=reject; r.readAsDataURL(file);});}
  async function toggleFavorite(id){id=String(id); const has=state.favorites.has(id); if(has)state.favorites.delete(id); else state.favorites.add(id); localStorage.setItem('ar_favorites',JSON.stringify([...state.favorites])); render(); try{if(has) await state.sb.from('favorites').delete().eq('user_id',state.user.id).eq('listing_id',id); else await state.sb.from('favorites').insert({user_id:state.user.id,listing_id:id});}catch(e){console.warn(e)}}
  function openDetails(id){const l=state.listings.find(x=>String(x.id)===String(id)); if(!l)return; const saved=state.favorites.has(String(l.id)); $('#modalCard').innerHTML=`<div class="modalHead"><div><h2 class="sectionTitle">${esc(l.business_name||'Serviciu auto')}</h2><p class="sectionHint">${esc(l.category||'')}</p></div><button class="closeBtn" data-close-modal>${icon('x')}</button></div><div class="detailTop"><div class="avatarPublic">${l.image_url?`<img src="${l.image_url}" alt="">`:esc(initials(l.business_name))}</div><div><div class="metaRow"><span class="chip">${esc([l.city,l.county].filter(Boolean).join(', '))}</span><span class="chip chipGold">★ ${esc(l.rating||'4.8')}</span>${l.price?`<span class="chip">${esc(l.price)}</span>`:''}</div></div></div><div class="panel" style="margin-top:14px"><p style="margin:0;color:var(--muted)">${esc(l.description||'')}</p></div><div class="cardActions" style="margin-top:14px"><a class="btn btnPrimary" href="tel:${phoneLink(l.phone)}">${t('call')}</a><a class="btn btnGold" href="https://wa.me/${phoneLink(l.whatsapp||l.phone).replace('+','')}" target="_blank" rel="noopener">${t('whatsapp')}</a><button class="btn btnLine" data-public-profile="${esc(l.user_id||'')}">${t('viewProfile')}</button><button class="btn btnLine" data-fav="${esc(l.id)}">${saved?'Salvat':'Salvează'}</button><button class="btn btnDanger" id="reportBtn">${t('report')}</button></div>`; $('#modalLayer').classList.add('open'); $('#reportBtn').addEventListener('click',()=>reportListing(l.id));}
  function closeModal(){$('#modalLayer').classList.remove('open')}
  async function reportListing(id){try{await state.sb.from('reports').insert({listing_id:String(id),user_id:state.user.id,reason:'Raport trimis din aplicație'}); toast('Raport trimis.'); closeModal()}catch(e){toast('Raportul nu s-a trimis.')}}
  async function logout(){try{await state.sb.auth.signOut()}catch(e){} state.user=null;state.profile=null;showAuth()}
  function setupInstall(){window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();state.installPrompt=e;});}
  async function installApp(){if(state.installPrompt){state.installPrompt.prompt(); await state.installPrompt.userChoice; state.installPrompt=null;}else{toast('Pe telefon: Share / Meniu browser → Add to Home Screen.')}}
  function setupManifest(){try{const manifest={name:'AutoRapid RO',short_name:'AutoRapid',start_url:'/',display:'standalone',background_color:'#faf9f5',theme_color:'#ffffff',icons:[]}; const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}); const link=document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(blob); document.head.appendChild(link);}catch(e){}}

  init();
})();
</script>
</body>
</html>
