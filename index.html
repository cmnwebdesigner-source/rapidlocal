    function compressImage(file, maxSize = 300, quality = 0.7) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type || !file.type.startsWith("image/")) {
          reject(new Error("Fișier invalid."));
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          const image = new Image();

          image.onload = () => {
            let width = image.width;
            let height = image.height;

            if (width > height && width > maxSize) {
              height = Math.round((height * maxSize) / width);
              width = maxSize;
            } else if (height > maxSize) {
              width = Math.round((width * maxSize) / height);
              height = maxSize;
            }

            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, width);
            canvas.height = Math.max(1, height);

            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

            resolve(canvas.toDataURL("image/jpeg", quality));
          };

          image.onerror = () => reject(new Error("Imaginea nu poate fi citită."));
          image.src = event.target.result;
        };

        reader.onerror = () => reject(new Error("Nu am putut procesa fișierul."));
        reader.readAsDataURL(file);
      });
    }

      if (type === "phone") return <svg {...common}><path {...stroke} d="M7.1 4h3l1.4 4.2-2 1.2c.9 1.9 2.3 3.3 4.2 4.2l1.2-2 4.1 1.4v3c0 1.2-1 2.1-2.2 2A13.5 13.5 0 0 1 5 6.2C4.9 5 5.9 4 7.1 4Z"/></svg>;

      if (type === "pin") return <svg {...common}><path {...stroke} d="M12 21s7-5.7 7-11a7 7 0 1 0-14 0c0 5.3 7 11 7 11Z"/><path {...stroke} d="M12 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/></svg>;
      if (type === "star") return <svg {...common} fill="currentColor"><path d="m12 3 2.6 5.5 6 .9-4.3 4.2 1 5.9L12 16.7 6.7 19.5l1-5.9-4.3-4.2 6-.9L12 3Z"/></svg>;
      if (type === "back") return <svg {...common}><path {...stroke} strokeWidth="2.2" d="M15 19 8 12l7-7"/></svg>;
      if (type === "camera") return <svg {...common}><path {...stroke} d="M4 8.5h3l1.4-2h7.2l1.4 2h3a1 1 0 0 1 1 1V19a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5a1 1 0 0 1 1-1Z"/><path {...stroke} d="M12 16.5a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"/></svg>;
      if (type === "msg") return <svg {...common}><path {...stroke} d="M4 5.5h16v11H8.5L4 20V5.5Z"/></svg>;
      if (type === "shield") return <svg {...common}><path {...stroke} d="M12 3 20 6v6c0 5-3.4 8-8 9-4.6-1-8-4-8-9V6l8-3Z"/><path {...stroke} d="m9 12 2 2 4-4"/></svg>;
      return null;
    }

    function App() {
      const [page, setPage] = useState("home");
      const [query, setQuery] = useState("");
      const [category, setCategory] = useState("Toate");
      const [county, setCounty] = useState("");
      const [city, setCity] = useState("");
      const [selected, setSelected] = useState(null);
      const [notice, setNotice] = useState("");
      const [favorites, setFavorites] = useState(() => safeParse(localStorage.getItem(STORAGE.favorites), []));
      const [userListings, setUserListings] = useState(() => safeParse(localStorage.getItem(STORAGE.listings), []));
      const [profile, setProfile] = useState(() => loadProfile());
      const [draftProfile, setDraftProfile] = useState(() => loadProfile());
      const [processing, setProcessing] = useState(false);
      const [feedback, setFeedback] = useState({ type: "Sugestie nouă", text: "" });
      const [form, setForm] = useState({
        title: "",
        category: "Tractări auto",
        county: "București",
        city: "București",
        phone: "",
        whatsapp: "",
        price: "",
        description: "",
        image: "",
        plan: "free"
      });

      const listings = useMemo(() => [...userListings, ...demoListings], [userListings]);

      const filtered = useMemo(() => {
        const text = query.trim().toLowerCase();

        return listings
          .filter((item) => {
            const matchText = !text ||
              item.title.toLowerCase().includes(text) ||
              item.category.toLowerCase().includes(text) ||
              item.county.toLowerCase().includes(text) ||
              item.city.toLowerCase().includes(text) ||
              item.description.toLowerCase().includes(text);

            const matchCategory = category === "Toate" || item.category === category;
            const matchCounty = !county || item.county === county;
            const matchCity = !city || item.city === city;

            return matchText && matchCategory && matchCounty && matchCity;
          })
          .sort((a, b) => Number(b.promoted) - Number(a.promoted));
      }, [listings, query, category, county, city]);

      const citiesForFilter = county ? countyCities[county] || [] : [];
      const citiesForForm = countyCities[form.county] || [];
      const savedListings = listings.filter((item) => favorites.includes(item.id));

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE.favorites, JSON.stringify(favorites));
        } catch {
          showNotice("Nu am putut salva favoritele.");
        }
      }, [favorites]);

      useEffect(() => {
        if (!notice) return;
        const timer = setTimeout(() => setNotice(""), 2600);
        return () => clearTimeout(timer);
      }, [notice]);

      function showNotice(message) {
        setNotice(message);
      }

      function toggleFavorite(id) {
        setFavorites((current) => current.includes(id) ? current.filter((x) => x !== id) : [...current, id]);
      }

      function saveListings(nextListings) {
        try {
          localStorage.setItem(STORAGE.listings, JSON.stringify(nextListings));
          setUserListings(nextListings);
          return true;
        } catch {
          showNotice("Nu am putut salva anunțul. Imaginea poate fi prea mare.");
          return false;
        }
      }

      function updateForm(field, value) {
        setForm((current) => ({ ...current, [field]: value }));
      }

      async function uploadListingImage(file) {
        if (!file) return;
        setProcessing(true);
        try {
          const compressed = await compressImage(file, 300, 0.7);
          updateForm("image", compressed);
          showNotice("Imagine comprimată și pregătită.");
        } catch {
          showNotice("Nu am putut procesa imaginea.");
        } finally {
          setProcessing(false);
        }
      }

      async function uploadProfilePhoto(file) {
        if (!file) return;
        setProcessing(true);
        try {
          const compressed = await compressImage(file, 300, 0.7);
          setDraftProfile((current) => ({ ...current, photo: compressed }));
          showNotice("Poza de profil a fost comprimată.");
        } catch {
          showNotice("Nu am putut procesa poza.");
        } finally {
          setProcessing(false);
        }
      }

      function publishListing(event) {
        event.preventDefault();

        if (!form.title.trim() || !form.phone.trim() || !form.description.trim()) {
          showNotice("Completează titlul, telefonul și descrierea.");
          return;
        }

        const plan = promotionPlans.find((x) => x.id === form.plan) || promotionPlans[0];

        const newItem = {
          id: `user-${Date.now()}`,
          title: form.title.trim(),
          category: form.category,
          county: form.county,
          city: form.city,
          location: `${form.city}, ${form.county}`,
          price: form.price.trim() || "Preț la cerere",
          rating: 5,
          reviews: 0,
          phone: form.phone.trim(),
          whatsapp: form.whatsapp.trim(),
          plan: form.plan,
          promoted: form.plan !== "free",
          verified: false,
          image: form.image || makeCarImage(form.title.trim(), form.category),
          description: form.description.trim()
        };

        const nextListings = [newItem, ...userListings];

        if (saveListings(nextListings)) {
          setForm({
            title: "",
            category: "Tractări auto",
            county: "București",
            city: "București",
            phone: "",
            whatsapp: "",
            price: "",
            description: "",
            image: "",
            plan: "free"
          });
          setPage("home");
          showNotice(`Anunț publicat. Plan selectat: ${plan.name}.`);
        }
      }

      function saveProfile(event) {
        event.preventDefault();

        const editsLeft = Number(profile.nameEditsLeft ?? 2);
        const nameChanged = draftProfile.name.trim() !== profile.name.trim();

        if (nameChanged && editsLeft <= 0) {
          showNotice("Nu mai poți modifica numele.");
          return;
        }

        const next = {
          ...defaultProfile,
          ...draftProfile,
          name: draftProfile.name.trim() || defaultProfile.name,
          about: draftProfile.about.slice(0, 100),
          nameEditsLeft: Math.max(0, editsLeft - (nameChanged ? 1 : 0))
        };

        try {
          localStorage.setItem(STORAGE.profile, JSON.stringify(next));
          setProfile(next);
          setDraftProfile(next);
          setPage("profile");
          showNotice("Profil salvat cu succes.");
        } catch {
          showNotice("Profilul nu a putut fi salvat. Încearcă o poză mai mică.");
        }
      }

      function submitFeedback(event) {
        event.preventDefault();
        if (!feedback.text.trim()) {
          showNotice("Scrie o descriere pentru feedback.");
          return;
        }

        const previous = safeParse(localStorage.getItem(STORAGE.feedback), []);
        const next = [{ ...feedback, id: Date.now(), date: new Date().toLocaleString("ro-RO") }, ...previous].slice(0, 30);

        try {
          localStorage.setItem(STORAGE.feedback, JSON.stringify(next));
          setFeedback({ type: "Sugestie nouă", text: "" });
          showNotice("Feedback trimis. Mulțumim!");
        } catch {
          showNotice("Nu am putut salva feedback-ul.");
        }
      }

      function phoneLink(phone) {
        return `tel:${phone?.replace(/\s/g, "") || ""}`;
      }

      function whatsappLink(item) {
        const clean = item.whatsapp?.replace(/\D/g, "") || item.phone?.replace(/\D/g, "") || "";
        return clean ? `https://wa.me/${clean}` : "#";
      }

      return (
        <div className="min-h-dvh app-bg text-white">
          <DesktopHeader page={page} setPage={setPage} />

          <main className="mx-auto w-full max-w-5xl px-3 pb-5 pt-3 safe-bottom md:px-5 md:pb-12 md:pt-6">
            {page === "home" && (
              <HomePage
                filtered={filtered}
                query={query}
                setQuery={setQuery}
                category={category}
                setCategory={setCategory}
                county={county}
                setCounty={setCounty}
                city={city}
                setCity={setCity}
                citiesForFilter={citiesForFilter}
                favorites={favorites}
                toggleFavorite={toggleFavorite}
                setSelected={setSelected}
                setPage={setPage}
              />
            )}

            {page === "search" && (
              <SearchPage
                filtered={filtered}
                query={query}
                setQuery={setQuery}
                category={category}
                setCategory={setCategory}
                county={county}
                setCounty={setCounty}
                city={city}
                setCity={setCity}
                citiesForFilter={citiesForFilter}
                favorites={favorites}
                toggleFavorite={toggleFavorite}
                setSelected={setSelected}
              />
            )}

            {page === "publish" && (
              <PublishPage
                form={form}
                updateForm={updateForm}
                citiesForForm={citiesForForm}
                uploadListingImage={uploadListingImage}
                publishListing={publishListing}
                processing={processing}
              />
            )}

            {page === "saved" && (
              <SavedPage
                savedListings={savedListings}
                favorites={favorites}
                toggleFavorite={toggleFavorite}
                setSelected={setSelected}
                setPage={setPage}
              />
            )}

            {page === "profile" && (
              <ProfilePage
                profile={profile}
                userListings={userListings}
                savedCount={savedListings.length}
                setPage={setPage}
                setDraftProfile={setDraftProfile}
                feedback={feedback}
                setFeedback={setFeedback}
                submitFeedback={submitFeedback}
              />
            )}

            {page === "editProfile" && (
              <EditProfilePage
                profile={profile}
                draftProfile={draftProfile}
                setDraftProfile={setDraftProfile}
                saveProfile={saveProfile}
                uploadProfilePhoto={uploadProfilePhoto}
                processing={processing}
                setPage={setPage}
              />
            )}
          </main>

          <MobileNav page={page} setPage={setPage} />

          {selected && (
            <DetailsModal
              item={selected}
              close={() => setSelected(null)}
              isFavorite={favorites.includes(selected.id)}
              toggleFavorite={toggleFavorite}
              phoneLink={phoneLink}
              whatsappLink={whatsappLink}
            />
          )}

          {notice && (
            <div className="fixed left-1/2 top-4 z-[90] w-[calc(100%-24px)] max-w-sm -translate-x-1/2 rounded-2xl border border-gold-400/40 bg-white px-4 py-3 text-center text-xs font-black text-black shadow-gold">
              {notice}
            </div>
          )}
        </div>
      );
    }

    function DesktopHeader({ page, setPage }) {
      const items = [
        ["home", "Acasă"],
        ["search", "Caută"],
        ["publish", "Publică"],
        ["saved", "Salvate"],
        ["profile", "Profil"]
      ];

      return (
        <header className="sticky top-0 z-40 hidden border-b border-white/10 bg-black/70 backdrop-blur-xl md:block">
          <div className="mx-auto flex max-w-5xl items-center justify-between px-5 py-4">
            <button onClick={() => setPage("home")} className="flex items-center gap-3 text-left">
              <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold">AR</div>
              <div>
                <p className="text-sm font-black tracking-tight">AutoRapid RO</p>
                <p className="text-xs text-white/50">Marketplace auto premium</p>
              </div>
            </button>

            <nav className="flex items-center gap-2">
              {items.map(([id, label]) => (
                <button
                  key={id}
                  onClick={() => setPage(id)}
                  className={`rounded-full px-4 py-2 text-xs font-black transition ${
                    page === id ? "bg-gold-500 text-black shadow-gold" : "bg-white/10 text-white/70 hover:bg-white/15"
                  }`}
                >
                  {label}
                </button>
              ))}
            </nav>
          </div>
        </header>
      );
    }

    function HomePage(props) {
      return (
        <div className="space-y-4">
          <Hero setPage={props.setPage} />
          <StatsRow />
          <SearchBox {...props} compact />
          <CategoryChips category={props.category} setCategory={props.setCategory} />
          <SectionHeader title="Anunțuri recomandate" subtitle={`${props.filtered.length} servicii disponibile`} />
          <ListingGrid {...props} listings={props.filtered} />
          <PromotionPreview />
        </div>
      );
    }

    function SearchPage(props) {
      return (
        <div className="space-y-4">
          <PageCard title="Caută servicii auto" subtitle="Filtrează rapid după județ, oraș, categorie sau text." />
          <SearchBox {...props} />
          <CategoryChips category={props.category} setCategory={props.setCategory} />
          <SectionHeader title="Rezultate" subtitle={`${props.filtered.length} anunțuri găsite`} />
          <ListingGrid {...props} listings={props.filtered} />
        </div>
      );
    }

    function Hero({ setPage }) {
      return (
        <section className="relative overflow-hidden rounded-[30px] border border-gold-400/25 bg-black p-4 shadow-premium md:p-6">
          <div className="absolute -right-16 -top-16 h-44 w-44 rounded-full bg-gold-500/25 blur-3xl"></div>
          <div className="absolute -bottom-20 left-4 h-44 w-44 rounded-full bg-white/10 blur-3xl"></div>

          <div className="relative">
            <div className="mb-4 flex items-center justify-between gap-3">
              <div className="flex items-center gap-2">
                <div className="flex h-10 w-10 items-center justify-center rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold">AR</div>
                <div>
                  <p className="text-sm font-black">AutoRapid RO</p>
                  <p className="text-[11px] text-white/55">Anunțuri auto din România</p>
                </div>
              </div>

              <span className="rounded-full border border-gold-400/35 bg-gold-500/10 px-3 py-1 text-[11px] font-black text-gold-300">
                Beta Web
              </span>
            </div>

            <h1 className="max-w-2xl text-[26px] font-black leading-[1.05] tracking-tight md:text-4xl">
              Găsește rapid tractări, service, ITP și vulcanizare în orașul tău.
            </h1>

            <p className="mt-3 max-w-xl text-sm leading-relaxed text-white/65">
              Aplicație tip marketplace pentru servicii auto. Firmele publică anunțuri, oamenii caută rapid și contactează direct prin telefon sau WhatsApp.
            </p>

            <div className="mt-5 grid grid-cols-2 gap-2 sm:flex">
              <button onClick={() => setPage("publish")} className="h-11 rounded-2xl bg-gold-500 px-5 text-sm font-black text-black shadow-gold">
                Publică anunț
              </button>
              <button onClick={() => setPage("search")} className="h-11 rounded-2xl border border-white/15 bg-white/10 px-5 text-sm font-black text-white">
                Caută servicii
              </button>
            </div>
          </div>
        </section>
      );
    }

    function StatsRow() {
      const stats = [
        ["42", "județe"],
        ["22", "categorii"],
        ["4", "planuri promovare"],
        ["24/7", "servicii urgente"]
      ];

      return (
        <div className="grid grid-cols-4 gap-2">
          {stats.map(([value, label]) => (
            <div key={label} className="glass rounded-2xl px-2 py-3 text-center">
              <p className="text-sm font-black text-gold-300">{value}</p>
              <p className="mt-0.5 text-[10px] font-semibold text-white/55">{label}</p>
            </div>
          ))}
        </div>
      );
    }

    function PageCard({ title, subtitle }) {
      return (
        <section className="rounded-[28px] border border-gold-400/20 bg-black p-4 shadow-premium">
          <p className="text-[11px] font-black uppercase tracking-[.18em] text-gold-300">AutoRapid RO</p>
          <h1 className="mt-1 text-xl font-black">{title}</h1>
          <p className="mt-1 text-xs leading-relaxed text-white/55">{subtitle}</p>
          <div className="gold-line mt-4 h-px w-full"></div>
        </section>
      );
    }

    function SectionHeader({ title, subtitle }) {
      return (
        <div className="flex items-end justify-between gap-3 px-1">
          <div>
            <h2 className="text-base font-black">{title}</h2>
            <p className="text-xs text-white/50">{subtitle}</p>
          </div>
        </div>
      );
    }

    function SearchBox({
      query,
      setQuery,
      county,
      setCounty,
      city,
      setCity,
      citiesForFilter,
      compact
    }) {
      return (
        <section className="white-card rounded-[28px] p-3 shadow-card">
          <label className="relative block">
            <Icon type="search" className="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-black/40" />
            <input
              value={query}
              onChange={(event) => setQuery(event.target.value)}
              placeholder="Caută: tractări, ITP, oraș, service..."
              className="h-10 w-full rounded-2xl border border-black/10 bg-black/[.035] pl-9 pr-3 text-sm font-bold outline-none focus:border-gold-500"
            />
          </label>

          <div className={`mt-2 grid gap-2 ${compact ? "grid-cols-2" : "grid-cols-1 sm:grid-cols-2"}`}>
            <select
              value={county}
              onChange={(event) => {
                setCounty(event.target.value);
                setCity("");
              }}
              className="h-9 w-full rounded-2xl border border-black/10 bg-white px-3 text-xs font-bold outline-none focus:border-gold-500"
            >
              <option value="">Toate județele</option>
              {counties.map((item) => <option key={item} value={item}>{item}</option>)}
            </select>

            <select
              value={city}
              disabled={!county}
              onChange={(event) => setCity(event.target.value)}
              className="h-9 w-full rounded-2xl border border-black/10 bg-white px-3 text-xs font-bold outline-none disabled:opacity-50 focus:border-gold-500"
            >
              <option value="">Toate orașele</option>
              {citiesForFilter.map((item) => <option key={item} value={item}>{item}</option>)}
            </select>
          </div>
        </section>
      );
    }

    function CategoryChips({ category, setCategory }) {
      return (
        <div className="no-scrollbar flex gap-2 overflow-x-auto py-1">
          {categoryList.map((item) => (
            <button
              key={item}
              onClick={() => setCategory(item)}
              className={`shrink-0 rounded-full px-4 py-2 text-xs font-black transition ${
                category === item
                  ? "bg-gold-500 text-black shadow-gold"
                  : "border border-white/10 bg-white/10 text-white/70"
              }`}
            >
              {item}
            </button>
          ))}
        </div>
      );
    }

    function ListingGrid({ listings, favorites, toggleFavorite, setSelected }) {
      if (!listings.length) {
        return (
          <div className="white-card rounded-[28px] p-6 text-center shadow-card">
            <p className="text-sm font-black">Nu am găsit anunțuri.</p>
            <p className="mt-1 text-xs text-black/55">Schimbă filtrele sau caută alt oraș.</p>
          </div>
        );
      }

      return (
        <div className="grid gap-3 md:grid-cols-2">
          {listings.map((item) => (
            <ListingCard
              key={item.id}
              item={item}
              isFavorite={favorites.includes(item.id)}
              toggleFavorite={toggleFavorite}
              setSelected={setSelected}
            />
          ))}
        </div>
      );
    }

    function ListingCard({ item, isFavorite, toggleFavorite, setSelected }) {
      const plan = promotionPlans.find((x) => x.id === item.plan);

      return (
        <article onClick={() => setSelected(item)} className="white-card cursor-pointer overflow-hidden rounded-[28px] p-2 shadow-card transition active:scale-[.99]">
          <div className="flex gap-3">
            <div className="relative h-28 w-28 shrink-0 overflow-hidden rounded-[22px] bg-black">
              <img src={item.image} alt={item.title} className="h-full w-full object-cover" />
              {item.promoted && (
                <span className="absolute left-2 top-2 rounded-full bg-gold-500 px-2 py-1 text-[9px] font-black text-black shadow">
                  {plan?.tag || "PROMO"}
                </span>
              )}
            </div>

            <div className="min-w-0 flex-1 py-1 pr-1">
              <div className="flex items-start justify-between gap-2">
                <div className="min-w-0">
                  <h3 className="line-clamp-2 text-sm font-black leading-snug">{item.title}</h3>
                  <p className="mt-1 line-clamp-1 text-[11px] font-black text-gold-700">{item.category}</p>
                </div>

                <button
                  onClick={(event) => {
                    event.stopPropagation();
                    toggleFavorite(item.id);
                  }}
                  className={`flex h-8 w-8 shrink-0 items-center justify-center rounded-full ${
                    isFavorite ? "bg-gold-500 text-black" : "bg-black/[.055] text-black/45"
                  }`}
                  aria-label="Salvează"
                >
                  <Icon type="heart" className="h-4 w-4" filled={isFavorite} />
                </button>
              </div>

              <div className="mt-2 flex items-center gap-1 text-[11px] font-semibold text-black/55">
                <Icon type="pin" className="h-3.5 w-3.5" />
                <span className="truncate">{item.location}</span>
              </div>

              <div className="mt-2 flex items-center justify-between gap-2">
                <span className="rounded-full bg-black/[.055] px-2 py-1 text-[11px] font-black">{item.price}</span>
                <span className="flex items-center gap-1 text-[11px] font-black">
                  <Icon type="star" className="h-3.5 w-3.5 text-gold-500" filled />
                  {item.rating}
                </span>
              </div>

              <div className="mt-2 flex items-center gap-1">
                {item.verified && (
                  <span className="rounded-full bg-green-100 px-2 py-1 text-[10px] font-black text-green-700">Verificat</span>
                )}
                {item.promoted && (
                  <span className="rounded-full bg-gold-100 px-2 py-1 text-[10px] font-black text-gold-800">Promovat</span>
                )}
              </div>
            </div>
          </div>
        </article>
      );
    }

    function PromotionPreview() {
      return (
        <section className="rounded-[30px] border border-gold-400/25 bg-black p-4 shadow-premium">
          <div className="flex items-start justify-between gap-3">
            <div>
              <p className="text-[11px] font-black uppercase tracking-[.18em] text-gold-300">Promovări</p>
              <h2 className="mt-1 text-lg font-black">Planuri pentru firme auto</h2>
              <p className="mt-1 text-xs leading-relaxed text-white/55">Poți lansa aplicația cu promovări demo, iar plățile reale le adaugi ulterior.</p>
            </div>
          </div>

          <div className="mt-4 grid gap-2 md:grid-cols-4">
            {promotionPlans.map((plan) => (
              <div key={plan.id} className="rounded-2xl border border-white/10 bg-white/10 p-3">
                <span className="rounded-full bg-gold-500 px-2 py-1 text-[10px] font-black text-black">{plan.tag}</span>
                <h3 className="mt-3 text-sm font-black">{plan.name}</h3>
                <p className="mt-1 text-lg font-black text-gold-300">{plan.price}</p>
                <p className="text-[11px] text-white/50">{plan.duration}</p>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function PublishPage({
      form,
      updateForm,
      citiesForForm,
      uploadListingImage,
      publishListing,
      processing
    }) {
      return (
        <div className="space-y-4">
          <PageCard title="Publică anunț" subtitle="Adaugă serviciul tău auto. Pozele sunt comprimate automat pentru a evita blocarea aplicației." />

          <form onSubmit={publishListing} className="white-card rounded-[30px] p-4 shadow-card">
            <div className="space-y-3">
              <Input label="Titlu anunț" value={form.title} onChange={(v) => updateForm("title", v)} placeholder="Ex: Tractări Auto București 24/7" />

              <div className="grid grid-cols-2 gap-2">
                <Field label="Categorie">
                  <select value={form.category} onChange={(e) => updateForm("category", e.target.value)} className="input">
                    {categoryList.filter((x) => x !== "Toate").map((item) => <option key={item} value={item}>{item}</option>)}
                  </select>
                </Field>

                <Input label="Preț" value={form.price} onChange={(v) => updateForm("price", v)} placeholder="de la 100 lei" />
              </div>

              <div className="grid grid-cols-2 gap-2">
                <Field label="Județ">
                  <select
                    value={form.county}
                    onChange={(e) => {
                      const nextCounty = e.target.value;
                      updateForm("county", nextCounty);
                      updateForm("city", countyCities[nextCounty]?.[0] || "");
                    }}
                    className="input"
                  >
                    {counties.map((item) => <option key={item} value={item}>{item}</option>)}
                  </select>
                </Field>

                <Field label="Oraș">
                  <select value={form.city} onChange={(e) => updateForm("city", e.target.value)} className="input">
                    {citiesForForm.map((item) => <option key={item} value={item}>{item}</option>)}
                  </select>
                </Field>
              </div>

              <div className="grid grid-cols-2 gap-2">
                <Input label="Telefon" value={form.phone} onChange={(v) => updateForm("phone", v)} placeholder="+407..." />
                <Input label="WhatsApp" value={form.whatsapp} onChange={(v) => updateForm("whatsapp", v)} placeholder="opțional" />
              </div>

              <Field label="Descriere">
                <textarea
                  value={form.description}
                  onChange={(e) => updateForm("description", e.target.value)}
                  rows="4"
                  placeholder="Scrie serviciile, programul, zona acoperită și detalii importante."
                  className="min-h-[112px] w-full resize-none rounded-2xl border border-black/10 bg-black/[.035] px-3 py-3 text-sm font-semibold outline-none focus:border-gold-500"
                />
              </Field>

              <div className="rounded-3xl border border-dashed border-gold-500/70 bg-gold-50 p-3">
                <label className="flex cursor-pointer items-center gap-3">
                  <div className="flex h-12 w-12 items-center justify-center rounded-2xl bg-gold-500 text-black shadow-gold">
                    <Icon type="camera" className="h-5 w-5" />
                  </div>
                  <div className="min-w-0 flex-1">
                    <p className="text-xs font-black">Adaugă poză / logo</p>
                    <p className="text-[11px] text-black/55">Max 300x300px, JPEG 0.7 înainte de LocalStorage</p>
                  </div>
                  <input type="file" accept="image/*" className="hidden" onChange={(e) => uploadListingImage(e.target.files?.[0])} />
                </label>
                {form.image && <img src={form.image} alt="Preview" className="mt-3 h-32 w-full rounded-2xl object-cover" />}
              </div>

              <div>
                <p className="mb-2 text-xs font-black">Alege promovarea</p>
                <div className="grid gap-2 sm:grid-cols-2">
                  {promotionPlans.map((plan) => (
                    <button
                      type="button"
                      key={plan.id}
                      onClick={() => updateForm("plan", plan.id)}
                      className={`rounded-2xl border p-3 text-left transition ${
                        form.plan === plan.id
                          ? "border-gold-500 bg-gold-50 shadow-gold"
                          : "border-black/10 bg-white"
                      }`}
                    >
                      <div className="flex items-start justify-between gap-2">
                        <div>
                          <p className="text-sm font-black">{plan.name}</p>
                          <p className="text-xs text-black/50">{plan.duration}</p>
                        </div>
                        <span className="rounded-full bg-black px-2 py-1 text-[10px] font-black text-gold-300">{plan.price}</span>
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              <button type="submit" disabled={processing} className="h-12 w-full rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold disabled:opacity-60">
                {processing ? "Procesez imaginea..." : "Publică anunț"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function Input({ label, value, onChange, placeholder, disabled }) {
      return (
        <Field label={label}>
          <input
            value={value}
            disabled={disabled}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            className="input disabled:opacity-50"
          />
        </Field>
      );
    }

    function Field({ label, children }) {
      return (
        <label className="block">
          <span className="mb-1 block text-xs font-black text-black/80">{label}</span>
          {children}
        </label>
      );
    }

    function SavedPage({ savedListings, favorites, toggleFavorite, setSelected, setPage }) {
      return (
        <div className="space-y-4">
          <PageCard title="Salvate" subtitle="Anunțurile favorite apar aici." />
          {savedListings.length ? (
            <ListingGrid listings={savedListings} favorites={favorites} toggleFavorite={toggleFavorite} setSelected={setSelected} />
          ) : (
            <div className="white-card rounded-[30px] p-6 text-center shadow-card">
              <div className="mx-auto flex h-16 w-16 items-center justify-center rounded-3xl bg-gold-100 text-gold-700">
                <Icon type="heart" className="h-7 w-7" />
              </div>
              <h2 className="mt-4 text-base font-black">Nu ai anunțuri salvate.</h2>
              <p className="mt-1 text-xs text-black/55">Apasă inimioara pe un anunț și îl găsești aici.</p>
              <button onClick={() => setPage("home")} className="mt-4 h-10 rounded-2xl bg-gold-500 px-5 text-xs font-black text-black shadow-gold">
                Vezi anunțuri
              </button>
            </div>
          )}
        </div>
      );
    }

    function ProfilePage({
      profile,
      userListings,
      savedCount,
      setPage,
      setDraftProfile,
      feedback,
      setFeedback,
      submitFeedback
    }) {
      return (
        <div className="space-y-4">
          <section className="white-card rounded-[30px] p-4 shadow-card">
            <div className="flex items-center gap-3">
              <div className="h-16 w-16 overflow-hidden rounded-3xl bg-black text-gold-300">
                {profile.photo ? <img src={profile.photo} alt="Profil" className="h-full w-full object-cover" /> : <div className="flex h-full w-full items-center justify-center text-lg font-black">{profile.name.slice(0, 2).toUpperCase()}</div>}
              </div>

              <div className="min-w-0 flex-1">
                <h1 className="line-clamp-1 text-lg font-black">{profile.name}</h1>
                <p className="text-xs text-black/55">{profile.city}, {profile.county}</p>
                <p className="mt-1 text-[11px] font-black text-gold-700">Editări nume rămase: {profile.nameEditsLeft}</p>
              </div>
            </div>

            {profile.about && <p className="mt-4 rounded-2xl bg-black/[.035] p-3 text-xs leading-relaxed text-black/65">{profile.about}</p>}

            <button
              onClick={() => {
                setDraftProfile(profile);
                setPage("editProfile");
              }}
              className="mt-4 h-11 w-full rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold"
            >
              Editează Profil
            </button>
          </section>

          <div className="grid grid-cols-3 gap-2">
            <SmallStat value={userListings.length} label="Anunțuri" />
            <SmallStat value={savedCount} label="Salvate" />
            <SmallStat value="3" label="Mesaje" />
          </div>

          <section className="rounded-[30px] border border-gold-400/25 bg-black p-4 shadow-premium">
            <h2 className="text-base font-black">Inbox</h2>
            <p className="mt-1 text-xs text-white/55">Mesaje demo pentru lansare web.</p>

            <div className="mt-3 space-y-2">
              {[
                ["Actualizare aplicație", "Am adăugat promovări, favorite și profil editabil."],
                ["Sfat pentru firme", "Completează descrierea clar și adaugă un număr de WhatsApp."],
                ["Siguranță", "Verifică firmele înainte de colaborare."]
              ].map(([title, text]) => (
                <div key={title} className="rounded-2xl border border-white/10 bg-white/10 p-3">
                  <p className="text-xs font-black text-gold-300">{title}</p>
                  <p className="mt-1 text-xs text-white/60">{text}</p>
                </div>
              ))}
            </div>
          </section>

          <section className="white-card rounded-[30px] p-4 shadow-card">
            <h2 className="text-base font-black">Spune-ne părerea ta</h2>
            <p className="mt-1 text-xs text-black/55">Ajută-ne să facem aplicația mai bună.</p>

            <form onSubmit={submitFeedback} className="mt-3 space-y-3">
              <Field label="Despre ce vrei să ne dai feedback?">
                <select value={feedback.type} onChange={(e) => setFeedback((c) => ({ ...c, type: e.target.value }))} className="input">
                  {["Problemă tehnică", "Design aplicație", "Anunțuri", "Profil", "Mesaje", "Sugestie nouă", "Altceva"].map((item) => <option key={item}>{item}</option>)}
                </select>
              </Field>

              <label className="block">
                <span className="mb-1 flex justify-between text-xs font-black text-black/80">
                  <span>Descriere feedback</span>
                  <span>{feedback.text.length}/500</span>
                </span>
                <textarea
                  value={feedback.text}
                  maxLength="500"
                  onChange={(e) => setFeedback((c) => ({ ...c, text: e.target.value.slice(0, 500) }))}
                  rows="4"
                  className="min-h-[112px] w-full resize-none rounded-2xl border border-black/10 bg-black/[.035] px-3 py-3 text-sm font-semibold outline-none focus:border-gold-500"
                  placeholder="Scrie aici..."
                />
              </label>

              <button type="submit" className="h-11 w-full rounded-2xl bg-black text-sm font-black text-gold-300">
                Trimite feedback
              </button>
            </form>
          </section>
        </div>
      );
    }

    function SmallStat({ value, label }) {
      return (
        <div className="glass rounded-2xl p-3 text-center">
          <p className="text-lg font-black text-gold-300">{value}</p>
          <p className="text-[11px] text-white/55">{label}</p>
        </div>
      );
    }

    function EditProfilePage({
      profile,
      draftProfile,
      setDraftProfile,
      saveProfile,
      uploadProfilePhoto,
      processing,
      setPage
    }) {
      const nameLocked = Number(profile.nameEditsLeft ?? 0) <= 0;

      function update(field, value) {
        setDraftProfile((current) => ({ ...current, [field]: value }));
      }

      return (
        <div className="space-y-4">
          <section className="white-card rounded-[30px] p-4 shadow-card">
            <button onClick={() => setPage("profile")} className="mb-3 flex items-center gap-1 text-xs font-black text-gold-700">
              <Icon type="back" className="h-4 w-4" />
              Înapoi la profil
            </button>

            <h1 className="text-xl font-black">Editează Profil</h1>
            <p className="mt-1 text-xs text-black/55">Pozele sunt comprimate înainte de salvare ca aplicația să nu înghețe.</p>
          </section>

          <form onSubmit={saveProfile} className="white-card rounded-[30px] p-4 shadow-card">
            <div className="space-y-3">
              <div className="flex items-center gap-3">
                <div className="h-20 w-20 overflow-hidden rounded-3xl bg-black text-gold-300">
                  {draftProfile.photo ? <img src={draftProfile.photo} alt="Profil" className="h-full w-full object-cover" /> : <div className="flex h-full w-full items-center justify-center text-xl font-black">{draftProfile.name.slice(0, 2).toUpperCase()}</div>}
                </div>

                <label className="flex flex-1 cursor-pointer items-center justify-center gap-2 rounded-2xl border border-dashed border-gold-500 bg-gold-50 px-3 py-4 text-xs font-black text-gold-800">
                  <Icon type="camera" className="h-4 w-4" />
                  Fotografia ta
                  <input type="file" accept="image/*" className="hidden" onChange={(e) => uploadProfilePhoto(e.target.files?.[0])} />
                </label>
              </div>

              <Input label={`Nume ${nameLocked ? "(blocat)" : `(mai poți edita de ${profile.nameEditsLeft} ori)`}`} value={draftProfile.name} onChange={(v) => update("name", v)} disabled={nameLocked} />

              <label className="block">
                <span className="mb-1 flex justify-between text-xs font-black text-black/80">
                  <span>Despre tine</span>
                  <span>{draftProfile.about.length}/100</span>
                </span>
                <textarea
                  value={draftProfile.about}
                  maxLength="100"
                  onChange={(e) => update("about", e.target.value.slice(0, 100))}
                  rows="3"
                  className="min-h-[96px] w-full resize-none rounded-2xl border border-black/10 bg-black/[.035] px-3 py-3 text-sm font-semibold outline-none focus:border-gold-500"
                  placeholder="Scrie scurt despre tine..."
                />
              </label>

              <div className="grid grid-cols-2 gap-2">
                <Field label="Țară">
                  <select value={draftProfile.country} onChange={(e) => update("country", e.target.value)} className="input">
                    <option>România</option>
                    <option>Italia</option>
                    <option>Germania</option>
                    <option>Spania</option>
                  </select>
                </Field>

                <Field label="Limbă">
                  <select value={draftProfile.language} onChange={(e) => update("language", e.target.value)} className="input">
                    <option>Română</option>
                    <option>Engleză</option>
                    <option>Italiană</option>
                  </select>
                </Field>
              </div>

              <div className="grid grid-cols-2 gap-2">
                <Field label="Județ">
                  <select
                    value={draftProfile.county}
                    onChange={(e) => {
                      const nextCounty = e.target.value;
                      update("county", nextCounty);
                      update("city", countyCities[nextCounty]?.[0] || "");
                    }}
                    className="input"
                  >
                    {counties.map((item) => <option key={item}>{item}</option>)}
                  </select>
                </Field>

                <Field label="Oraș">
                  <select value={draftProfile.city} onChange={(e) => update("city", e.target.value)} className="input">
                    {(countyCities[draftProfile.county] || []).map((item) => <option key={item}>{item}</option>)}
                  </select>
                </Field>
              </div>

              <Input label="Telefon" value={draftProfile.phone} onChange={(v) => update("phone", v)} placeholder="+407..." />
              <Input label="Email" value={draftProfile.email} onChange={(v) => update("email", v)} placeholder="email@example.com" />

              <button type="submit" disabled={processing} className="h-12 w-full rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold disabled:opacity-60">
                {processing ? "Procesez poza..." : "Salvează Profil"}
              </button>
            </div>
          </form>
        </div>
      );
    }

    function DetailsModal({
      item,
      close,
      isFavorite,
      toggleFavorite,
      phoneLink,
      whatsappLink
    }) {
      return (
        <div className="fixed inset-0 z-[80] bg-black/70 p-3 backdrop-blur-md">
          <div className="modal-in mx-auto flex h-full max-w-2xl flex-col overflow-hidden rounded-[32px] bg-white text-black shadow-2xl">
            <div className="relative h-64 shrink-0 bg-black">
              <img src={item.image} alt={item.title} className="h-full w-full object-cover" />

              <button onClick={close} className="absolute left-3 top-3 flex h-10 w-10 items-center justify-center rounded-full bg-black/70 text-white backdrop-blur">
                <Icon type="back" className="h-5 w-5" />
              </button>

              <button
                onClick={() => toggleFavorite(item.id)}
                className={`absolute right-3 top-3 flex h-10 w-10 items-center justify-center rounded-full backdrop-blur ${
                  isFavorite ? "bg-gold-500 text-black" : "bg-black/70 text-white"
                }`}
              >
                <Icon type="heart" className="h-5 w-5" filled={isFavorite} />
              </button>

              {item.promoted && (
                <span className="absolute bottom-3 left-3 rounded-full bg-gold-500 px-3 py-1 text-[11px] font-black text-black shadow-gold">
                  Anunț promovat
                </span>
              )}
            </div>

            <div className="no-scrollbar flex-1 overflow-y-auto p-4">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <p className="text-xs font-black text-gold-700">{item.category}</p>
                  <h2 className="mt-1 text-2xl font-black leading-tight">{item.title}</h2>
                </div>
                <span className="flex shrink-0 items-center gap-1 rounded-full bg-gold-100 px-3 py-1 text-xs font-black text-gold-800">
                  <Icon type="star" className="h-3.5 w-3.5" filled />
                  {item.rating}
                </span>
              </div>

              <div className="mt-3 flex items-center gap-2 text-xs font-semibold text-black/55">
                <Icon type="pin" className="h-4 w-4" />
                {item.location}
              </div>

              <div className="mt-4 grid grid-cols-2 gap-2">
                <div className="rounded-3xl bg-black/[.04] p-4">
                  <p className="text-[11px] font-black text-black/45">Preț orientativ</p>
                  <p className="mt-1 text-lg font-black text-gold-700">{item.price}</p>
                </div>

                <div className="rounded-3xl bg-black/[.04] p-4">
                  <p className="text-[11px] font-black text-black/45">Recenzii</p>
                  <p className="mt-1 text-lg font-black">{item.reviews}</p>
                </div>
              </div>

              <div className="mt-4">
                <h3 className="text-sm font-black">Descriere</h3>
                <p className="mt-2 text-sm leading-relaxed text-black/65">{item.description}</p>
              </div>

              <div className="mt-4 rounded-3xl border border-gold-500/20 bg-gold-50 p-4">
                <p className="flex items-center gap-2 text-sm font-black">
                  <Icon type="shield" className="h-4 w-4 text-gold-700" />
                  Siguranță înainte de colaborare
                </p>
                <p className="mt-1 text-xs leading-relaxed text-black/60">
                  Verifică datele firmei, cere detalii înainte de deplasare și evită plata în avans dacă nu ai încredere.
                </p>
              </div>
            </div>

            <div className="grid shrink-0 grid-cols-2 gap-2 border-t border-black/10 bg-white p-3">
              <a href={phoneLink(item.phone)} className="flex h-12 items-center justify-center gap-2 rounded-2xl bg-black text-sm font-black text-white">
                <Icon type="phone" className="h-4 w-4" />
                Sună
              </a>
              <a href={whatsappLink(item)} target="_blank" rel="noreferrer" className="flex h-12 items-center justify-center gap-2 rounded-2xl bg-gold-500 text-sm font-black text-black shadow-gold">
                <Icon type="wa" className="h-4 w-4" />
                WhatsApp
              </a>
            </div>
          </div>
        </div>
      );
    }

    function MobileNav({ page, setPage }) {
      const items = [
        { id: "home", label: "Acasă", icon: "home" },
        { id: "search", label: "Caută", icon: "search" },
        { id: "publish", label: "Publică", icon: "plus", main: true },
        { id: "saved", label: "Salvate", icon: "heart" },
        { id: "profile", label: "Profil", icon: "user" }
      ];

      return (
        <nav className="fixed bottom-0 left-0 right-0 z-50 border-t border-gold-400/20 bg-black/90 px-2 pb-[calc(8px+env(safe-area-inset-bottom))] pt-2 shadow-[0_-20px_45px_rgba(0,0,0,.45)] backdrop-blur-xl md:hidden">
          <div className="mx-auto grid max-w-md grid-cols-5 items-end gap-1">
            {items.map((item) => (
              <button
                key={item.id}
                onClick={() => setPage(item.id)}
                className={`flex flex-col items-center justify-center gap-1 rounded-2xl text-[10px] font-black transition ${
                  item.main
                    ? "-mt-7 h-16 bg-gold-500 text-white shadow-gold"
                    : page === item.id
                      ? "h-14 text-gold-300"
                      : "h-14 text-white/45"
                }`}
              >
                <span className={item.main ? "flex h-10 w-10 items-center justify-center rounded-full bg-white text-gold-700 shadow-card" : ""}>
                  <Icon type={item.icon} className={item.main ? "h-6 w-6" : "h-5 w-5"} />
                </span>
                <span>{item.label}</span>
              </button>
            ))}
          </div>
        </nav>
      );
    }

    const style = document.createElement("style");
    style.textContent = `
      .input {
        height: 40px;
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(0,0,0,.10);
        background: rgba(0,0,0,.035);
        padding: 0 12px;
        font-size: 14px;
        font-weight: 650;
        outline: none;
      }
      .input:focus {
        border-color: #d4af37;
        background: #fff;
      }
    `;
    document.head.appendChild(style);

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
