<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AutoRapid RO</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #eef3f8;
      --text: #172033;
      --muted: #667085;
      --line: #dce3ec;
      --primary: #0f66ff;
      --primary-soft: #e8f1ff;
      --success: #099268;
      --warning: #f59f00;
      --danger: #d9480f;
      --shadow: 0 18px 40px rgba(15, 23, 42, .08);
      --radius: 20px;
      --bar-height: 76px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      color-scheme: light;
    }

    html[data-theme="dark"] {
      --bg: #0b1220;
      --surface: #111a2d;
      --surface-soft: #172238;
      --text: #eef4ff;
      --muted: #9aa8bd;
      --line: #26344d;
      --primary: #5b8cff;
      --primary-soft: #162849;
      --success: #4dd4ac;
      --warning: #ffd166;
      --danger: #ff8a65;
      --shadow: 0 18px 40px rgba(0, 0, 0, .28);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 15px;
      padding: 13px 14px;
      outline: none;
      min-height: 48px;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: color-mix(in srgb, var(--primary) 70%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 14%, transparent);
    }

    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .app-shell {
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: 18px 14px calc(var(--bar-height) + var(--safe-bottom) + 26px);
    }

    .screen {
      display: none;
      animation: fadeIn .18s ease both;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .top-card {
      background: linear-gradient(135deg, #0f172a, #173b85 60%, #0f66ff);
      color: #fff;
      border-radius: 28px;
      padding: 22px 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      margin-bottom: 16px;
    }

    .top-card::after {
      content: "";
      position: absolute;
      inset: auto -35px -70px auto;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      background: rgba(255,255,255,.14);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 19px;
      letter-spacing: -.02em;
      font-weight: 500;
      white-space: nowrap;
    }

    .pill {
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
      white-space: nowrap;
    }

    .hero-title {
      margin: 20px 0 8px;
      font-size: 29px;
      line-height: 1.08;
      letter-spacing: -.035em;
      font-weight: 500;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .hero-text {
      margin: 0;
      color: rgba(255,255,255,.78);
      max-width: 620px;
      position: relative;
      z-index: 1;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .section.flat {
      box-shadow: none;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title {
      margin: 0;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -.01em;
    }

    .section-note {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .filters {
      display: grid;
      gap: 10px;
    }

    @media (min-width: 760px) {
      .filters.three {
        grid-template-columns: 1.4fr 1fr 1fr;
      }
      .form-grid.two {
        grid-template-columns: 1fr 1fr;
      }
      .desktop-grid {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 16px;
        align-items: start;
      }
      .category-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .listing-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-wrap input {
      padding-left: 42px;
    }

    .category-card {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 18px;
      padding: 14px;
      text-align: left;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-height: 86px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .category-card.active {
      border-color: color-mix(in srgb, var(--primary) 55%, var(--line));
      background: var(--primary-soft);
    }

    .category-card:active, .nav-btn:active, .primary-btn:active, .ghost-btn:active {
      transform: scale(.985);
    }

    .cat-icon, .small-icon {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      background: var(--surface-soft);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--primary);
    }

    .cat-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .cat-desc {
      color: var(--muted);
      font-size: 12.5px;
      margin: 0;
    }

    .listing-card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 22px;
      padding: 12px;
      display: grid;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .045);
      min-width: 0;
    }

    .listing-card.promoted {
      border-color: color-mix(in srgb, var(--primary) 45%, var(--line));
    }

    .listing-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-width: 0;
    }

    .listing-image {
      width: 68px;
      height: 68px;
      border-radius: 19px;
      background: linear-gradient(135deg, #dbe8ff, #eef3f8);
      overflow: hidden;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: #173b85;
      font-size: 20px;
      font-weight: 500;
    }

    html[data-theme="dark"] .listing-image {
      background: linear-gradient(135deg, #152440, #253956);
      color: #dbe8ff;
    }

    .listing-image img, .avatar img, .upload-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .listing-main {
      min-width: 0;
      flex: 1;
    }

    .listing-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .listing-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.22;
      font-weight: 500;
      letter-spacing: -.01em;
      overflow-wrap: anywhere;
    }

    .heart-btn {
      width: 40px;
      height: 40px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: var(--surface-soft);
      color: var(--muted);
      flex: 0 0 auto;
      transition: color .18s ease, background .18s ease, transform .18s ease;
    }

    .heart-btn.saved {
      color: #e03131;
      background: color-mix(in srgb, #e03131 12%, var(--surface));
    }

    .heart-btn svg path {
      fill: none;
    }

    .heart-btn.saved svg path {
      fill: currentColor;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      padding: 5px 8px;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.primary {
      color: var(--primary);
      background: var(--primary-soft);
    }

    .tag.success {
      color: var(--success);
      background: color-mix(in srgb, var(--success) 12%, var(--surface));
    }

    .tag.warning {
      color: #9a6700;
      background: #fff3bf;
    }

    html[data-theme="dark"] .tag.warning {
      color: var(--warning);
      background: rgba(255, 209, 102, .12);
    }

    .listing-desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary-btn, .ghost-btn, .mini-btn, .danger-btn {
      min-height: 48px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      text-decoration: none;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
      font-weight: 400;
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
    }

    .ghost-btn {
      background: var(--surface-soft);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .danger-btn {
      background: color-mix(in srgb, var(--danger) 12%, var(--surface));
      color: var(--danger);
      border: 1px solid color-mix(in srgb, var(--danger) 25%, var(--line));
    }

    .mini-btn {
      min-height: 38px;
      border-radius: 13px;
      background: var(--surface-soft);
      color: var(--text);
      font-size: 13px;
      border: 1px solid var(--line);
    }

    .empty-state {
      text-align: center;
      padding: 26px 14px;
      color: var(--muted);
      background: var(--surface-soft);
      border-radius: 18px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-field {
      min-width: 0;
    }

    .upload-box {
      border: 1px dashed color-mix(in srgb, var(--primary) 40%, var(--line));
      border-radius: 18px;
      padding: 12px;
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      align-items: center;
      background: var(--surface-soft);
    }

    .upload-preview {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: var(--primary);
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .upload-copy {
      color: var(--muted);
      font-size: 13px;
    }

    .upload-copy span {
      display: block;
      color: var(--text);
      margin-bottom: 3px;
      font-weight: 400;
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      overflow: hidden;
      background: var(--primary-soft);
      display: grid;
      place-items: center;
      color: var(--primary);
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .profile-name {
      margin: 0 0 4px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -.02em;
      overflow-wrap: anywhere;
    }

    .profile-detail {
      color: var(--muted);
      margin: 0;
      font-size: 13px;
    }

    .profile-list {
      display: grid;
      gap: 9px;
    }

    .profile-action {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 11px;
      align-items: center;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 18px;
      padding: 11px;
    }

    .profile-action-title {
      font-size: 14px;
      font-weight: 400;
    }

    .profile-action-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .chev {
      color: var(--muted);
    }

    .panel {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: var(--surface-soft);
      animation: fadeIn .18s ease both;
    }

    .panel.active {
      display: block;
    }

    .notice-list {
      display: grid;
      gap: 10px;
    }

    .notice-card {
      padding: 12px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .notice-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 5px;
    }

    .notice-title {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
    }

    .notice-body {
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 13px;
    }

    .notice-date {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .char-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--bar-height) + var(--safe-bottom) + 12px);
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--surface);
      border-radius: 999px;
      padding: 11px 15px;
      z-index: 50;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      width: max-content;
      max-width: calc(100% - 28px);
      text-align: center;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 1120px);
      height: calc(var(--bar-height) + var(--safe-bottom));
      padding: 8px 14px calc(8px + var(--safe-bottom));
      z-index: 40;
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .nav-btn {
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      gap: 2px;
      min-width: 0;
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }

    .nav-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .nav-label {
      font-size: 11px;
      line-height: 1;
      font-weight: 400;
    }

    .nav-plus {
      width: 32px;
      height: 32px;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      margin-bottom: 1px;
    }

    .terms-text, .about-text {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }

    .hide-input {
      display: none;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }

    .plan-preview {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 13px;
    }

    .desktop-only-note {
      display: none;
    }

    @media (min-width: 900px) {
      .app-shell {
        padding-left: 22px;
        padding-right: 22px;
      }
      .desktop-only-note {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section id="homeScreen" class="screen active" aria-label="Acasă"></section>
    <section id="postScreen" class="screen" aria-label="Postează"></section>
    <section id="profileScreen" class="screen" aria-label="Profil"></section>
  </main>

  <nav class="bottom-nav" aria-label="Navigare principală">
    <button class="nav-btn active" data-nav="home" type="button" aria-label="Acasă">
      <span class="nav-icon" data-icon="home"></span>
      <span class="nav-label" data-i18n="home">Acasă</span>
    </button>
    <button class="nav-btn" data-nav="post" type="button" aria-label="Postează">
      <span class="nav-plus" data-icon="plus"></span>
      <span class="nav-label" data-i18n="post">Postează</span>
    </button>
    <button class="nav-btn" data-nav="profile" type="button" aria-label="Profil">
      <span class="nav-icon" data-icon="profile"></span>
      <span class="nav-label" data-i18n="profile">Profil</span>
    </button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const storageKeys = {
      userListings: 'autorapid_user_listings_v1',
      profile: 'autorapid_profile_v1',
      lang: 'autorapid_lang_v1',
      theme: 'autorapid_theme_v1',
      favorites: 'autorapid_favorites_v1',
      inboxRead: 'autorapid_inbox_read_v1',
      feedback: 'autorapid_feedback_v1'
    };

    const categories = [
      { id: 'tractari', label: { ro: 'Tractări auto', en: 'Car towing', it: 'Soccorso stradale', es: 'Grúas auto', ru: 'Эвакуатор', de: 'Abschleppdienst', fr: 'Remorquage auto' }, desc: { ro: 'Pentru mașini defecte, accidente sau transport auto.', en: 'For breakdowns, accidents or vehicle transport.', it: 'Per guasti, incidenti o trasporto auto.', es: 'Para averías, accidentes o transporte auto.', ru: 'Поломки, аварии или перевозка авто.', de: 'Pannen, Unfälle oder Fahrzeugtransport.', fr: 'Pannes, accidents ou transport auto.' } },
      { id: 'vulcanizare', label: { ro: 'Vulcanizare', en: 'Tire repair', it: 'Gommista', es: 'Neumáticos', ru: 'Шиномонтаж', de: 'Reifenservice', fr: 'Pneus' }, desc: { ro: 'Schimb anvelope, pană, vulcanizare mobilă.', en: 'Tire change, puncture repair, mobile tire service.', it: 'Cambio gomme, foratura, servizio mobile.', es: 'Cambio de neumáticos, pinchazos, servicio móvil.', ru: 'Замена шин, прокол, мобильный сервис.', de: 'Reifenwechsel, Panne, mobiler Service.', fr: 'Changement de pneus, crevaison, service mobile.' } },

          if (!q) return true;
          return [item.company, item.city, item.county, categoryLabel(item.category), item.description].join(' ').toLowerCase().includes(q);
        })
        .sort((a,b) => planRank(b.plan) - planRank(a.plan));

      document.getElementById('homeScreen').innerHTML = `
        <div class="top-card">
          <div class="brand-row">
            <div class="brand">
              <div class="logo-mark">${icon('car', 24)}</div>
              <div class="brand-title">AutoRapid RO</div>
            </div>
            <div class="pill">Demo marketplace</div>
          </div>
          <h1 class="hero-title">${tr('heroTitle')}</h1>
          <p class="hero-text">${tr('heroText')}</p>
        </div>

        <div class="desktop-grid">
          <div>
            <section class="section flat">
              <div class="filters three">
                <div class="search-wrap">
                  ${icon('search', 20)}
                  <input id="homeSearch" type="search" value="${escapeHtml(state.filters.query)}" placeholder="${tr('search')}" autocomplete="off" />
                </div>
                <select id="homeCounty">${countyOptions(state.filters.county, true)}</select>
                <select id="homeCity">${cityOptions(state.filters.county, state.filters.city, true)}</select>
              </div>
            </section>

            <section class="section">
              <div class="section-head">
                <div>
                  <h2 class="section-title">${tr('categories')}</h2>
                  <p class="section-note">${tr('allCategories')}</p>
                </div>
              </div>
              <div class="grid category-grid">
                <button class="category-card ${state.filters.category === 'all' ? 'active' : ''}" type="button" data-category="all">
                  <span class="cat-icon">${icon('car', 19)}</span>
                  <span><span class="cat-title">${tr('allCategories')}</span><p class="cat-desc">${tr('heroText')}</p></span>
                </button>
                ${categories.map(cat => `
                  <button class="category-card ${state.filters.category === cat.id ? 'active' : ''}" type="button" data-category="${cat.id}">
                    <span class="cat-icon">${icon(categoryIcon(cat.id), 19)}</span>
                    <span><span class="cat-title">${categoryLabel(cat.id)}</span><p class="cat-desc">${categoryDesc(cat)}</p></span>
                  </button>
                `).join('')}
              </div>
            </section>
          </div>

          <div class="desktop-only-note section">
            <h2 class="section-title">AutoRapid RO</h2>
            <p class="section-note">${tr('appAboutText')}</p>
            <div class="divider"></div>
            <button class="primary-btn" type="button" onclick="goTo('post')">${icon('plus', 18)} ${tr('publish')}</button>
          </div>
        </div>

        <section class="section">
          <div class="section-head">
            <div>
              <h2 class="section-title">${tr('listings')}</h2>
              <p class="section-note">${filtered.length} ${tr('listings').toLowerCase()}</p>
            </div>
          </div>
          <div class="grid listing-grid">
            ${filtered.length ? filtered.map(renderListingCard).join('') : `<div class="empty-state">${tr('noResults')}</div>`}
          </div>
        </section>
      `;

      document.getElementById('homeSearch').addEventListener('input', e => {
        state.filters.query = e.target.value;
        renderHome();
      });
      document.getElementById('homeCounty').addEventListener('change', e => {
        state.filters.county = e.target.value;
        state.filters.city = 'all';
        renderHome();
      });
      document.getElementById('homeCity').addEventListener('change', e => {
        state.filters.city = e.target.value;
        renderHome();
      });
      document.querySelectorAll('[data-category]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.filters.category = btn.dataset.category;
          renderHome();
        });
      });
    }

    function renderListingCard(item) {
      const saved = state.favorites.includes(item.id);
      const promotedClass = isPromoted(item.plan) ? 'promoted' : '';
      const planTagClass = item.plan === 'premium' ? 'warning' : isPromoted(item.plan) ? 'primary' : '';
      return `
        <article class="listing-card ${promotedClass}">
          <div class="listing-top">
            <div class="listing-image">${item.image ? `<img src="${item.image}" alt="${escapeHtml(item.company)}" />` : initials(item.company)}</div>
            <div class="listing-main">
              <div class="listing-title-row">
                <h3 class="listing-title">${escapeHtml(item.company)}</h3>
                <button class="heart-btn ${saved ? 'saved' : ''}" type="button" aria-label="${tr('saved')}" onclick="toggleFavorite('${item.id}')">${icon('heart', 20)}</button>
              </div>
              <div class="meta-line">
                <span class="tag primary">${escapeHtml(categoryLabel(item.category))}</span>
                <span class="tag">${escapeHtml(item.city)}, ${escapeHtml(item.county)}</span>
                <span class="tag ${planTagClass}">${escapeHtml(planLabel(item.plan))}</span>
              </div>
            </div>
          </div>
          <p class="listing-desc">${escapeHtml(item.description)}</p>
          <div class="meta-line">
            <span class="tag">${tr('schedule')}: ${escapeHtml(item.schedule || '-')}</span>
            <span class="tag">${tr('rating')}: ${escapeHtml(item.rating || '4.7')}</span>
            ${item.price ? `<span class="tag">${tr('price')}: ${escapeHtml(item.price)}</span>` : ''}
          </div>
          <div class="action-row">
            <a class="primary-btn" href="tel:${escapeHtml(item.phone)}">${icon('phone', 18)} ${tr('call')}</a>
            <a class="ghost-btn" href="${whatsappLink(item)}" target="_blank" rel="noopener">${icon('message', 18)} ${tr('whatsapp')}</a>
          </div>
        </article>
      `;
    }

    function renderPost() {
      const selectedCounty = document.getElementById('postCounty')?.value || '';
      const selectedCity = document.getElementById('postCity')?.value || '';
      document.getElementById('postScreen').innerHTML = `
        <section class="section">
          <div class="section-head">
            <div>
              <h1 class="section-title">${tr('addTitle')}</h1>
              <p class="section-note">${tr('addNote')}</p>
            </div>
          </div>
          <form id="postForm" class="form-grid">
            <div class="form-grid two">
              <div class="form-field">
                <label for="company">${tr('companyName')}</label>
                <input id="company" name="company" type="text" autocomplete="organization" />
              </div>
              <div class="form-field">
                <label for="category">${tr('category')}</label>
                <select id="category" name="category">
                  <option value="">${tr('category')}</option>
                  ${categories.map(cat => `<option value="${cat.id}">${categoryLabel(cat.id)}</option>`).join('')}
                </select>
              </div>
            </div>
            <div class="form-grid two">
              <div class="form-field">
                <label for="postCounty">${tr('county')}</label>
                <select id="postCounty" name="county">${countyOptions(selectedCounty, false)}</select>
              </div>
              <div class="form-field">
                <label for="postCity">${tr('city')}</label>
                <select id="postCity" name="city">${cityOptions(selectedCounty, selectedCity, false)}</select>
              </div>
            </div>
            <div class="form-grid two">
              <div class="form-field">
                <label for="phone">${tr('phone')}</label>
                <input id="phone" name="phone" type="tel" inputmode="tel" />
              </div>
              <div class="form-field">
                <label for="whatsapp">WhatsApp</label>
                <input id="whatsapp" name="whatsapp" type="tel" inputmode="tel" />
              </div>
            </div>
            <div class="form-grid two">
              <div class="form-field">
                <label for="address">${tr('address')}</label>
                <input id="address" name="address" type="text" />
              </div>
              <div class="form-field">
                <label for="schedule">${tr('schedule')}</label>
                <input id="schedule" name="schedule" type="text" placeholder="Luni - Vineri, 09:00 - 18:00" />
              </div>
            </div>
            <div class="form-field">
              <label for="description">${tr('description')}</label>
              <textarea id="description" name="description"></textarea>
            </div>
            <div class="form-grid two">
              <div class="form-field">
                <label for="price">${tr('optionalPrice')}</label>
                <input id="price" name="price" type="text" />
              </div>
              <div class="form-field">
                <label for="plan">${tr('promotionPlan')}</label>
                <select id="plan" name="plan">
                  <option value="free">${tr('planFree')}</option>
                  <option value="promoted7">${tr('plan7')}</option>
                  <option value="promoted30">${tr('plan30')}</option>
                  <option value="premium">${tr('planPremium')}</option>
                </select>
              </div>
            </div>
            <div class="plan-preview">${tr('planPreview')}</div>
            <div class="form-field">
              <label>${tr('uploadLogo')}</label>
              <label class="upload-box" for="listingImageInput">
                <span class="upload-preview" id="listingPreview">${state.listingImageTemp ? `<img src="${state.listingImageTemp}" alt="preview" />` : icon('camera', 24)}</span>
                <span class="upload-copy"><span>${tr('selectImage')}</span>${tr('uploadHint')}</span>
              </label>
              <input class="hide-input" id="listingImageInput" type="file" accept="image/*" />
            </div>
            <button class="primary-btn" type="submit">${icon('plus', 18)} ${tr('publish')}</button>
          </form>
        </section>
      `;

      const countySelect = document.getElementById('postCounty');
      const citySelect = document.getElementById('postCity');
      countySelect.addEventListener('change', () => {
        citySelect.innerHTML = cityOptions(countySelect.value, '', false);
      });
      document.getElementById('listingImageInput').addEventListener('change', e => handleImage(e, value => {
        state.listingImageTemp = value;
        document.getElementById('listingPreview').innerHTML = `<img src="${value}" alt="preview" />`;
      }));
      document.getElementById('postForm').addEventListener('submit', handlePostSubmit);
    }

    function handlePostSubmit(event) {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.target));
      if (!data.company || !data.category || !data.county || !data.city || !data.phone) {
        showToast(tr('requiredFields'));
        return;
      }
      const item = {
        id: `user-${Date.now()}`,
        company: data.company.trim(),
        category: data.category,
        county: data.county,
        city: data.city,
        phone: data.phone.trim(),
        whatsapp: data.whatsapp.trim() || data.phone.trim(),
        address: data.address.trim(),
        schedule: data.schedule.trim() || '-',
        description: data.description.trim() || '-',
        price: data.price.trim(),
        plan: data.plan || 'free',
        rating: 'Nou',
        image: state.listingImageTemp || ''
      };
      state.userListings.push(item);
      write(storageKeys.userListings, state.userListings);
      state.listingImageTemp = '';
      showToast(tr('publishSuccess'));
      state.filters.category = 'all';
      state.filters.county = 'all';
      state.filters.city = 'all';
      state.filters.query = '';
      goTo('home');
    }

    function renderProfile() {
      const profileName = state.profile.name || tr('profilePlaceholder');
      const unreadCount = defaultInbox.filter(n => !state.inboxRead.includes(n.id)).length;
      const myListings = state.userListings;
      const savedListings = allListings().filter(item => state.favorites.includes(item.id));

      document.getElementById('profileScreen').innerHTML = `
        <section class="section">
          <div class="profile-card">
            <label class="avatar" for="profilePhotoInput" aria-label="${tr('changePhoto')}">
              ${state.profile.photo ? `<img src="${state.profile.photo}" alt="${escapeHtml(profileName)}" />` : icon('profile', 28)}
            </label>
            <input class="hide-input" id="profilePhotoInput" type="file" accept="image/*" />
            <div style="min-width:0; flex:1;">
              <h1 class="profile-name">${escapeHtml(profileName)}</h1>
              <p class="profile-detail">${tr('emailDemo')}</p>
              <p class="profile-detail">${tr('phoneDemo')}</p>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <div>
              <h2 class="section-title">${tr('profileSettings')}</h2>
              <p class="section-note">${tr('preferences')}</p>
            </div>
          </div>
          <div class="profile-list">
            ${profileAction('editPanel', 'profile', tr('editProfile'), tr('changeName'))}
            <div id="editPanel" class="panel">
              <div class="form-grid">
                <div class="form-field"><label for="profileNameInput">${tr('changeName')}</label><input id="profileNameInput" type="text" value="${escapeHtml(state.profile.name || '')}" placeholder="${tr('profilePlaceholder')}" /></div>
                <button class="primary-btn" type="button" id="saveProfileName">${tr('editProfile')}</button>
              </div>
            </div>

            ${profileAction('langPanel', 'gear', tr('changeLanguage'), 'Română, English, Italiano, Español, Русский, Deutsch, Français')}
            <div id="langPanel" class="panel">
              <select id="langSelect">
                <option value="ro" ${state.lang === 'ro' ? 'selected' : ''}>Română</option>
                <option value="en" ${state.lang === 'en' ? 'selected' : ''}>English</option>
                <option value="it" ${state.lang === 'it' ? 'selected' : ''}>Italiano</option>
                <option value="es" ${state.lang === 'es' ? 'selected' : ''}>Español</option>
                <option value="ru" ${state.lang === 'ru' ? 'selected' : ''}>Русский</option>
                <option value="de" ${state.lang === 'de' ? 'selected' : ''}>Deutsch</option>
                <option value="fr" ${state.lang === 'fr' ? 'selected' : ''}>Français</option>
              </select>
            </div>

            ${profileAction('themePanel', 'gear', state.theme === 'dark' ? tr('lightMode') : tr('darkMode'), tr('preferences'))}
            <div id="themePanel" class="panel">
              <button class="primary-btn" type="button" id="themeToggle">${state.theme === 'dark' ? tr('lightMode') : tr('darkMode')}</button>
            </div>

            ${profileAction('savedPanel', 'heart', `${tr('saved')} (${savedListings.length})`, tr('noSaved'))}
            <div id="savedPanel" class="panel">
              <div class="grid">${savedListings.length ? savedListings.map(renderListingCard).join('') : `<div class="empty-state">${tr('noSaved')}</div>`}</div>
            </div>

            ${profileAction('myListingsPanel', 'car', `${tr('myListings')} (${myListings.length})`, tr('publish'))}
            <div id="myListingsPanel" class="panel">
              <div class="grid">${myListings.length ? myListings.map(renderListingCard).join('') : `<div class="empty-state">${tr('noMyListings')}</div>`}</div>
            </div>

            ${profileAction('inboxPanel', 'mail', `${tr('inbox')} (${unreadCount})`, tr('new'))}
            <div id="inboxPanel" class="panel">
              <div class="notice-list">
                ${defaultInbox.map(notice => renderNotice(notice)).join('')}
              </div>
            </div>

            ${profileAction('feedbackPanel', 'message', tr('feedback'), tr('feedbackTitle'))}
            <div id="feedbackPanel" class="panel">
              <form id="feedbackForm" class="form-grid">
                <div class="form-field">
                  <label for="feedbackCategory">${tr('feedbackCategory')}</label>
                  <select id="feedbackCategory" name="category">
                    <option value="technicalProblem">${tr('technicalProblem')}</option>
                    <option value="appSuggestion">${tr('appSuggestion')}</option>
                    <option value="listingProblem">${tr('listingProblem')}</option>
                    <option value="profileProblem">${tr('profileProblem')}</option>
                    <option value="languageProblem">${tr('languageProblem')}</option>
                    <option value="themeProblem">${tr('themeProblem')}</option>
                    <option value="other">${tr('other')}</option>
                  </select>
                </div>
                <div class="form-field">
                  <label for="feedbackDescription">${tr('feedbackDescription')}</label>
                  <textarea id="feedbackDescription" name="description" maxlength="500"></textarea>
                  <div class="char-row"><span>0/500</span><span>${tr('sendFeedback')}</span></div>
                </div>
                <button class="primary-btn" type="submit">${tr('sendFeedback')}</button>
              </form>
            </div>

            ${profileAction('aboutPanel', 'info', tr('appDetails'), tr('about'))}
            <div id="aboutPanel" class="panel"><p class="about-text">${tr('appAboutText')}</p></div>

            ${profileAction('termsPanel', 'info', tr('terms'), tr('appDetails'))}
            <div id="termsPanel" class="panel"><p class="terms-text">${tr('termsText')}</p></div>

            <button class="profile-action" type="button" id="clearDataBtn">
              <span class="small-icon">${icon('trash', 18)}</span>
              <span><span class="profile-action-title">${tr('clearData')}</span><span class="profile-action-note">localStorage</span></span>
              <span class="chev">${icon('chevron', 18)}</span>
            </button>
          </div>
        </section>
      `;

      bindProfileEvents();
    }

    function profileAction(panelId, iconName, title, note) {
      return `
        <button class="profile-action" type="button" data-panel="${panelId}">
          <span class="small-icon">${icon(iconName, 18)}</span>
          <span><span class="profile-action-title">${escapeHtml(title)}</span><span class="profile-action-note">${escapeHtml(note || '')}</span></span>
          <span class="chev">${icon('chevron', 18)}</span>
        </button>
      `;
    }

    function renderNotice(notice) {
      const read = state.inboxRead.includes(notice.id);
      return `
        <div class="notice-card">
          <div class="notice-head">
            <div>
              <h3 class="notice-title">${escapeHtml(notice.title)}</h3>
              ${!read ? `<span class="tag primary">${tr('new')}</span>` : ''}
            </div>
            <span class="notice-date">${escapeHtml(notice.date)}</span>
          </div>
          <p class="notice-body">${escapeHtml(notice.body)}</p>
          ${!read ? `<button class="mini-btn" type="button" onclick="markNoticeRead('${notice.id}')">${tr('markRead')}</button>` : ''}
        </div>
      `;
    }

    function bindProfileEvents() {
      document.querySelectorAll('[data-panel]').forEach(btn => {
        btn.addEventListener('click', () => {
          const panel = document.getElementById(btn.dataset.panel);
          if (panel) panel.classList.toggle('active');
        });
      });

      document.getElementById('profilePhotoInput').addEventListener('change', e => handleImage(e, value => {
        state.profile.photo = value;
        write(storageKeys.profile, state.profile);
        renderProfile();
      }));

      document.getElementById('saveProfileName')?.addEventListener('click', () => {
        const input = document.getElementById('profileNameInput');
        state.profile.name = input.value.trim();
        write(storageKeys.profile, state.profile);
        showToast(tr('nameSaved'));
        renderProfile();
      });

      document.getElementById('langSelect')?.addEventListener('change', e => {
        state.lang = e.target.value;
        write(storageKeys.lang, state.lang);
        showToast(tr('languageSaved'));
        render();
      });

      document.getElementById('themeToggle')?.addEventListener('click', () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        write(storageKeys.theme, state.theme);
        showToast(tr('themeSaved'));
        render();
      });

      const feedbackText = document.getElementById('feedbackDescription');
      feedbackText?.addEventListener('input', () => {
        const row = feedbackText.parentElement.querySelector('.char-row span:first-child');
        row.textContent = `${feedbackText.value.length}/500`;
      });

      document.getElementById('feedbackForm')?.addEventListener('submit', e => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        state.feedbacks.push({ id: Date.now(), category: data.category, description: data.description, date: new Date().toISOString() });
        write(storageKeys.feedback, state.feedbacks);
        e.target.reset();
        e.target.querySelector('.char-row span:first-child').textContent = '0/500';
        showToast(tr('feedbackThanks'));
      });

      document.getElementById('clearDataBtn')?.addEventListener('click', () => {
        if (!confirm(tr('clearData') + '?')) return;
        Object.values(storageKeys).forEach(key => localStorage.removeItem(key));
        state.lang = 'ro';
        state.theme = 'light';
        state.profile = { name: '', photo: '' };
        state.favorites = [];
        state.inboxRead = [];
        state.userListings = [];
        state.feedbacks = [];
        showToast(tr('resetDone'));
        render();
      });
    }

    function handleImage(event, callback) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => callback(reader.result);
      reader.readAsDataURL(file);
    }

    window.toggleFavorite = function(id) {
      if (state.favorites.includes(id)) {
        state.favorites = state.favorites.filter(item => item !== id);
        showToast(tr('saveRemoved'));
      } else {
        state.favorites.push(id);
        showToast(tr('saveAdded'));
      }
      write(storageKeys.favorites, state.favorites);
      render();
    };

    window.markNoticeRead = function(id) {
      if (!state.inboxRead.includes(id)) {
        state.inboxRead.push(id);
        write(storageKeys.inboxRead, state.inboxRead);
      }
      renderProfile();
    };

    window.goTo = function(page) {
      state.page = page;
      document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
      document.getElementById(`${page}Screen`).classList.add('active');
      updateNav();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.nav === state.page));
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = tr(el.dataset.i18n));
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => goTo(btn.dataset.nav));
    });

    render();
  </script>
</body>
</html>
